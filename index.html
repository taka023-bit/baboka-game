<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦 完全版</title>
<style>
html, body { margin:0; padding:0; overflow:hidden; background:#1a1a1a; color:white; font-family:sans-serif;}
.container { display:flex; flex-direction:column; height:100dvh;}
.field-wrapper { display:flex; justify-content:center; align-items:center; flex:1;}
.field { display:grid; grid-template-columns:50px 70px 70px 70px 50px; grid-template-rows:70px 70px 70px; gap:6px;}
.enemy { transform:rotate(180deg);}
.enemy .area { transform:rotate(180deg);}
.area { border:2px solid #fff; border-radius:8px; display:flex; justify-content:center; align-items:center; flex-wrap:wrap; font-size:9px; position: relative; text-align:center;}
.card { width:40px; height:60px; background:white; color:black; border-radius:6px; font-size:9px; display:flex; justify-content:center; align-items:center; margin:2px; cursor:pointer;}
#hand { display:flex; justify-content:center; gap:5px; height:80px; flex-shrink:0; margin-top:5px;}
.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black;}
.center { grid-column:3; grid-row:1; background:#666;}
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black;}
.deck { grid-column:5; grid-row:1; background:orange; color:black;}
.receive { grid-column:2; grid-row:2; background:blue;}
.toss { grid-column:3; grid-row:2; background:green;}
.attack { grid-column:4; grid-row:2; background:red;}
.drop { grid-column:5; grid-row:2; background:orange; color:black;}
.set-bottom { grid-column:1; grid-row:3; background:purple;}
.serve { grid-column:3; grid-row:3; background:yellow; color:black;}
.event { grid-column:4; grid-row:3; background:white; color:black;}
button { padding:4px 8px; margin:2px; font-size:12px;}
#phaseDisplay { text-align:center; margin:5px;}
#deckCount { text-align:center; margin:2px; font-size:12px;}
#popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#222; border:2px solid #fff; padding:10px; display:none; z-index:100; border-radius:8px;}
#popup h3 { margin:0 0 5px 0;}
#popup p { margin:2px 0; font-size:12px;}
#popup button { margin-top:5px;}
</style>
</head>
<body>

<div class="container">
    <div id="phaseDisplay">フェイズ: サーブ前</div>
    <div id="deckCount"></div>

    <!-- 相手 -->
    <div class="field-wrapper">
        <div class="field enemy">
            <div class="area set-top">セット</div>
            <div class="area side-l">サイド</div>
            <div class="area center">センター</div>
            <div class="area side-r">サイド</div>
            <div class="area deck">デッキ</div>
            <div class="area receive">レシーブ</div>
            <div class="area toss">トス</div>
            <div class="area attack">アタック</div>
            <div class="area drop">ドロップ</div>
            <div class="area set-bottom">セット</div>
            <div class="area serve">サーブ</div>
            <div class="area event">イベント</div>
        </div>
    </div>

    <!-- 自分 -->
    <div class="field-wrapper">
        <div class="field">
            <div class="area set-top">セット</div>
            <div class="area side-l">サイド</div>
            <div class="area center">センター</div>
            <div class="area side-r">サイド</div>
            <div class="area deck">デッキ</div>
            <div class="area receive">レシーブ</div>
            <div class="area toss">トス</div>
            <div class="area attack">アタック</div>
            <div class="area drop">ドロップ</div>
            <div class="area set-bottom">セット</div>
            <div class="area serve">サーブ</div>
            <div class="area event">イベント</div>
        </div>
    </div>

    <!-- 手札 -->
    <div id="hand"></div>
</div>

<!-- カード情報ポップアップ -->
<div id="popup">
    <h3 id="popupName"></h3>
    <p id="popupStats"></p>
    <p id="popupSkill"></p>
    <button onclick="closePopup()">閉じる</button>
</div>

<script>
// ------------------------------
// デッキ定義（サンプル40枚）
const deckData = [
    {name:"田中",serve:5,block:3,receive:4,toss:2,attack:6,skillArea:"レシーブ", skillEffect:["2ガッツ払えばレシーブポイント+1"]}, 
    {name:"佐藤",serve:4,block:5,receive:3,toss:6,attack:3,skillArea:"トス", skillEffect:["2ガッツ払えばトスポイント+1","3ガッツ払えばイベントカード1枚手札"]}, 
    {name:"鈴木",serve:6,block:2,receive:5,toss:3,attack:4,skillArea:"アタック", skillEffect:["3ガッツ払えばアタック+2","相手レシーブ-1"]},
    {name:"高橋",serve:3,block:6,receive:2,toss:5,attack:4,skillArea:"レシーブ", skillEffect:[]},
    {name:"中村",serve:4,block:3,receive:5,toss:4,attack:4,skillArea:"レシーブ", skillEffect:["2ガッツ払えばドロー"]},
    {name:"小林",serve:5,block:4,receive:3,toss:5,attack:5,skillArea:"トス", skillEffect:["3ガッツでイベントカード1枚手札"]},
    {name:"山田",serve:6,block:3,receive:4,toss:3,attack:5,skillArea:"アタック", skillEffect:["アタック+2 相手レシーブ-1"]},
    {name:"松本",serve:3,block:5,receive:4,toss:5,attack:4,skillArea:"トス", skillEffect:[]},
    // イベントカード8枚
    {name:"イベント1",type:"event",skillArea:"イベント", skillEffect:["レシーブ+2 1ドロー"]}, 
    {name:"イベント2",type:"event",skillArea:"イベント", skillEffect:["レシーブ+1 キャラ〇〇なら+2"]}, 
    {name:"イベント3",type:"event",skillArea:"イベント", skillEffect:["トス+1 1ドロー"]}, 
    {name:"イベント4",type:"event",skillArea:"イベント", skillEffect:["トス+1 次ターン相手アタック-1"]}, 
    {name:"イベント5",type:"event",skillArea:"イベント", skillEffect:["アタック+1 1ドロー"]}, 
    {name:"イベント6",type:"event",skillArea:"イベント", skillEffect:["アタック+2 特定キャラで追加効果"]}, 
    {name:"イベント7",type:"event",skillArea:"イベント", skillEffect:["パラメータ+1 1ドロー"]}, 
    {name:"イベント8",type:"event",skillArea:"イベント", skillEffect:["手札が4枚以下でガッツ2枚回収可能"]}
];

// ------------------------------
// ゲーム状態
let gameState = {
    turnPlayer:"player",
    phase:"serve",
    hand:{player:[],enemy:[]},
    deck:{player:[],enemy:[]},
    usedNames:[],
};

// ------------------------------
// カード生成
function createCard(cardData,owner="player"){
    const card = document.createElement("div");
    card.classList.add("card");
    card.innerText = cardData.name;
    card.dataset.name = cardData.name;
    card.dataset.owner = owner;
    card.dataset.type = cardData.type||"char";
    card.dataset.serve = cardData.serve||0;
    card.dataset.block = cardData.block||0;
    card.dataset.receive = cardData.receive||0;
    card.dataset.toss = cardData.toss||0;
    card.dataset.attack = cardData.attack||0;
    card.dataset.skillArea = cardData.skillArea||"";
    card.dataset.skillEffect = JSON.stringify(cardData.skillEffect||[]);
    card.onclick = ()=>showCardInfo(cardData);
    if(owner==="player") document.getElementById("hand").appendChild(card);
    return card;
}

// ------------------------------
// カード情報表示
function showCardInfo(card){
    document.getElementById("popupName").innerText = card.name;
    let stats = "";
    if(card.serve!==undefined) stats+=`サーブ:${card.serve} `;
    if(card.block!==undefined) stats+=`ブロック:${card.block} `;
    if(card.receive!==undefined) stats+=`レシーブ:${card.receive} `;
    if(card.toss!==undefined) stats+=`トス:${card.toss} `;
    if(card.attack!==undefined) stats+=`アタック:${card.attack} `;
    document.getElementById("popupStats").innerText = stats;
    let skillText = `【登場】${card.skillArea}エリア\n`;
    if(card.skillEffect && card.skillEffect.length>0){
        for(let s of card.skillEffect) skillText += `- ${s}\n`;
    } else skillText += "- なし";
    document.getElementById("popupSkill").innerText = skillText;
    document.getElementById("popup").style.display="block";
}
function closePopup(){ document.getElementById("popup").style.display="none"; }

// ------------------------------
// デッキ初期化
function initDecks(){
    const playerDeck = [...deckData];
    const enemyDeck = [...deckData];
    shuffle(playerDeck);
    shuffle(enemyDeck);
    gameState.deck.player = playerDeck;
    gameState.deck.enemy = enemyDeck;
    document.getElementById("deckCount").innerText = "デッキ残枚: "+playerDeck.length;
}

// ------------------------------
// シャッフル
function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

// ------------------------------
// 初期手札6枚ドロー
function drawInitialHand(){
    for(let i=0;i<6;i++){
        const cardData = gameState.deck.player.pop();
        gameState.hand.player.push(createCard(cardData,"player"));
    }
    document.getElementById("deckCount").innerText = "デッキ残枚: "+gameState.deck.player.length;
}

// ------------------------------
// 初期化
initDecks();
drawInitialHand();

</script>
</body>
</html>
