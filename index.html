<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #1a1a1a;
    color: white;
    font-family: sans-serif;
}

/* 高さを安定させる */
.container {
    display: flex;
    flex-direction: column;
    height: 100dvh; /* ← ここ重要（vhの代わり） */
}

/* フィールド */
.field {
    display: grid;
    grid-template-columns: 50px 70px 70px 70px 50px;
    grid-template-rows: 70px 70px 70px;
    gap: 4px;
    justify-content: center;
    align-content: center;
    flex: 1;
}

/* 相手フィールド */
.enemy {
    transform: rotate(180deg);
}

/* 文字は元に戻す */
.enemy .area {
    transform: rotate(180deg);
}

/* エリア */
.area {
    border: 2px solid #fff;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    font-size: 9px;
}

/* カード */
.card {
    width: 40px;
    height: 60px;
    background: white;
    color: black;
    border-radius: 6px;
    font-size: 9px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 2px;
}

/* 手札（高さ固定） */
#hand {
    display: flex;
    justify-content: center;
    gap: 5px;
    height: 70px;
    flex-shrink: 0;
}

/* ===== 配置 ===== */

.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black;}
.center { grid-column:3; grid-row:1; background:#666;}
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black;}
.deck { grid-column:5; grid-row:1; background:orange; color:black;}

.receive { grid-column:2; grid-row:2; background:blue;}
.toss { grid-column:3; grid-row:2; background:green;}
.attack { grid-column:4; grid-row:2; background:red;}
.drop { grid-column:5; grid-row:2; background:orange; color:black;}

.set-bottom { grid-column:1; grid-row:3; background:purple;}
.serve {
    grid-column:2 / span 2;
    grid-row:3;
    background:yellow;
    color:black;
}
.event {
    grid-column:4 / span 2;
    grid-row:3;
    background:white;
    color:black;
}
</style>
</head>

<body>

<div class="container">

    <!-- 相手 -->
    <div class="field enemy">
        <div class="area set-top">セット</div>
        <div class="area side-l">サイド</div>
        <div class="area center">センター</div>
        <div class="area side-r">サイド</div>
        <div class="area deck">デッキ</div>

        <div class="area receive">レシーブ</div>
        <div class="area toss">トス</div>
        <div class="area attack">アタック</div>
        <div class="area drop">ドロップ</div>

        <div class="area set-bottom">セット</div>
        <div class="area serve">サーブ</div>
        <div class="area event">イベント</div>
    </div>

    <!-- 自分 -->
    <div class="field">
        <div class="area set-top">セット</div>
        <div class="area side-l">サイド</div>
        <div class="area center">センター</div>
        <div class="area side-r">サイド</div>
        <div class="area deck">デッキ</div>

        <div class="area receive">レシーブ</div>
        <div class="area toss">トス</div>
        <div class="area attack">アタック</div>
        <div class="area drop">ドロップ</div>

        <div class="area set-bottom">セット</div>
        <div class="area serve">サーブ</div>
        <div class="area event">イベント</div>
    </div>

    <!-- 手札 -->
    <div id="hand"></div>

</div>

<script>
let selectedCard = null;

function createCard(){
    const card = document.createElement("div");
    card.innerText = "カード";
    card.classList.add("card");

    card.onclick = () => {
        selectedCard = card;
    };

    document.getElementById("hand").appendChild(card);
}

/* 最初に3枚出す */
for(let i=0;i<3;i++){
    createCard();
}

document.querySelectorAll(".area").forEach(area=>{
    area.onclick = ()=>{
        if(selectedCard){
            area.appendChild(selectedCard);
            selectedCard = null;
        }
    }
});
</script>

</body>
</html>
