<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Baboca 完全版</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: sans-serif;
    user-select: none;
}

/ 画面切り替え /
.screen {
    display: none;
    padding: 20px;
}
.active {
    display: block;
}

/ タイトル画面 /
.title-button {
    width: 80%;
    margin: 20px auto;
    padding: 20px;
    background: #444;
    text-align: center;
    border-radius: 10px;
    font-size: 22px;
}

/ デッキ編成 /
.tab-buttons {
    display: flex;
    gap: 10px;
}
.tab-button {
    flex: 1;
    padding: 10px;
    background: #555;
    text-align: center;
    border-radius: 6px;
}
.tab-button.active {
    background: #ff9800;
}

.card-list, .deck-list {
    background: #333;
    padding: 10px;
    border-radius: 6px;
    min-height: 200px;
}

.card-item, .deck-item {
    padding: 8px;
    margin: 5px 0;
    background: #444;
    border-radius: 4px;
}

/ デッキ保存ボタン /
.save-button {
    padding: 15px;
    background: #008cff;
    text-align: center;
    border-radius: 8px;
    margin-top: 10px;
}

/ ============================= /
/ あなたのフィールドCSS（統合済） /
/ ============================= /

.court{
  width: 95vw;
  max-width: 520px;
  aspect-ratio: 5/7;
  background:#1a1a1a;
  border:2px solid #444;
  border-radius:12px;
  padding:8px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.row{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:6px;
}

.slot{
  background:#222;
  border:1px solid #555;
  border-radius:6px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#ccc;
  font-size:12px;
}

.cpu{
  transform:rotate(180deg);
}

.net{
  height:4px;
  background:#777;
  border-radius:2px;
}
</style>
</head>

<body>

<!-- タイトル画面 -->
<div id="titleScreen" class="screen active">
    <h1>Baboca</h1>

    <div class="title-button" onclick="goDeckSelect()">ゲーム開始</div>
    <div class="title-button" onclick="openDeckBuilder()">デッキ編成</div>
    <div class="title-button" onclick="openSavedDecks()">保存デッキ一覧</div>
</div>

<!-- デッキ編成画面 -->
<div id="deckBuilderScreen" class="screen">

    <h2>デッキ編成</h2>

    <div class="tab-buttons">
        <div id="tabKarasuno" class="tab-button active" onclick="switchTab('Karasuno')">烏野</div>
        <div id="tabNekoma" class="tab-button" onclick="switchTab('Nekoma')">音駒</div>
    </div>

    <h3>カード一覧</h3>
    <div id="cardList" class="card-list"></div>

    <h3>デッキ（<span id="deckCount">0</span>/40）</h3>
    <div id="deckList" class="deck-list"></div>

    <div class="save-button" onclick="saveDeck()">デッキ保存</div>
    <div class="title-button" onclick="returnTitle()">タイトルへ戻る</div>
</div>

<!-- 保存デッキ一覧 -->
<div id="savedDeckScreen" class="screen">
    <h2>保存デッキ一覧</h2>
    <div id="savedDeckList"></div>

    <div class="title-button" onclick="returnTitle()">タイトルへ戻る</div>
</div>

<!-- デッキ選択画面 -->
<div id="deckSelectScreen" class="screen">
    <h2>デッキ選択</h2>

    <h3>プレイヤーのデッキ</h3>
    <select id="playerDeckSelect"></select>

    <h3>CPUのデッキ</h3>
    <select id="cpuDeckSelect"></select>

    <div class="title-button" onclick="startBattle()">対戦開始</div>
    <div class="title-button" onclick="returnTitle()">タイトルへ戻る</div>
</div>

<!-- バトル画面 -->
<div id="battleScreen" class="screen">

  <h2>バトル</h2>

  <div class="court">

    <div class="row cpu">
      <div class="slot" id="cpuSet">SET</div>
      <div class="slot" id="cpuSideL">SIDE</div>
      <div class="slot" id="cpuCenter">CENTER</div>
      <div class="slot" id="cpuSideR">SIDE</div>
      <div class="slot" id="cpuDeck">DECK</div>
    </div>

    <div class="row cpu">
      <div class="slot" id="cpuBack"></div>
      <div class="slot" id="cpuReceive">RECEIVE</div>
      <div class="slot" id="cpuToss">TOSS</div>
      <div class="slot" id="cpuAttack">ATTACK</div>
      <div class="slot" id="cpuDrop">DROP</div>
    </div>

    <div class="net"></div>

    <div class="row">
      <div class="slot" id="playerBackL"></div>
      <div class="slot" id="playerBackR"></div>
      <div class="slot" id="playerServe">SERVE</div>
      <div class="slot" id="playerEvent">EVENT</div>
      <div class="slot" id="playerDrop"></div>
    </div>

  <h3>手札（6枚）</h3>

  <div class="title-button" onclick="returnTitle()">タイトルへ戻る</div>
</div>

/* ============================================================
   デッキ編成ロジック
   ============================================================ */

let currentTab = "Karasuno";
let selectedDeck = [];

function switchTab(team) {
  currentTab = team;
  document.getElementById("tabKarasuno").classList.remove("active");
  document.getElementById("tabNekoma").classList.remove("active");
  if (team === "Karasuno") {
    document.getElementById("tabKarasuno").classList.add("active");
  } else {
    document.getElementById("tabNekoma").classList.add("active");
  }
  renderCardList();
}

function renderCardList() {
  const list = document.getElementById("cardList");
  list.innerHTML = "";
  allCards
    .filter(c => c.team === currentTab)
    .forEach(card => {
      const count = selectedDeck.filter(x => x.id === card.id).length;
      const div = document.createElement("div");
      div.className = "card-item";
      div.textContent = `${card.id} ${card.name}（${count}枚）`;
      div.onclick = () => addToDeck(card);
      list.appendChild(div);
    });
}

function addToDeck(card) {
  if (selectedDeck.length >= 40) {
    alert("デッキは40枚までです");
    return;
  }
  selectedDeck.push(card);
  selectedDeck.sort((a, b) => a.id.localeCompare(b.id));
  renderDeckList();
  renderCardList();
}

function renderDeckList() {
  const list = document.getElementById("deckList");
  list.innerHTML = "";
  selectedDeck.forEach((card, index) => {
    const div = document.createElement("div");
    div.className = "deck-item";
    div.textContent = `${card.id} ${card.name}`;
    div.onclick = () => removeFromDeck(index);
    list.appendChild(div);
  });
  document.getElementById("deckCount").textContent = selectedDeck.length;
}

function removeFromDeck(index) {
  selectedDeck.splice(index, 1);
  renderDeckList();
  renderCardList();
}

function saveDeck() {
  if (selectedDeck.length !== 40) {
    alert("デッキは40枚ちょうどにしてください");
    return;
  }
  const name = prompt("デッキ名を入力してください");
  if (!name) return;

  const decks = JSON.parse(localStorage.getItem("babocaDecks") || "[]");
  decks.push({ name, cards: selectedDeck });
  localStorage.setItem("babocaDecks", JSON.stringify(decks));
  alert("保存しました");
}

/* ============================================================
   保存デッキ一覧・削除
   ============================================================ */

function loadSavedDecks() {
  const decks = JSON.parse(localStorage.getItem("babocaDecks") || "[]");
  const list = document.getElementById("savedDeckList");
  list.innerHTML = "";
  decks.forEach((deck, index) => {
    const div = document.createElement("div");
    div.className = "deck-item";
    div.textContent = `${deck.name}（${deck.cards.length}枚）`;

    const btn = document.createElement("button");
    btn.textContent = "削除";
    btn.style.marginLeft = "10px";
    btn.onclick = () => {
      const d = JSON.parse(localStorage.getItem("babocaDecks") || "[]");
      d.splice(index, 1);
      localStorage.setItem("babocaDecks", JSON.stringify(d));
      loadSavedDecks();
    };

    div.appendChild(btn);
    list.appendChild(div);
  });
}

/* ============================================================
   画面切り替え
   ============================================================ */

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function returnTitle() {
  showScreen("titleScreen");
}

function openDeckBuilder() {
  showScreen("deckBuilderScreen");
  renderCardList();
  renderDeckList();
}

function openSavedDecks() {
  showScreen("savedDeckScreen");
  loadSavedDecks();
}

function goDeckSelect() {
  loadDeckSelectOptions();
  showScreen("deckSelectScreen");
}

/* ============================================================
   デッキ選択 → バトル開始
   ============================================================ */

let playerDeck = [];
let cpuDeck = [];
let playerDeckStack = [];
let cpuDeckStack = [];
let playerHand = [];

function loadDeckSelectOptions() {
  const decks = JSON.parse(localStorage.getItem("babocaDecks") || "[]");
  const pSel = document.getElementById("playerDeckSelect");
  const cSel = document.getElementById("cpuDeckSelect");
  pSel.innerHTML = "";
  cSel.innerHTML = "";

  decks.forEach((deck, i) => {
    const op1 = document.createElement("option");
    op1.value = i;
    op1.textContent = deck.name;
    pSel.appendChild(op1);

    const op2 = document.createElement("option");
    op2.value = i;
    op2.textContent = deck.name;
    cSel.appendChild(op2);
  });
}

function startBattle() {
  const decks = JSON.parse(localStorage.getItem("babocaDecks") || "[]");
  const pIndex = document.getElementById("playerDeckSelect").value;
  const cIndex = document.getElementById("cpuDeckSelect").value;
  if (pIndex === "" || cIndex === "") {
    alert("デッキを選択してください");
    return;
  }

  playerDeck = JSON.parse(JSON.stringify(decks[pIndex].cards));
  cpuDeck = JSON.parse(JSON.stringify(decks[cIndex].cards));

  playerDeckStack = shuffle([...playerDeck]);
  cpuDeckStack = shuffle([...cpuDeck]);

  playerHand = [];
  for (let i = 0; i < 6; i++) {
    drawCardToHand();
  }

  renderHand();
  clearField();
  showScreen("battleScreen");
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function drawCardToHand() {
  if (playerDeckStack.length === 0) return;
  const card = playerDeckStack.shift();
  playerHand.push(card);
}

function renderHand() {
  const handDiv = document.getElementById("playerHand");
  handDiv.innerHTML = "";
  playerHand.forEach((card, index) => {
    const div = document.createElement("div");
    div.className = "card-item";
    div.textContent = `${card.id} ${card.name}`;
    div.onclick = () => playCardFromHand(index);
    handDiv.appendChild(div);
  });
}

/* ============================================================
   フィールド簡易処理（とりあえず SERVE に出す）
   ============================================================ */

function clearField() {
  const ids = [
    "cpuSet","cpuSideL","cpuCenter","cpuSideR","cpuDeck",
    "cpuBack","cpuReceive","cpuToss","cpuAttack","cpuDrop",
    "playerBackL","playerBackR","playerServe","playerEvent","playerDrop"
  ];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = el.id.toUpperCase().replace("PLAYER","").replace("CPU","");
  });
}

function playCardFromHand(index) {
  const card = playerHand[index];
  const serveSlot = document.getElementById("playerServe");
  if (serveSlot.dataset.cardId) {
    alert("SERVE にはすでにカードがあります（今は1枚だけにしてる）");
    return;
  }
  serveSlot.textContent = card.name;
  serveSlot.dataset.cardId = card.id;
  playerHand.splice(index, 1);
  renderHand();
}

/* ============================================================
   初期化
   ============================================================ */

window.addEventListener("load", () => {
  showScreen("titleScreen");
});
</script>

</body>
