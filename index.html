<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦</title>
<style>
html, body { margin:0; padding:0; overflow:hidden; background:#1a1a1a; color:white; font-family:sans-serif;}
.container { display:flex; flex-direction:column; height:100dvh;}/* ===== フィールド見た目（絶対変更しない）===== */ .field-wrapper {display:flex;justify-content:center;align-items:center;flex:1;} .field {display:grid;grid-template-columns:50px 70px 70px 70px 50px;grid-template-rows:70px 70px 70px;gap:6px;} .enemy {transform:rotate(180deg);} .enemy .area {transform:rotate(180deg);} .area {border:2px solid #fff;border-radius:8px;display:flex;justify-content:center;align-items:center;flex-wrap:wrap;font-size:9px;position:relative;text-align:center;} .set-top { grid-column:1; grid-row:1; background:purple; } .side-l { grid-column:2; grid-row:1; background:#ccc; color:black;} .center { grid-column:3; grid-row:1; background:#666;} .side-r { grid-column:4; grid-row:1; background:#ccc; color:black;} .deck { grid-column:5; grid-row:1; background:orange; color:black;} .receive { grid-column:2; grid-row:2; background:blue;} .toss { grid-column:3; grid-row:2; background:green;} .attack { grid-column:4; grid-row:2; background:red;} .drop { grid-column:5; grid-row:2; background:orange; color:black;} .set-bottom { grid-column:1; grid-row:3; background:purple;} .serve { grid-column:3; grid-row:3; background:yellow; color:black;} .event { grid-column:4; grid-row:3; background:white; color:black;}

.card { width:40px;height:60px;background:white;color:black;border-radius:6px;font-size:9px;display:flex;justify-content:center;align-items:center;margin:2px;cursor:pointer;position:relative;} #hand { display:flex;justify-content:center;gap:5px;height:80px;margin-top:5px;} #setUpUI { text-align:center;margin:5px;} button { padding:4px 8px;margin:2px;} </style>

</head>
<body>
<div class="container">
<div id="phaseDisplay">フェイズ: サーブ前</div>
<div id="setUpUI"></div><div class="field-wrapper"><div class="field enemy">
<div class="area set-top">セット</div><div class="area side-l">サイド</div><div class="area center">センター</div><div class="area side-r">サイド</div><div class="area deck">デッキ</div>
<div class="area receive">レシーブ</div><div class="area toss">トス</div><div class="area attack">アタック</div><div class="area drop">ドロップ</div>
<div class="area set-bottom">セット</div><div class="area serve">サーブ</div><div class="area event">イベント</div>
</div></div><div class="field-wrapper"><div class="field">
<div class="area set-top">セット</div><div class="area side-l">サイド</div><div class="area center">センター</div><div class="area side-r">サイド</div><div class="area deck">デッキ</div>
<div class="area receive">レシーブ</div><div class="area toss">トス</div><div class="area attack">アタック</div><div class="area drop">ドロップ</div>
<div class="area set-bottom">セット</div><div class="area serve" id="playerServe">サーブ</div><div class="area event">イベント</div>
</div></div><div id="hand"></div>
</div><script>
let gameState={deck:[],hand:[],phase:null,turnPlayer:null,selected:null};

// カード生成（パラメータ付き）
for(let i=1;i<=40;i++){
    gameState.deck.push({
        name:"キャラ"+i,
        serve:Math.floor(Math.random()*3),
        receive:Math.floor(Math.random()*5),
        toss:Math.floor(Math.random()*3),
        attack:Math.floor(Math.random()*4),
        block:Math.floor(Math.random()*3)
    });
}

function shuffle(){for(let i=gameState.deck.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[gameState.deck[i],gameState.deck[j]]=[gameState.deck[j],gameState.deck[i]];}}
shuffle();

function updateDeck(){document.querySelectorAll('.deck').forEach(d=>d.innerText="デッキ\n"+gameState.deck.length);}

function createCard(c){
    let div=document.createElement('div');
    div.className='card';
    div.innerText=c.name;

    let detail=document.createElement('div');
    detail.style.position='absolute';
    detail.style.top='-70px';
    detail.style.background='#333';
    detail.style.fontSize='9px';
    detail.style.display='none';
    detail.innerText=`S:${c.serve} R:${c.receive} T:${c.toss} A:${c.attack} B:${c.block}`;

    div.appendChild(detail);
    div.onmouseover=()=>detail.style.display='block';
    div.onmouseout=()=>detail.style.display='none';

    div.onclick=()=>{
        gameState.selected=c;
    };

    document.getElementById('hand').appendChild(div);
}

function draw(){let c=gameState.deck.shift();gameState.hand.push(c);createCard(c);updateDeck();}

// サイコロ
function startDice(){
    let ui=document.getElementById('setUpUI');
    ui.innerHTML='サイコロを振る';

    let btn=document.createElement('button');
    btn.innerText='振る';

    btn.onclick=()=>{
        let p=Math.floor(Math.random()*6)+1;
        let e=Math.floor(Math.random()*6)+1;

        ui.innerHTML=`あなた:${p} CPU:${e}`;

        let win=(p>=e)?'player':'enemy';

        if(win==='player'){
            let s=document.createElement('button');
            s.innerText='サーブ';
            s.onclick=()=>startServe('player');

            let r=document.createElement('button');
            r.innerText='レシーブ';
            r.onclick=()=>startServe('enemy');

            ui.appendChild(document.createElement('br'));
            ui.appendChild(s);
            ui.appendChild(r);
        }else{
            let cpuChoice=Math.random()>0.5?'player':'enemy';
            startServe(cpuChoice);
        }
    };

    ui.appendChild(btn);
}

function startServe(server){
    gameState.turnPlayer=server;
    gameState.phase='serve';
    document.getElementById('phaseDisplay').innerText='フェイズ: サーブ（'+server+'）';
    document.getElementById('setUpUI').innerHTML='';
}

// 配置（まずサーブだけ）
document.getElementById('playerServe').onclick=()=>{
    if(gameState.phase!=='serve') return;
    if(gameState.turnPlayer!=='player') return;
    if(!gameState.selected) return;

    let area=document.getElementById('playerServe');
    let cardDiv=document.createElement('div');
    cardDiv.className='card';
    cardDiv.innerText=gameState.selected.name;

    area.appendChild(cardDiv);

    gameState.phase='draw';
    document.getElementById('phaseDisplay').innerText='フェイズ: ドロー';
};

window.onload=()=>{
    for(let i=0;i<6;i++) draw();
    updateDeck();
    startDice();
};
</script></body>
</html>
