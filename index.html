<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>バボカBREAK - Playable Fix</title>
    <style>
        :root {
            --court-color: #e67e22;
            --card-width: 54px;
            --card-height: 78px;
            --color-ws: #e74c3c; --color-s: #3498db; --color-li: #2ecc71; --color-mb: #f1c40f;
        }
        body {
            margin: 0; padding: 0; background: #1a1a1a;
            font-family: sans-serif; color: white; overflow: hidden; touch-action: manipulation;
        }
        
        /* 演出用 */
        #cut-in {
            position: fixed; top: 40%; left: -100%; width: 200%; height: 50px;
            background: rgba(241, 196, 15, 0.95); color: #000;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 20px; z-index: 2000; transform: skewX(-20deg) translateY(-50%);
            transition: 0.4s ease-out; pointer-events: none; border-y: 2px solid #000;
        }
        #cut-in.active { left: -50%; }

        #game-screen { display: flex; flex-direction: column; height: 100vh; }

        /* ヘッダー：見切れ防止のため高さを確保 */
        .header {
            height: 60px; background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; border-bottom: 2px solid #f1c40f; flex-shrink: 0;
        }
        .phase-name { font-size: 11px; color: #f1c40f; font-weight: bold; }
        .battle-info { font-size: 16px; font-weight: bold; }

        /* 5x3 コートレイアウト：スマホで収まるよう調整 */
        .court-grid {
            flex: 1; background: var(--court-color);
            display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(3, 1fr);
            gap: 2px; padding: 4px; border: 2px solid #fff; margin: 2px; border-radius: 8px;
        }
        .area-slot {
            border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
            background: rgba(0,0,0,0.1); position: relative;
            display: flex; justify-content: center; align-items: flex-start; padding-top: 12px;
        }
        .label {
            position: absolute; top: 0; left: 0; right: 0; background: #333;
            font-size: 7px; text-align: center; border-radius: 2px 2px 0 0;
        }

        /* カードデザイン */
        .card {
            width: var(--card-width); height: var(--card-height);
            background: #fff; color: #333; border-radius: 4px;
            position: absolute; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; padding: 2px; box-sizing: border-box; font-weight: bold;
        }
        .card-name { font-size: 8px; text-align: center; line-height: 1; margin-bottom: 2px; }
        .card-stats { font-size: 7px; color: #666; }
        .card.guts { filter: brightness(0.6); }

        /* UIエリア */
        .ui-panel { height: 35%; background: #2c3e50; padding: 5px; display: flex; flex-direction: column; flex-shrink: 0; }
        .hand-scroll { flex: 1; display: flex; gap: 5px; overflow-x: auto; align-items: center; padding: 5px 0; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        
        button { padding: 10px; border: none; border-radius: 6px; font-weight: bold; color: white; font-size: 11px; cursor: pointer; }
        .btn-main { background: #27ae60; grid-column: span 2; }
        .btn-choice { background: #8e44ad; }
        .btn-end { background: #d35400; grid-column: span 2; }
        
        .point-badge {
            position: absolute; bottom: 0; right: 0; background: #f1c40f; color: #000;
            width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 10px; border: 1px solid #000; z-index: 70;
        }
    </style>
</head>
<body>

<div id="cut-in">PHASE UP</div>

<div id="game-screen">
    <div class="header">
        <div id="phase-label" class="phase-name">READY</div>
        <div id="battle-display" class="battle-info">VOBOCA! WEB</div>
    </div>

    <div class="court-grid">
        <div class="area-slot"><div class="label">SET</div><div class="stack" id="stk-set"></div></div>
        <div class="area-slot"><div class="label">SIDE(L)</div><div class="stack" id="stk-blockL"></div><div class="point-badge" id="val-blockL">0</div></div>
        <div class="area-slot"><div class="label">CENTER</div><div class="stack" id="stk-blockC"></div><div class="point-badge" id="val-blockC">0</div></div>
        <div class="area-slot"><div class="label">SIDE(R)</div><div class="stack" id="stk-blockR"></div><div class="point-badge" id="val-blockR">0</div></div>
        <div class="area-slot"><div class="label">DECK</div><div class="stack" id="stk-deck"></div></div>

        <div class="area-slot" style="border:none; background:none;"></div>
        <div class="area-slot"><div class="label">RECEIVE</div><div class="stack" id="stk-receive"></div><div class="point-badge" id="val-receive">0</div></div>
        <div class="area-slot"><div class="label">TOSS</div><div class="stack" id="stk-toss"></div><div class="point-badge" id="val-toss">0</div></div>
        <div class="area-slot"><div class="label">ATTACK</div><div class="stack" id="stk-attack"></div><div class="point-badge" id="val-attack">0</div></div>
        <div class="area-slot"><div class="label">DROP</div><div class="stack" id="stk-drop"></div></div>

        <div class="area-slot" style="border:none; background:none;"></div>
        <div class="area-slot" style="border:none; background:none;"></div>
        <div class="area-slot"><div class="label">SERVE</div><div class="stack" id="stk-serve"></div><div class="point-badge" id="val-serve">0</div></div>
        <div class="area-slot"><div class="label">EVENT</div><div class="stack" id="stk-event"></div></div>
        <div class="area-slot" style="border:none; background:none;"></div>
    </div>

    <div class="ui-panel">
        <div class="hand-scroll" id="hand-list"></div>
        <div id="ui-btns" class="action-grid"></div>
    </div>
</div>

<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; flex-direction:column; align-items:center; justify-content:center;">
    <h3 style="color:#fff">どのエリアに出す？</h3>
    <div id="modal-btns" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; width:80%"></div>
</div>

<script>
    // キャラデータベース（バリエーション追加）
    const CHAR_DATA = [
        { name: "日向(WS)", S:1, R:2, T:1, A:6, B:1, color: "var(--color-ws)" },
        { name: "影山(S)",  S:4, R:2, T:6, A:2, B:3, color: "var(--color-s)" },
        { name: "西谷(Li)", S:1, R:7, T:1, A:1, B:1, color: "var(--color-li)" },
        { name: "月島(MB)", S:2, R:2, T:1, A:2, B:6, color: "var(--color-mb)" },
        { name: "澤村(WS)", S:2, R:5, T:2, A:3, B:3, color: "var(--color-ws)" }
    ];

    let state = {
        deck: [], hand: [], set: [], drop: [],
        areas: { serve:[], receive:[], toss:[], attack:[], blockL:[], blockC:[], blockR:[], event:[] },
        phase: "WAITING", opPower: 0
    };

    function showCutIn(text) {
        const el = document.getElementById('cut-in');
        el.innerText = text; el.classList.add('active');
        setTimeout(() => el.classList.remove('active'), 800);
    }

    function init() {
        // デッキを40枚作成（1枚しかない問題を解決）
        state.deck = [];
        for(let i=0; i<40; i++) {
            state.deck.push({...CHAR_DATA[i % CHAR_DATA.length], id:i});
        }
        state.deck.sort(() => Math.random() - 0.5);
        state.hand = []; state.set = []; state.drop = [];
        Object.keys(state.areas).forEach(k => state.areas[k] = []);
        
        // 初期ドロー
        for(let i=0; i<6; i++) draw();
        for(let i=0; i<2; i++) state.set.push(state.deck.pop());
        
        movePhase("SERVE");
    }

    function draw() {
        if(state.deck.length > 0) state.hand.push(state.deck.pop());
    }

    function movePhase(p) {
        state.phase = p;
        showCutIn(p);
        if(p === "RECEIVE") {
            state.opPower = Math.floor(Math.random() * 6) + 3; // 敵打点 3~8
            draw(); // レシーブフェイズ開始時に1枚ドロー
        }
        render();
    }

    function render() {
        document.getElementById('phase-label').innerText = state.phase + " PHASE";
        const bDisp = document.getElementById('battle-display');
        
        // バトル状況表示
        if(state.phase === "RECEIVE") {
            const rp = state.areas.receive[0]?.R || 0;
            bDisp.innerText = `敵打点:${state.opPower} vs レシーブ:${rp}`;
            bDisp.style.color = rp >= state.opPower ? "#2ecc71" : "#e74c3c";
        } else if(state.phase === "ATTACK") {
            const tp = state.areas.toss[0]?.T || 0;
            const ap = state.areas.attack[0]?.A || 0;
            bDisp.innerText = `攻撃ポイント合計: ${tp + ap}`;
            bDisp.style.color = "#f1c40f";
        } else {
            bDisp.innerText = "VOBOCA! WEB";
            bDisp.style.color = "#fff";
        }

        // 手札表示
        const handEl = document.getElementById('hand-list');
        handEl.innerHTML = '';
        state.hand.forEach((c, i) => {
            const d = document.createElement('div');
            d.className = 'card';
            d.style.borderTop = `4px solid ${c.color}`;
            d.innerHTML = `<div class="card-name">${c.name}</div><div class="card-stats">R${c.R} A${c.A}</div>`;
            d.onclick = () => openSelect(i);
            handEl.appendChild(d);
        });

        // エリア描画
        Object.keys(state.areas).forEach(k => {
            const el = document.getElementById('stk-' + k); el.innerHTML = '';
            state.areas[k].forEach((c, i) => {
                const div = document.createElement('div');
                div.className = 'card ' + (i===0?'':'guts');
                if(i===0) div.style.borderTop = `4px solid ${c.color}`;
                div.style.zIndex = 50 - i;
                if(i > 0) div.style.transform = `translateY(${i*2}px)`;
                div.innerHTML = i===0 ? `<div class="card-name">${c.name}</div>` : "";
                el.appendChild(div);
            });
            const badge = document.getElementById('val-' + k);
            if(badge) {
                const char = state.areas[k][0];
                let v = 0;
                if(char) {
                    if(k==='serve') v=char.S; else if(k==='receive') v=char.R;
                    else if(k==='toss') v=char.T; else if(k==='attack') v=char.A;
                    else v=char.B;
                }
                badge.innerText = v;
            }
        });

        // 山札等の簡易表示
        const drawSmall = (id, count, label) => {
            const el = document.getElementById(id); el.innerHTML = '';
            if(count > 0) {
                const c = document.createElement('div');
                c.className = 'card guts'; c.innerText = label + count;
                el.appendChild(c);
            }
        };
        drawSmall('stk-deck', state.deck.length, "山:");
        drawSmall('stk-set', state.set.length, "点:");
        drawSmall('stk-drop', state.drop.length, "墓:");

        // ボタン制御
        const btnEl = document.getElementById('ui-btns');
        btnEl.innerHTML = '';
        const p = state.phase;
        if(p === "WAITING") btnEl.innerHTML = '<button class="btn-main" onclick="init()">GAME START</button>';
        else if(p === "SERVE") btnEl.innerHTML = '<button class="btn-end" onclick="movePhase(\'END\')">サーブ完了</button>';
        else if(p === "START") btnEl.innerHTML = '<button class="btn-choice" onclick="movePhase(\'RECEIVE\')">レシーブ</button><button class="btn-choice" onclick="movePhase(\'BLOCK\')">ブロック</button>';
        else if(p === "RECEIVE") {
            const ok = (state.areas.receive[0]?.R || 0) >= state.opPower;
            btnEl.innerHTML = `<button class="btn-end" onclick="${ok ? "movePhase('TOSS')" : "lost()"}">${ok ? "レシーブ成功 → トスへ" : "拾えない！ (ロスト)"}</button>`;
        }
        else if(p === "TOSS") btnEl.innerHTML = '<button class="btn-end" onclick="movePhase(\'ATTACK\')">トス完了 → アタックへ</button>';
        else if(p === "ATTACK") btnEl.innerHTML = '<button class="btn-end" onclick="movePhase(\'END\')">アタック完了 (合計判定へ)</button>';
        else if(p === "END") btnEl.innerHTML = '<button class="btn-main" onclick="executeEnd()">ラリー継続 (相手ターンへ)</button>';
        
        if(p !== "WAITING") btnEl.innerHTML += '<button onclick="lost()" style="background:#c0392b; grid-column:span 2; font-size:9px; padding:4px;">ロスト(失点)を認める</button>';
    }

    function openSelect(idx) {
        const modal = document.getElementById('modal');
        const btns = document.getElementById('modal-btns');
        let ts = [{n:'EVENT', k:'event'}];
        const p = state.phase;
        if(p==="SERVE") ts.push({n:'SERVE', k:'serve'});
        else if(p==="RECEIVE") ts.push({n:'RECEIVE', k:'receive'});
        else if(p==="TOSS") ts.push({n:'TOSS', k:'toss'});
        else if(p==="ATTACK") ts.push({n:'ATTACK', k:'attack'});
        else if(p==="BLOCK") ts.push({n:'センター',k:'blockC'},{n:'左サイド',k:'blockL'},{n:'右サイド',k:'blockR'});
        
        modal.style.display = 'flex'; btns.innerHTML = '';
        ts.forEach(t => {
            const b = document.createElement('button');
            b.innerText = t.n; b.style.background = "#2980b9";
            b.onclick = () => {
                state.areas[t.k].unshift(state.hand.splice(idx,1)[0]);
                modal.style.display = 'none'; render();
            };
            btns.appendChild(b);
        });
    }

    function executeEnd() {
        // 次のターンの準備
        Object.keys(state.areas).forEach(k => {
            if(k === 'blockL' || k === 'blockR') {
                while(state.areas[k].length > 0) state.drop.push(state.areas[k].shift());
            } else {
                // キャラをガッツに回す処理
                if(state.areas[k].length > 0) {
                    // 実際にはそのまま残して、次に重ねた時に下になる
                }
            }
        });
        movePhase("START");
    }

    function lost() {
        if(state.set.length === 0) { alert("ゲームセット！敗北しました。"); location.reload(); return; }
        state.hand.push(state.set.pop());
        while(state.hand.length < 6) draw();
        Object.keys(state.areas).forEach(k => {
            while(state.areas[k].length > 0) state.drop.push(state.areas[k].shift());
        });
        movePhase("SERVE");
    }

    render();
</script>
</body>
</html>
