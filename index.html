<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Baboca 完全版</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: sans-serif;
    user-select: none;
}

/* 画面切り替え */
.screen {
    display: none;
    padding: 20px;
}
.active {
    display: block;
}

/* タイトル画面 */
.title-button {
    width: 80%;
    margin: 20px auto;
    padding: 20px;
    background: #444;
    text-align: center;
    border-radius: 10px;
    font-size: 22px;
}

/* デッキ編成 */
.deck-builder {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.tab-buttons {
    display: flex;
    gap: 10px;
}
.tab-button {
    flex: 1;
    padding: 10px;
    background: #555;
    text-align: center;
    border-radius: 6px;
}
.tab-button.active {
    background: #ff9800;
}

.card-list, .deck-list {
    background: #333;
    padding: 10px;
    border-radius: 6px;
    min-height: 200px;
}

.card-item, .deck-item {
    padding: 8px;
    margin: 5px 0;
    background: #444;
    border-radius: 4px;
}

/* デッキ保存ボタン */
.save-button {
    padding: 15px;
    background: #008cff;
    text-align: center;
    border-radius: 8px;
    margin-top: 10px;
}

/* ============================= */
/* あなたのフィールドCSS（統合済） */
/* ============================= */

.court{
  width: 95vw;
  max-width: 520px;
  aspect-ratio: 5/7;
  background:#1a1a1a;
  border:2px solid #444;
  border-radius:12px;
  padding:8px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.row{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:6px;
}

.slot{
  background:#222;
  border:1px solid #555;
  border-radius:6px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#ccc;
  font-size:12px;
}

.cpu{
  transform:rotate(180deg);
}

.net{
  height:4px;
  background:#777;
  border-radius:2px;
}
</style>
</head>

<body>

<!-- ＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝ -->
<!-- タイトル画面 -->
<!-- ＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝ -->
<div id="titleScreen" class="screen active">
    <h1>Baboca</h1>

    <div class="title-button" onclick="goDeckSelect()">ゲーム開始</div>
    <div class="title-button" onclick="openDeckBuilder()">デッキ編成</div>
    <div class="title-button" onclick="openSavedDecks()">保存デッキ一覧</div>
</div>

<!-- ＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝ -->
<!-- デッキ編成画面 -->
<!-- ＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝ -->
<div id="deckBuilderScreen" class="screen">

    <h2>デッキ編成</h2>

    <div class="tab-buttons">
        <div id="tabKarasuno" class="tab-button active" onclick="switchTab('karasuno')">烏野</div>
        <div id="tabNekoma" class="tab-button" onclick="switchTab('nekoma')">音駒</div>
    </div>

    <h3>カード一覧</h3>
    <div id="cardList" class="card-list"></div>

    <h3>デッキ（40枚）</h3>
    <div id="deckList" class="deck-list"></div>

    <div class="save-button" onclick="saveDeck()">デッキ保存</div>
    <div class="title-button" onclick="returnTitle()">タイトルへ戻る</div>
</div>
