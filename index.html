<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦</title>
<style>
html, body { margin:0; padding:0; overflow:hidden; background:#1a1a1a; color:white; font-family:sans-serif;}
.container { display:flex; flex-direction:column; height:100dvh;}
.field-wrapper { display:flex; justify-content:center; align-items:center; flex:1;}
.field { display:grid; grid-template-columns:50px 70px 70px 70px 50px; grid-template-rows:70px 70px 70px; gap:6px;}
.enemy { transform:rotate(180deg);}
.enemy .area { transform:rotate(180deg);}/* ←ここが元デザイン（変更なし） */ .set-top { grid-column:1; grid-row:1; background:purple; } .side-l { grid-column:2; grid-row:1; background:#ccc; color:black; } .center { grid-column:3; grid-row:1; background:#666; } .side-r { grid-column:4; grid-row:1; background:#ccc; color:black; } .deck { grid-column:5; grid-row:1; background:orange; color:black; }

.receive { grid-column:2; grid-row:2; background:blue; } .toss { grid-column:3; grid-row:2; background:green; } .attack { grid-column:4; grid-row:2; background:red; } .drop { grid-column:5; grid-row:2; background:black; }

.set-bottom { grid-column:1; grid-row:3; background:purple; } .serve { grid-column:2; grid-row:3; background:yellow; color:black; } .event { grid-column:3; grid-row:3; background:pink; color:black; }

.area { border:2px solid #fff; border-radius:8px; display:flex; justify-content:center; align-items:center; flex-wrap:wrap; font-size:9px; position: relative; text-align:center; }

.card { width:40px; height:60px; background:white; color:black; border-radius:6px; font-size:9px; display:flex; justify-content:center; align-items:center; margin:2px; cursor:pointer;} #hand { display:flex; justify-content:center; gap:5px; height:80px; flex-shrink:0; margin-top:5px;} #setUpUI { text-align:center; margin:5px;} button { padding:4px 8px; margin:2px; font-size:12px;} .card-detail { position:absolute; top:-150px; left:0; width:150px; background:#333; border:1px solid #fff; border-radius:6px; padding:4px; display:none; font-size:10px; z-index:10;} </style>

</head>
<body>
<div class="container">
    <div id="phaseDisplay" style="text-align:center; margin:5px;">フェイズ: サーブ前</div>
    <div id="setUpUI"></div><div class="field-wrapper">
    <div class="field enemy">
        <div class="area set-top">セット</div>
        <div class="area side-l">サイド</div>
        <div class="area center">センター</div>
        <div class="area side-r">サイド</div>
        <div class="area deck">デッキ</div>
        <div class="area receive">レシーブ</div>
        <div class="area toss">トス</div>
        <div class="area attack">アタック</div>
        <div class="area drop">ドロップ</div>
        <div class="area set-bottom">セット</div>
        <div class="area serve">サーブ</div>
        <div class="area event">イベント</div>
    </div>
</div>

<div class="field-wrapper">
    <div class="field">
        <div class="area set-top">セット</div>
        <div class="area side-l">サイド</div>
        <div class="area center">センター</div>
        <div class="area side-r">サイド</div>
        <div class="area deck">デッキ</div>
        <div class="area receive">レシーブ</div>
        <div class="area toss">トス</div>
        <div class="area attack">アタック</div>
        <div class="area drop">ドロップ</div>
        <div class="area set-bottom">セット</div>
        <div class="area serve">サーブ</div>
        <div class="area event">イベント</div>
    </div>
</div>

<div id="hand"></div>

</div><script>
// ===== ゲームロジック強化 =====
const phases1 = ["serve","draw","receive","toss","attack"];
const phases2 = ["start","draw","receive","attack"];

let gameState = {
    turnPlayer:null,
    phase:null,
    turnCount:1,
    deck:[],
    hand:{player:[],enemy:[]},
    selectedCard:null,
    mulliganSelected:[]
};

const characters = [];
for(let i=1;i<=40;i++){
    characters.push({name:"キャラ"+i,serve:Math.floor(Math.random()*3),block:Math.floor(Math.random()*3),receive:Math.floor(Math.random()*6),toss:Math.floor(Math.random()*3),attack:Math.floor(Math.random()*4)});
}

gameState.deck = [...characters];

function shuffleDeck(){
    for(let i=gameState.deck.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [gameState.deck[i],gameState.deck[j]]=[gameState.deck[j],gameState.deck[i]];
    }
}
shuffleDeck();

function updateDeckDisplay(){
    document.querySelectorAll('.deck').forEach(d=>{
        d.innerText = "デッキ
"+gameState.deck.length;
    });
}

function drawCard(owner){
    if(gameState.deck.length>0){
        const c = gameState.deck.shift();
        gameState.hand[owner].push(c);
        if(owner==='player') createCardElement(c);
        updateDeckDisplay();
    }
}

function createCardElement(card){
    const div = document.createElement('div');
    div.classList.add('card');
    div.innerText = card.name;

    div.onclick=()=>{
        if(gameState.phase===null){
            // マリガン選択
            div.style.border = div.style.border?"":"2px solid red";
            if(gameState.mulliganSelected.includes(card)){
                gameState.mulliganSelected = gameState.mulliganSelected.filter(c=>c!==card);
            }else{
                gameState.mulliganSelected.push(card);
            }
        }
    };

    document.getElementById('hand').appendChild(div);
}

function showMulligan(){
    const ui = document.getElementById("setUpUI");
    ui.innerHTML='戻すカードを選択→確定';

    const btn = document.createElement('button');
    btn.innerText='マリガン確定';
    btn.onclick=()=>{
        // 戻す
        gameState.mulliganSelected.forEach(c=>{
            gameState.hand.player = gameState.hand.player.filter(x=>x!==c);
            gameState.deck.push(c);
        });

        shuffleDeck();

        // 引き直し
        let drawCount = gameState.mulliganSelected.length;
        for(let i=0;i<drawCount;i++) drawCard('player');

        ui.innerHTML='';
        startDiceRoll();
    };

    ui.appendChild(btn);
}

function startGame(){
    for(let i=0;i<6;i++) drawCard('player');
    for(let i=0;i<6;i++) drawCard('enemy');
    updateDeckDisplay();
    showMulligan();
}

function startDiceRoll(){
    const ui = document.getElementById('setUpUI');
    ui.innerHTML='サイコロで先攻決定';

    const btn = document.createElement('button');
    btn.innerText='振る';

    btn.onclick=()=>{
        const p=Math.floor(Math.random()*6)+1;
        const e=Math.floor(Math.random()*6)+1;

        alert(`あなた:${p} CPU:${e}`);

        gameState.turnPlayer=(p>=e)?'player':'enemy';

        // サーブorレシーブ選択
        if(gameState.turnPlayer==='player'){
            ui.innerHTML='どっちにする？';

            const serveBtn=document.createElement('button');
            serveBtn.innerText='サーブ';
            serveBtn.onclick=()=>startServe('player');

            const receiveBtn=document.createElement('button');
            receiveBtn.innerText='レシーブ';
            receiveBtn.onclick=()=>startServe('enemy');

            ui.appendChild(serveBtn);
            ui.appendChild(receiveBtn);
        }else{
            // CPU自動選択
            const cpuChoice = Math.random()>0.5?'player':'enemy';
            startServe(cpuChoice);
        }
    };

    ui.appendChild(btn);
}

function startServe(server){
    gameState.turnPlayer = server;
    gameState.phase='serve';
    document.getElementById('phaseDisplay').innerText='フェイズ: サーブ（'+server+'）';
    document.getElementById('setUpUI').innerHTML='';
}

startGame();
</script></body>
</html>
