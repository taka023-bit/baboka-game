<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦</title><style>
html, body {
    margin:0;
    padding:0;
    overflow:hidden;
    background:#1a1a1a;
    color:white;
    font-family:sans-serif;
}

.container {
    display:flex;
    flex-direction:column;
    height:100dvh;
    padding:5px;
}

#topUI {
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    margin-bottom:4px;
}

.field-wrapper {
    display:flex;
    justify-content:center;
    align-items:center;
    flex:1;
    gap:20px;
}

.field {
    display:grid;
    grid-template-columns:50px 70px 70px 70px 50px;
    grid-template-rows:70px 70px 70px;
    gap:4px;
}

.enemy {
    transform:rotate(180deg);
}

.enemy .area {
    transform:rotate(180deg);
}

.area {
    border:2px solid #fff;
    border-radius:6px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    font-size:9px;
    position:relative;
    text-align:center;
}

/* ===== 配置（絶対変更不可） ===== */
.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black; }
.center { grid-column:3; grid-row:1; background:#666; }
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black; }
.deck { grid-column:5; grid-row:1; background:orange; color:black; }

.receive { grid-column:2; grid-row:2; background:blue; }
.toss { grid-column:3; grid-row:2; background:green; }
.attack { grid-column:4; grid-row:2; background:red; }
.drop { grid-column:5; grid-row:2; background:orange; color:black; }

.set-bottom { grid-column:1; grid-row:3; background:purple; }
.serve { grid-column:3; grid-row:3; background:yellow; color:black; }
.event { grid-column:4; grid-row:3; background:white; color:black; }

.card {
    width:40px;
    height:60px;
    background:white;
    color:black;
    border-radius:6px;
    font-size:9px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:2px;
    cursor:pointer;
    position:relative;
}

#hand, #cpuHand {
    display:flex;
    justify-content:center;
    gap:5px;
    height:80px;
    flex-shrink:0;
}

#deckCount {
    text-align:center;
    font-size:12px;
}

.card-detail {
    position:absolute;
    top:-150px;
    left:0;
    width:150px;
    background:#333;
    border:1px solid #fff;
    border-radius:6px;
    padding:4px;
    display:none;
    font-size:10px;
    z-index:10;
}

button {
    padding:2px 6px;
    margin:0 2px;
    font-size:12px;
}
</style></head>
<body><div class="container"><div id="topUI">
    <div id="phaseDisplay">フェイズ: 開始前</div>
    <div id="deckCount">デッキ40</div>
    <div id="setUpUI"></div>
</div><!-- CPU手札 --><div id="cpuHand"></div><div class="field-wrapper">
    <div class="field enemy" id="cpuField"></div>
    <div class="field" id="playerField"></div>
</div><!-- プレイヤー手札 --><div id="hand"></div><script>
// ゲームステート
let gameState = {
    phase:'gameBefore',
    deck:{player:[], cpu:[]},
    hand:{player:[], cpu:[]},
    mulliganSelected:[],
    turnPlayer:null
};

// カード作成（キャラクター+イベント）
function createCards(){
    const cards=[];
    // キャラクター例
    cards.push({name:'キャラA', serve:'-', block:'-', receive:6, toss:0, attack:0});
    cards.push({name:'キャラB', serve:'-', block:'-', receive:5, toss:0, attack:0, skill:'登場・レシーブエリア: 2ガッツ払えばレシーブ+1してカード1枚引く'});
    // ... ここに全キャラクターカードとイベントカードを追加
    return cards;
}

// デッキ初期化
function initDecks(){
    gameState.deck.player = createCards();
    gameState.deck.cpu = createCards();
}

// デッキ残数更新
function updateDeckCount(){
    const playerCount = gameState.deck.player.length;
    const cpuCount = gameState.deck.cpu.length;
    document.getElementById('deckCount').innerText = `デッキ${playerCount}`;
}

// 手札レンダリング（タップで詳細表示＋選択）
function renderHand(){
    const handDiv = document.getElementById('hand');
    handDiv.innerHTML='';
    gameState.hand.player.forEach(card=>{
        const div = document.createElement('div');
        div.className='card';
        div.innerText=card.name;
        // 詳細表示
        div.onclick = ()=>{
            if(div.querySelector('.card-detail')){
                div.removeChild(div.querySelector('.card-detail'));
                div.style.border='';
                return;
            }
            const detail = document.createElement('div');
            detail.className='card-detail';
            detail.innerText=`名前:${card.name}\nサーブ:${card.serve} ブロック:${card.block} レシーブ:${card.receive} トス:${card.toss} アタック:${card.attack}`;
            if(card.skill) detail.innerText += `\nスキル:${card.skill}`;
            div.appendChild(detail);
            div.style.border='2px solid yellow';
        };
        handDiv.appendChild(div);
    });
}

// CPU手札レンダリング（裏表示）
function renderCPUHand(){
    const handDiv=document.getElementById('cpuHand');
    handDiv.innerHTML='';
    gameState.hand.cpu.forEach(card=>{
        const div=document.createElement('div');
        div.className='card';
        div.style.background='gray';
        div.innerText='';
        handDiv.appendChild(div);
    });
}

// フィールドレンダリング（カタカナ表記）
function renderField(id){
    const field = document.getElementById(id);
    field.innerHTML='';
    const areas = ['セット上','サイド左','センター','サイド右','デッキ','レシーブ','トス','アタック','ドロップ','セット下','サーブ','イベント'];
    areas.forEach(a=>{
        const div=document.createElement('div');
        div.className='area';
        div.innerText=a;
        field.appendChild(div);
    });
}

// ゲーム開始
function startGame(){
    initDecks();
    // サイコロ前に手札は配らない
    // 後でサイコロ→手札配布→マリガン
    renderField('playerField');
    renderField('cpuField');
}

startGame();
</script></body>
</html>
