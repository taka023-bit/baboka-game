<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #1a1a1a;
    color: white;
}

.container {
    display: flex;
    flex-direction: column;
    height: 100dvh;
}

.field-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    flex: 1;
}

.field {
    display: grid;
    grid-template-columns: 60px 70px 70px 70px 60px;
    grid-template-rows: 70px 70px 70px;
    gap: 6px;
}

.enemy {
    transform: rotate(180deg);
    pointer-events: none;
}
.enemy .area { transform: rotate(180deg); }

.area {
    border: 2px solid white;
    border-radius: 6px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    font-size:10px;
}

.card {
    width:40px;
    height:60px;
    background:white;
    color:black;
    font-size:9px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin:2px;
}

/* 手札 */
#hand {
    display:flex;
    justify-content:center;
    height:80px;
}

/* ボタン */
#choice {
    display:flex;
    justify-content:center;
    gap:10px;
}

/* ===== 配置 ===== */
.receive {grid-column:2; grid-row:2; background:blue;}
.toss {grid-column:3; grid-row:2; background:green;}
.attack {grid-column:4; grid-row:2; background:red;}

.block {grid-column:2; grid-row:3; background:purple;}
.serve {grid-column:3; grid-row:3; background:yellow; color:black;}
.event {grid-column:4; grid-row:3; background:white; color:black;}

</style>
</head>

<body>

<div class="container">

<!-- 相手 -->
<div class="field-wrapper">
<div class="field enemy" id="enemyField">
    <div class="area receive"></div>
    <div class="area toss"></div>
    <div class="area attack"></div>
</div>
</div>

<!-- 自分 -->
<div class="field-wrapper">
<div class="field" id="playerField">
    <div class="area receive"></div>
    <div class="area toss"></div>
    <div class="area attack"></div>

    <div class="area block"></div>
    <div class="area serve"></div>
    <div class="area event"></div>
</div>
</div>

<div id="hand"></div>

<div id="choice"></div>

</div>

<script>
let selectedCard=null;
let mode="serve"; // 現在状態

function createCard(){
    const card=document.createElement("div");
    card.className="card";

    const atk=Math.floor(Math.random()*5)+1;
    const def=Math.floor(Math.random()*5)+1;

    card.dataset.atk=atk;
    card.dataset.def=def;

    card.innerHTML=`A:${atk}<br>D:${def}`;

    card.onclick=()=>selectedCard=card;

    hand.appendChild(card);
}

for(let i=0;i<5;i++) createCard();

/* CPU攻撃 */
function cpuTurn(){
    ["receive","toss","attack"].forEach(p=>{
        const area=document.querySelector("#enemyField ."+p);
        const card=document.createElement("div");
        card.className="card";

        const atk=Math.floor(Math.random()*5)+1;
        const def=Math.floor(Math.random()*5)+1;

        card.dataset.atk=atk;
        card.dataset.def=def;
        card.innerHTML=`A:${atk}<br>D:${def}`;

        area.appendChild(card);
    });

    showChoice();
}

/* 選択 */
function showChoice(){
    choice.innerHTML=`
        <button onclick="block()">ブロック</button>
        <button onclick="receive()">レシーブ</button>
    `;
}

/* ブロック */
function block(){
    mode="block";
    choice.innerHTML="ブロック（最大3枚）";
}

/* レシーブ */
function receive(){
    mode="receive";
    choice.innerHTML="レシーブ";
}

/* 判定 */
function battle(){
    const atk=document.querySelector("#enemyField .attack .card");
    const blocks=document.querySelectorAll("#playerField .block .card");

    let totalDef=0;
    blocks.forEach(c=>totalDef+=Number(c.dataset.def));

    if(atk && atk.dataset.atk > totalDef){
        alert("失点…");
    }else{
        alert("防いだ🔥");
    }

    location.reload();
}

/* 配置 */
document.querySelectorAll("#playerField .area").forEach(area=>{
    area.onclick=()=>{
        if(!selectedCard) return;

        if(mode==="serve" && area.classList.contains("serve")){
            area.appendChild(selectedCard);
            selectedCard=null;
            mode="enemy";
            cpuTurn();
        }

        else if(mode==="block" && area.classList.contains("block")){
            if(area.children.length>=3){
                alert("3枚まで！");
                return;
            }
            area.appendChild(selectedCard);
            selectedCard=null;
        }

        else if(mode==="receive" && area.classList.contains("receive")){
            area.appendChild(selectedCard);
            selectedCard=null;
            battle();
        }
    };
});
</script>

</body>
</html>
