<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦</title><style>
html, body {
    margin:0;
    padding:0;
    overflow:hidden;
    background:#1a1a1a;
    color:white;
    font-family:sans-serif;
}

.container {
    display:flex;
    flex-direction:column;
    height:100dvh;
}

.field-wrapper {
    display:flex;
    justify-content:center;
    align-items:center;
    flex:1;
}

.field {
    display:grid;
    grid-template-columns:50px 70px 70px 70px 50px;
    grid-template-rows:70px 70px 70px;
    gap:6px;
}

.enemy {
    transform:rotate(180deg);
}
.enemy .area {
    transform:rotate(180deg);
}

.area {
    border:2px solid #fff;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    font-size:10px;
    position:relative;
    text-align:center;
}

/* ===== 配置（絶対変更不可） ===== */
.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black; }
.center { grid-column:3; grid-row:1; background:#666; }
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black; }
.deck { grid-column:5; grid-row:1; background:orange; color:black; text-align:center; }

.receive { grid-column:2; grid-row:2; background:blue; color:white; }
.toss { grid-column:3; grid-row:2; background:green; color:white; }
.attack { grid-column:4; grid-row:2; background:red; color:white; }
.drop { grid-column:5; grid-row:2; background:orange; color:black; }

.set-bottom { grid-column:1; grid-row:3; background:purple; }
.serve { grid-column:3; grid-row:3; background:yellow; color:black; }
.event { grid-column:4; grid-row:3; background:white; color:black; }

.card {
    width:40px;
    height:60px;
    background:white;
    color:black;
    border-radius:6px;
    font-size:9px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:2px;
    cursor:pointer;
}

#hand {
    display:flex;
    justify-content:center;
    gap:5px;
    height:80px;
    flex-shrink:0;
    margin-top:5px;
}

#setUpUI {
    text-align:center;
    margin:2px;
    font-size:14px;
}

button {
    padding:4px 8px;
    margin:2px;
    font-size:12px;
}

.card-detail {
    position:absolute;
    top:-150px;
    left:0;
    width:150px;
    background:#333;
    border:1px solid #fff;
    border-radius:6px;
    padding:4px;
    display:none;
    font-size:10px;
    z-index:10;
}

#deckCount {
    text-align:center;
    margin:2px;
    font-size:14px;
}
</style></head>
<body>
<div class="container"><div id="phaseDisplay" style="text-align:center; margin:5px;">フェイズ: 開始前</div>
<div id="deckCount">デッキ40</div>
<div id="setUpUI"></div><!-- CPUフィールド --><div class="field-wrapper">
    <div class="field enemy" id="cpuField"></div>
</div><!-- プレイヤーフィールド --><div class="field-wrapper">
    <div class="field" id="playerField"></div>
</div><div id="hand"></div><script>

// === カード定義 ===
let characterCards=[
    {name:'キャラA', serve:'-', block:'-', receive:6, toss:0, attack:0},
    {name:'キャラB', serve:'-', block:'-', receive:6, toss:0, attack:0},
    {name:'キャラC', serve:'-', block:'-', receive:6, toss:0, attack:0},
    {name:'キャラD', serve:'-', block:'-', receive:6, toss:0, attack:0},
    {name:'キャラE', serve:'-', block:'-', receive:6, toss:0, attack:0},
    {name:'キャラF', serve:'-', block:'-', receive:6, toss:0, attack:0},
    {name:'キャラG', serve:'-', block:'-', receive:6, toss:0, attack:0},
    // 4枚スキル付き
    {name:'キャラH', serve:'-', block:'-', receive:5, toss:0, attack:0, skill:'登場・レシーブエリア：2ガッツでレシーブ+1＆カード1枚引く'},
    {name:'キャラI', serve:'-', block:'-', receive:5, toss:0, attack:0, skill:'登場・レシーブエリア：2ガッツでレシーブ+1＆カード1枚引く'},
    {name:'キャラJ', serve:'-', block:'-', receive:5, toss:0, attack:0, skill:'登場・レシーブエリア：2ガッツでレシーブ+1＆カード1枚引く'},
    {name:'キャラK', serve:'-', block:'-', receive:5, toss:0, attack:0, skill:'登場・レシーブエリア：2ガッツでレシーブ+1＆カード1枚引く'},
    // 他キャラは省略、合計32枚まで追加
];

let eventCards=[
    {name:'繋げ！', phase:'レシーブ', effect:'カード1枚を引き、レシーブ+1'},
    {name:'繋げ！', phase:'レシーブ', effect:'カード1枚を引き、レシーブ+1'},
    {name:'王様だ！', phase:'トス', effect:'カード1枚引き、トス+1'},
    {name:'王様だ！', phase:'トス', effect:'カード1枚引き、トス+1'},
    {name:'見えた！', phase:'アタック', effect:'カード1枚引き、アタック+1'},
    {name:'見えた！', phase:'アタック', effect:'カード1枚引き、アタック+1'},
    {name:'がんばれ', phase:'ドロー', effect:'ドロップエリアから2枚手札に'},
    {name:'これがバレー！', phase:'レシーブ・トス・アタック', effect:'カード1枚を引き、パラメータ1つ+1'}
];

// === ゲーム状態 ===
let gameState={
    phase:'gameBefore',
    turnPlayer:null,
    deck:{ player:[], cpu:[] },
    hand:{ player:[], cpu:[] },
    mulliganSelected:[]
};

function shuffle(deck){for(let i=deck.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}}

function initDecks(){
    gameState.deck.player=[...characterCards,...eventCards];
    gameState.deck.cpu=[...characterCards,...eventCards];
    shuffle(gameState.deck.player);
    shuffle(gameState.deck.cpu);
}

function renderField(id){
    const field=document.getElementById(id);
    field.innerHTML='';
    const areas=['セット上','サイド左','センター','サイド右','デッキ','レシーブ','トス','アタック','ドロップ','セット下','サーブ','イベント'];
    areas.forEach(a=>{let div=document.createElement('div');div.className='area '+a.toLowerCase();div.innerText=a;field.appendChild(div);});
}

function updateDeckCount(){
    document.getElementById('deckCount').innerText='デッキ'+gameState.deck.player.length;
}

function renderHand(){
    const handDiv=document.getElementById('hand');
    handDiv.innerHTML='';
    gameState.hand.player.forEach(card=>{
        const div=document.createElement('div');
        div.className='card';
        div.innerText=card.name;
        div.onclick=()=>{
            if(gameState.mulliganSelected.includes(card)){
                gameState.mulliganSelected=gameState.mulliganSelected.filter(c=>c!==card);div.style.border='';
            }else{
                gameState.mulliganSelected.push(card);div.style.border='2px solid yellow';
            }
        };
        handDiv.appendChild(div);
    });
}

function confirmMulligan(){
    gameState.mulliganSelected.forEach(card=>{
        gameState.deck.player.push(card);
        gameState.hand.player=gameState.hand.player.filter(c=>c!==card);
    });
    shuffle(gameState.deck.player);
    while(gameState.hand.player.length<6){
        gameState.hand.player.push(gameState.deck.player.shift());
    }
    renderHand();
    document.getElementById('setUpUI').innerText='マリガン完了';
    updateDeckCount();
    setTimeout(()=>{document.getElementById('phaseDisplay').innerText='フェイズ: サイコロ';},500);
}

function startGame(){
    initDecks();
    renderField('playerField');
    renderField('cpuField');
    gameState.hand.player=[];
    gameState.hand.cpu=[];
    // 手札はサイコロ後配布
    const ui=document.getElementById('setUpUI');
    ui.innerHTML='サイコロを振る';
    const btn=document.createElement('button');
    btn.innerText='振る';
    btn.onclick=()=>{
        const p=Math.floor(Math.random()*6)+1;
        const c=Math.floor(Math.random()*6)+1;
        alert('あなた:'+p+' CPU:'+c);
        if(p===c){alert('同点 再振り'); return;}
        gameState.turnPlayer=p>c?'player':'cpu';
        alert(gameState.turnPlayer+'先攻');
        // 手札配布
        for(let i=0;i<6;i++){
            gameState.hand.player.push(gameState.deck.player.shift());
            gameState.hand.cpu.push(gameState.deck.cpu.shift());
        }
        renderHand();
        updateDeckCount();
        // マリガンボタン
        ui.innerHTML='マリガンして確定';
        const mbtn=document.createElement('button');
        mbtn.innerText='確定';
        mbtn.onclick=confirmMulligan;
        ui.appendChild(mbtn);
    };
    ui.appendChild(btn);
}

startGame();

</script></body>
</html>
