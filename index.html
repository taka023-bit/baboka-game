<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦</title>
<style>
html, body { margin:0; padding:0; overflow:hidden; background:#1a1a1a; color:white; font-family:sans-serif;}
.container { display:flex; flex-direction:column; height:100dvh;}
.field-wrapper {display:flex; justify-content:center; align-items:center; flex:1;}
.field {display:grid; grid-template-columns:50px 70px 70px 70px 50px; grid-template-rows:70px 70px 70px; gap:6px;}
.enemy {transform:rotate(180deg);} .enemy .area {transform:rotate(180deg);}
.area {border:2px solid #fff; border-radius:8px; display:flex; justify-content:center; align-items:center; flex-wrap:wrap; font-size:9px; position:relative;}
.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black;}
.center { grid-column:3; grid-row:1; background:#666;}
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black;}
.deck { grid-column:5; grid-row:1; background:orange; color:black; display:flex; flex-direction:column; justify-content:center; align-items:center;}
.receive { grid-column:2; grid-row:2; background:blue;}
.toss { grid-column:3; grid-row:2; background:green;}
.attack { grid-column:4; grid-row:2; background:red;}
.drop { grid-column:5; grid-row:2; background:orange; color:black;}
.set-bottom { grid-column:1; grid-row:3; background:purple;}
.serve { grid-column:3; grid-row:3; background:yellow; color:black;}
.event { grid-column:4; grid-row:3; background:white; color:black;}
.card { width:40px; height:60px; background:white; color:black; border-radius:6px; font-size:9px; display:flex; justify-content:center; align-items:center; margin:2px; cursor:pointer;}
#hand { display:flex; justify-content:center; gap:5px; height:80px; margin-top:5px;}
#setUpUI { text-align:center; margin:5px;}
button { padding:4px 8px; margin:2px;}
.selected { outline:2px solid yellow;}
.cpuHandArea { position:absolute; top:-80px; left:0; right:0; display:flex; justify-content:center; gap:5px;}
.cpuCard { width:40px; height:60px; background:gray; border-radius:6px; margin:2px;}
.deckCount { position:absolute; bottom:-14px; font-size:10px;}
</style>
</head>
<body>
<div class="container">
<div id="phaseDisplay">準備中</div>
<div id="setUpUI"></div>

<!-- CPUフィールド -->
<div class="field-wrapper">
<div class="field enemy" id="cpuField">
<div class="area set-top">セット</div>
<div class="area side-l">サイド</div>
<div class="area center">センター</div>
<div class="area side-r">サイド</div>
<div class="area deck">デッキ<span id="cpuDeckCount" class="deckCount"></span></div>
<div class="area receive" id="cpu_receive">レシーブ</div>
<div class="area toss" id="cpu_toss">トス</div>
<div class="area attack" id="cpu_attack">アタック</div>
<div class="area drop">ドロップ</div>
<div class="area set-bottom">セット</div>
<div class="area serve" id="cpu_serve">サーブ</div>
<div class="area event">イベント</div>
<div id="cpuHandArea" class="cpuHandArea"></div>
</div>
</div>

<!-- プレイヤーフィールド -->
<div class="field-wrapper">
<div class="field">
<div class="area set-top">セット</div>
<div class="area side-l">サイド</div>
<div class="area center">センター</div>
<div class="area side-r">サイド</div>
<div class="area deck" id="deckArea">デッキ<span id="deckCount" class="deckCount"></span></div>
<div class="area receive" id="receiveArea">レシーブ</div>
<div class="area toss" id="tossArea">トス</div>
<div class="area attack" id="attackArea">アタック</div>
<div class="area drop">ドロップ</div>
<div class="area set-bottom">セット</div>
<div class="area serve" id="serveArea">サーブ</div>
<div class="area event">イベント</div>
</div>
</div>

<div id="hand"></div>
</div>

<script>
let game={hand:[],deck:[],selected:null,started:false,phase:0,placed:false,cpuHand:[],cpuDeck:[]};
const phases=["serve","draw","receive","toss","attack"];

// デッキ生成
for(let i=1;i<=40;i++){game.deck.push({name:"P"+i}); game.cpuDeck.push({name:"C"+i});}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
shuffle(game.deck); shuffle(game.cpuDeck);

function draw(n=1){for(let i=0;i<n;i++){if(game.deck.length===0)return;game.hand.push(game.deck.shift()); updateDeckCount();}}
function cpuDraw(n=1){for(let i=0;i<n;i++){if(game.cpuDeck.length===0)return;game.cpuHand.push(game.cpuDeck.shift()); updateCpuDeckCount();}}

function updateDeckCount(){document.getElementById('deckCount').innerText="デッキ"+game.deck.length;}
function updateCpuDeckCount(){document.getElementById('cpuDeckCount').innerText="デッキ"+game.cpuDeck.length;}

function renderHand(){
 let h=document.getElementById('hand');h.innerHTML="";
 game.hand.forEach((c,i)=>{
  let d=document.createElement('div');
  d.className='card'+(c.sel?' selected':'');
  d.innerText=c.name;
  d.ontouchstart=d.onmousedown=()=>{
   c.sel=!c.sel;
   renderHand();
   showCardDetail(c);
  };
  d.onclick=()=>{c.sel=!c.sel; renderHand(); showCardDetail(c);};
  h.appendChild(d);
 });
}

function showCardDetail(card){alert("カード詳細: "+card.name);}

// CPU手札表示
function renderCpuHand(){
 let area=document.getElementById('cpuHandArea'); area.innerHTML="";
 game.cpuHand.forEach(c=>{
  let d=document.createElement('div');
  d.className='cpuCard'; area.appendChild(d);
 });
}

// ===== サイコロ =====
function startDice(){
 let ui=document.getElementById('setUpUI');
 ui.innerHTML="サイコロ";
 let btn=document.createElement('button');btn.innerText="振る";
 btn.onclick=()=>{
  let p=Math.floor(Math.random()*6)+1;
  let e=Math.floor(Math.random()*6)+1;
  if(p===e){ui.innerHTML=`${p}-${e} 引き分け`; setTimeout(startDice,1000); return;}
  ui.innerHTML=`あなた:${p} CPU:${e}`;
  let s=document.createElement('button'); s.innerText="サーブ";
  let r=document.createElement('button'); r.innerText="レシーブ";
  if(p>e){s.onclick=()=>{ui.innerHTML="サーブ選択完了"; startMulligan();}; r.onclick=()=>{ui.innerHTML="レシーブ選択完了"; startMulligan();}}
  else if(e>p){s.disabled=true; r.disabled=true; setTimeout(startMulligan,1000);}
  ui.appendChild(document.createElement('br')); ui.appendChild(s); ui.appendChild(r);
 };
 ui.appendChild(document.createElement('br')); ui.appendChild(btn);
}

// ===== マリガン =====
function startMulligan(){
 let ui=document.getElementById('setUpUI');
 ui.innerHTML="交換したいカード選択";
 renderHand();
 let btn=document.createElement('button'); btn.innerText="交換";
 btn.onclick=()=>{
  let keep=[],back=[];
  game.hand.forEach(c=>{if(c.sel) back.push(c); else keep.push(c);});
  game.deck=game.deck.concat(back);
  shuffle(game.deck);
  game.hand=keep;
  draw(back.length);
  renderHand();
  ui.innerHTML="マリガン完了";
  setTimeout(()=>{startGame();},500);
 };
 ui.appendChild(document.createElement('br')); ui.appendChild(btn);
}

// ===== ゲーム開始 =====
function startGame(){
 document.getElementById('setUpUI').innerHTML="";
 game.started=true;
 renderCpuHand();
 updateDeckCount(); updateCpuDeckCount();
 draw(6); cpuDraw(6); renderHand();
 setPhase(0);
}

function setPhase(i){
 game.phase=i; game.placed=false;
 let p=phases[i];
 document.getElementById('phaseDisplay').innerText="フェイズ: "+p;
 handlePhase(p);
}

function nextPhase(){
 if(!game.placed){alert("カード置いて"); return;}
 let i=game.phase+1;
 if(i>=phases.length)i=0;
 setPhase(i);
}

function handlePhase(p){
 let ui=document.getElementById('setUpUI');
 ui.innerHTML="";
 if(p==="serve"){cpuPlace('cpu_serve'); document.getElementById('serveArea').onclick=()=>{place('serveArea'); game.placed=true;};}
 if(p==="receive"){cpuPlace('cpu_receive'); document.getElementById('receiveArea').onclick=()=>{place('receiveArea'); game.placed=true;};}
 if(p==="toss"){cpuPlace('cpu_toss'); document.getElementById('tossArea').onclick=()=>{place('tossArea'); game.placed=true;};}
 if(p==="attack"){cpuPlace('cpu_attack'); document.getElementById('attackArea').onclick=()=>{place('attackArea'); game.placed=true;};}

 if(p==="draw"){draw(); cpuDraw(); renderHand(); renderCpuHand(); setTimeout(()=>setPhase(2),500); return;}

 let btn=document.createElement('button'); btn.innerText="次へ"; btn.onclick=nextPhase;
 ui.appendChild(btn);
}

function place(areaId){
 let idx=game.hand.findIndex(c=>c.sel); if(idx<0) return;
 let area=document.getElementById(areaId); if(area.children.length>0){alert("ここには置けない"); return;}
 let card=game.hand[idx]; let d=document.createElement('div'); d.className='card'; d.innerText=card.name;
 area.appendChild(d); game.hand.splice(idx,1); game.placed=true; renderHand();
}

function cpuPlace(areaId){
 if(game.cpuHand.length===0) return;
 let area=document.getElementById(areaId); if(area.children.length>0) return;
 let card=game.cpuHand.shift(); let d=document.createElement('div'); d.className='cpuCard'; area.appendChild(d);
 renderCpuHand();
}

window.onload=()=>{
 startDice();
};
</script>
</body>
</html>
