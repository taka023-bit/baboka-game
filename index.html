<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK 簡易ゲーム</title>
<style>
body { font-family: sans-serif; background:#0f172a; color:white; text-align:center; }
button { padding:10px 20px; margin:5px; border-radius:10px; border:none; }
.card { background:#1e293b; padding:10px; margin:5px; border-radius:10px; display:inline-block; }
</style>
</head>
<body>
<h1>🏐 バボカ!! BREAK</h1>
<div id="log"></div>
<div id="actions"></div><script>
let playerHP = 3;
let cpuHP = 3;

function log(text){
  document.getElementById("log").innerHTML += "<p>"+text+"</p>";
}

function randomPoint(){
  return Math.floor(Math.random()*10)+1;
}

function startTurn(){
  document.getElementById("actions").innerHTML = "";
  let serve = randomPoint();
  log("あなたのサーブ: " + serve);

  createButton("レシーブ", ()=>receive(serve));
  createButton("ブロック", ()=>block(serve));
}

function createButton(name, func){
  let btn = document.createElement("button");
  btn.innerText = name;
  btn.onclick = func;
  document.getElementById("actions").appendChild(btn);
}

function receive(attack){
  let receive = randomPoint();
  log("あなたのレシーブ: " + receive);

  if(receive >= attack){
    log("レシーブ成功！トスへ");
    toss();
  } else {
    losePoint("あなた");
  }
}

function toss(){
  let toss = randomPoint();
  let attack = randomPoint();
  let total = toss + attack;
  log("トス+アタック: " + total);

  cpuDefense(total);
}

function block(attack){
  let block = randomPoint() + randomPoint();
  log("あなたのブロック: " + block);

  if(block >= attack){
    log("ブロック成功！");
    startTurn();
  } else {
    losePoint("あなた");
  }
}

function cpuDefense(attack){
  let choice = Math.random() > 0.5 ? "receive" : "block";

  if(choice === "receive"){
    let cpu = randomPoint();
    log("CPUレシーブ: " + cpu);

    if(cpu >= attack){
      log("CPU成功！反撃");
      cpuAttack();
    } else {
      losePoint("CPU");
    }
  } else {
    let cpu = randomPoint()+randomPoint();
    log("CPUブロック: " + cpu);

    if(cpu >= attack){
      log("CPUブロック成功");
      cpuAttack();
    } else {
      losePoint("CPU");
    }
  }
}

function cpuAttack(){
  let attack = randomPoint();
  log("CPU攻撃: " + attack);

  createButton("レシーブ", ()=>receive(attack));
  createButton("ブロック", ()=>block(attack));
}

function losePoint(who){
  if(who === "あなた"){
    playerHP--;
    log("あなた失点！ 残り: " + playerHP);
  } else {
    cpuHP--;
    log("CPU失点！ 残り: " + cpuHP);
  }

  if(playerHP <= 0){
    log("あなたの負け");
    return;
  }
  if(cpuHP <= 0){
    log("あなたの勝ち");
    return;
  }

  startTurn();
}

startTurn();
</script></body>
</html>
