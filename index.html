<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦</title>
<style>
html, body { margin:0; padding:0; overflow:hidden; background:#1a1a1a; color:white; font-family:sans-serif;}
.container { display:flex; flex-direction:column; height:100dvh;}
.field-wrapper {display:flex;justify-content:center;align-items:center;flex:1;}
.field {display:grid;grid-template-columns:50px 70px 70px 70px 50px;grid-template-rows:70px 70px 70px;gap:6px;}
.enemy {transform:rotate(180deg);} .enemy .area {transform:rotate(180deg);}
.area {border:2px solid #fff;border-radius:8px;display:flex;justify-content:center;align-items:center;flex-wrap:wrap;font-size:9px;position:relative;}
.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black;}
.center { grid-column:3; grid-row:1; background:#666;}
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black;}
.deck { grid-column:5; grid-row:1; background:orange; color:black; position:relative;}
.receive { grid-column:2; grid-row:2; background:blue; color:white;}
.toss { grid-column:3; grid-row:2; background:green; color:white;}
.attack { grid-column:4; grid-row:2; background:red; color:white;}
.drop { grid-column:5; grid-row:2; background:orange; color:black;}
.set-bottom { grid-column:1; grid-row:3; background:purple;}
.serve { grid-column:3; grid-row:3; background:yellow; color:black;}
.event { grid-column:4; grid-row:3; background:white; color:black;}
.card { width:40px;height:60px;background:white;color:black;border-radius:6px;font-size:9px;display:flex;justify-content:center;align-items:center;margin:2px;cursor:pointer;position:relative;}
#hand { display:flex;justify-content:center;gap:5px;height:80px;margin-top:5px;}
#setUpUI { text-align:center;margin:5px;}
button { padding:4px 8px;margin:2px;}
.selected { outline:2px solid yellow;}
.card-detail { position:absolute; top:-120px; left:0; width:120px; background:#333; border:1px solid #fff; border-radius:6px; padding:4px; display:none; font-size:10px; z-index:10;}
#deckCount { position:absolute; bottom:90px; left:50%; transform:translateX(-50%); font-size:12px;}
#cpuHand { position:absolute; top:80px; left:50%; transform:translateX(-50%); display:flex; gap:5px;}
</style>
</head>
<body>
<div class="container">
<div id="phaseDisplay">準備中</div>
<div id="setUpUI"></div>
<div id="deckCount">デッキ40</div><div class="field-wrapper"><div class="field enemy" id="cpuField">
<div class="area set-top">セット</div><div class="area side-l">サイド</div><div class="area center">センター</div><div class="area side-r">サイド</div><div class="area deck">デッキ</div>
<div class="area receive" id="cpu_receive">レシーブ</div><div class="area toss" id="cpu_toss">トス</div><div class="area attack" id="cpu_attack">アタック</div><div class="area drop">ドロップ</div>
<div class="area set-bottom">セット</div><div class="area serve" id="cpu_serve">サーブ</div><div class="area event">イベント</div>
</div></div><div class="field-wrapper"><div class="field">
<div class="area set-top">セット</div><div class="area side-l">サイド</div><div class="area center">センター</div><div class="area side-r">サイド</div><div class="area deck" id="deckArea">デッキ</div>
<div class="area receive" id="receiveArea">レシーブ</div><div class="area toss" id="tossArea">トス</div><div class="area attack" id="attackArea">アタック</div><div class="area drop">ドロップ</div>
<div class="area set-bottom">セット</div><div class="area serve" id="serveArea">サーブ</div><div class="area event">イベント</div>
</div></div><div id="hand"></div>
</div><script>
let game={hand:[],deck:[],selected:null,started:false,phase:0,placed:false,cpuHand:[],cpuDeck:[],deckCount:40};
const phases=["serve","draw","receive","toss","attack"];

// キャラクターカード32 + イベントカード8
const cards=[
  {name:'キャラA',s:-1,b:-1,r:6,t:0,a:0,skill:''},{name:'キャラA2',s:-1,b:-1,r:5,t:0,a:0,skill:'登場・レシーブエリア 2ガッツでレシーブ+1,カード1枚引く'},
  {name:'キャラB',s:2,b:1,r:1,t:2,a:3,skill:''},{name:'キャラC',s:2,b:2,r:3,t:1,a:1,skill:'登場・トスエリア 2ガッツでカード1枚引きトス+1'},
  {name:'キャラD',s:3,b:2,r:4,t:0,a:3,skill:''},{name:'キャラE',s:2,b:3,r:5,t:0,a:3,skill:''},
  {name:'キャラF',s:2,b:2,r:2,t:0,a:2,skill:'登場・アタックエリア 2ガッツでアタック+2'},{name:'キャラG',s:1,b:3,r:3,t:0,a:2,skill:'登場・ブロックエリア 1ガッツでブロック成功時ドシャット5'},
  {name:'繋げ!',phase:'レシーブ',skill:'カード1枚を引き、レシーブ+1'},
  {name:'王様だ！',phase:'トス',skill:'カード1枚引き、トス+1'},
  {name:'見えた！',phase:'アタック',skill:'カード1枚引き、アタック+1'},
  {name:'がんばれ',phase:'ドロー',skill:'ドロップエリアから2枚までを手札に加える'},
  {name:'これがバレー!',phase:'レシーブ・トス・アタック',skill:'カード1枚を引き、パラメータ1つに+1'}
];

// デッキ初期化
for(let i=0;i<32;i++){game.deck.push({...cards[i%cards.length]}); game.cpuDeck.push({...cards[i%cards.length]});}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}shuffle(game.deck); shuffle(game.cpuDeck);

function draw(n=1){for(let i=0;i<n;i++){if(game.deck.length===0) return;game.hand.push(game.deck.shift()); updateDeckCount();}}
function cpuDraw(n=1){for(let i=0;i<n;i++){if(game.cpuDeck.length===0) return;game.cpuHand.push(game.cpuDeck.shift());}}

function updateDeckCount(){document.getElementById('deckCount').innerText='デッキ'+game.deck.length;}

function renderHand(){
 let h=document.getElementById('hand'); h.innerHTML='';
 game.hand.forEach(c=>{
  let d=document.createElement('div'); d.className='card'+(c.sel?' selected':''); d.innerText=c.name;
  d.onclick=d.ontouchstart=()=>{
    if(c.sel){placeSelected(c);}else{c.sel=true; showDetail(d,c); renderHand();}
  };
  h.appendChild(d);
 });
 renderCPUHand();
}

function showDetail(div,card){
 let detail=div.querySelector('.card-detail');
 if(!detail){detail=document.createElement('div'); detail.className='card-detail'; detail.innerText=`${card.name}\nサーブ:${card.s} ブロック:${card.b} レシーブ:${card.r} トス:${card.t} アタック:${card.a}\n${card.skill}`; div.appendChild(detail);}
 detail.style.display='block';
}

function placeSelected(card){
 let idx=game.hand.indexOf(card); if(idx<0) return;
 let area=document.getElementById('serveArea'); // 例、置き場所はフェイズに応じて調整可能
 let d=document.createElement('div'); d.className='card'; d.innerText=card.name;
 area.appendChild(d); game.hand.splice(idx,1); card.sel=false; renderHand();}

function renderCPUHand(){
 let field=document.getElementById('cpuField');
 let existing=document.getElementById('cpuHand'); if(existing) existing.remove();
 let h=document.createElement('div'); h.id='cpuHand';
 game.cpuHand.forEach(c=>{ let d=document.createElement('div'); d.className='card'; d.style.background='gray'; h.appendChild(d); });
 field.appendChild(h);
}

// サイコロ
function startDice(){
 let ui=document.getElementById('setUpUI'); ui.innerHTML='サイコロ';
 let btn=document.createElement('button'); btn.innerText='振る';
 btn.onclick=()=>{
  let p=Math.floor(Math.random()*6)+1, e=Math.floor(Math.random()*6)+1;
  if(p===e){ui.innerHTML=`${p}-${e} 引き分け`; setTimeout(startDice,1000); return;}
  ui.innerHTML=`あなた:${p} CPU:${e}`;
  let s=document.createElement('button'); s.innerText='サーブ'; s.onclick=startMulligan;
  if(p>e) ui.appendChild(s); else {let r=document.createElement('button'); r.innerText='レシーブ'; r.onclick=startMulligan; ui.appendChild(r);}
 };
 ui.appendChild(btn);
}

// マリガン
function startMulligan(){
 let ui=document.getElementById('setUpUI'); ui.innerHTML='交換したいカード選択'; renderHand();
 let btn=document.createElement('button'); btn.innerText='交換';
 btn.onclick=()=>{
  let keep=[],back=[];
  game.hand.forEach(c=>{if(c.sel) back.push(c); else keep.push(c);});
  game.deck=game.deck.concat(back); shuffle(game.deck);
  game.hand=keep; draw(back.length); renderHand(); ui.innerHTML='マリガン完了'; setTimeout(startGame,500);
 };
 ui.appendChild(btn);
}

function startGame(){document.getElementById('setUpUI').innerHTML=''; game.started=true; draw(0); cpuDraw(0); renderHand();}

window.onload=()=>{draw(6); cpuDraw(6); renderHand(); startDice();};
</script></body>
</html>
