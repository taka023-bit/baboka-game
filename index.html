<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baboca BREAK Field</title>

<style>
  body {
    background: #f5f5f5;
    font-family: sans-serif;
    margin: 0;
    padding: 0;
  }

  #game {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  /* ===== フィールド全体（7列構成） ===== */
  .field {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    padding: 6px;
  }

  /* ===== 各エリアの見た目 ===== */
  .area {
    background: #ffffff;
    border: 2px solid #333;
    border-radius: 6px;
    padding: 10px;
    text-align: center;
    font-size: 12px;
  }

  /* ===== ブロックエリア（3枠） ===== */
  .block-area {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }

  .block {
    background: #ffe8a3;
    border: 2px solid #333;
    border-radius: 6px;
    padding: 10px;
    text-align: center;
    font-size: 12px;
  }

  /* ===== コート中央ライン ===== */
  #divider {
    width: 100%;
    height: 6px;
    background: #ffcc00;
    margin: 6px 0;
  }

  /* ===== 手札エリア ===== */
  #hand {
    width: 100%;
    height: 80px;
    background: #ddd;
    border-top: 3px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>

<body>

<div id="game">

  <!-- ▼ 相手フィールド（上） -->
  <div class="field opponent">
    <div class="set-area area">SET</div>
    <div class="receive-area area">RECEIVE</div>
    <div class="toss-area area">TOSS</div>
    <div class="attack-area area">ATTACK</div>

    <div class="block-area">
      <div class="block side">SIDE</div>
      <div class="block center">CENTER</div>
      <div class="block side">SIDE</div>
    </div>

    <div class="deck-area area">DECK</div>
    <div class="drop-area area">DROP</div>
  </div>

  <!-- ▼ コート中央（ブロックエリアが接するライン） -->
  <div id="divider"></div>

  <!-- ▼ 自分フィールド（下） -->
  <div class="field player">
    <div class="set-area area">SET</div>
    <div class="receive-area area">RECEIVE</div>
    <div class="toss-area area">TOSS</div>
    <div class="attack-area area">ATTACK</div>

    <div class="block-area">
      <div class="block side">SIDE</div>
      <div class="block center">CENTER</div>
      <div class="block side">SIDE</div>
    </div>

    <div class="deck-area area">DECK</div>
    <div class="drop-area area">DROP</div>

    <div class="serve-area area">SERVE</div>
    <div class="event-area area">EVENT</div>
  </div>

  <!-- ▼ 手札 -->
  <div id="hand">HAND</div>

</div>

</body>
</html>
