<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦</title>
<style>
html, body { margin:0; padding:0; overflow:hidden; background:#1a1a1a; color:white; font-family:sans-serif;}
.container { display:flex; flex-direction:column; height:100dvh;}
.field-wrapper { display:flex; justify-content:center; align-items:center; flex:1;}
.field { display:grid; grid-template-columns:50px 70px 70px 70px 50px; grid-template-rows:70px 70px 70px; gap:6px;}
.enemy { transform:rotate(180deg);}
.enemy .area { transform:rotate(180deg);}
.area { border:2px solid #fff; border-radius:8px; display:flex; justify-content:center; align-items:center; flex-wrap:wrap; font-size:9px; position: relative; text-align:center; }

/* ===== フィールド見た目（絶対変更しない）===== */
.field-wrapper { display: flex; justify-content: center; align-items: center; flex: 1; }
.field { display: grid; grid-template-columns: 50px 70px 70px 70px 50px; grid-template-rows: 70px 70px 70px; gap: 6px; }
.enemy { transform: rotate(180deg); }
.enemy .area { transform: rotate(180deg); }
.area { border: 2px solid #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; font-size: 9px; position: relative; text-align: center; }

/* ===== 配置 ===== */
/* 上段 */
.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black;}
.center { grid-column:3; grid-row:1; background:#666;}
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black;}
.deck { grid-column:5; grid-row:1; background:orange; color:black;}
/* 中段 */
.receive { grid-column:2; grid-row:2; background:blue;}
.toss { grid-column:3; grid-row:2; background:green;}
.attack { grid-column:4; grid-row:2; background:red;}
.drop { grid-column:5; grid-row:2; background:orange; color:black;}
/* 下段 */
.set-bottom { grid-column:1; grid-row:3; background:purple;}
.serve { grid-column:3; grid-row:3; background:yellow; color:black;}
.event { grid-column:4; grid-row:3; background:white; color:black;}

.card { width:40px; height:60px; background:white; color:black; border-radius:6px; font-size:9px; display:flex; justify-content:center; align-items:center; margin:2px; cursor:pointer;}
#hand { display:flex; justify-content:center; gap:5px; height:80px; flex-shrink:0; margin-top:5px;}
#setUpUI { text-align:center; margin:5px;}
button { padding:4px 8px; margin:2px; font-size:12px;}
.card-detail { position:absolute; top:-150px; left:0; width:150px; background:#333; border:1px solid #fff; border-radius:6px; padding:4px; display:none; font-size:10px; z-index:10;}
</style>
</head>
<body>
<div class="container">
    <div id="phaseDisplay" style="text-align:center; margin:5px;">フェイズ: ゲーム進行前</div>
    <div id="setUpUI"></div>

    <div class="field-wrapper">
        <div class="field enemy" id="cpuField">
            <div class="area set-top">セット</div>
            <div class="area side-l">サイド</div>
            <div class="area center">センター</div>
            <div class="area side-r">サイド</div>
            <div class="area deck" id="cpuDeck">デッキ</div>
            <div class="area receive">レシーブ</div>
            <div class="area toss">トス</div>
            <div class="area attack">アタック</div>
            <div class="area drop">ドロップ</div>
            <div class="area set-bottom">セット</div>
            <div class="area serve">サーブ</div>
            <div class="area event">イベント</div>
        </div>
    </div>

    <div class="field-wrapper">
        <div class="field" id="playerField">
            <div class="area set-top">セット</div>
            <div class="area side-l">サイド</div>
            <div class="area center">センター</div>
            <div class="area side-r">サイド</div>
            <div class="area deck" id="playerDeck">デッキ</div>
            <div class="area receive">レシーブ</div>
            <div class="area toss">トス</div>
            <div class="area attack">アタック</div>
            <div class="area drop">ドロップ</div>
            <div class="area set-bottom">セット</div>
            <div class="area serve">サーブ</div>
            <div class="area event">イベント</div>
        </div>
    </div>

    <div id="hand"></div>
</div>

<script>
// ==== ゲーム状態 ====
let gameState = {
    turnPlayer:null,
    phase:null,
    turnCount:1,
    playerDeck:[],
    cpuDeck:[],
    hand:{player:[],cpu:[]},
    selectedCard:null
};

// ==== キャラクター生成 ====
const characters = [];
for(let i=1;i<=40;i++){
    characters.push({
        name:"キャラ"+i,
        serve:Math.floor(Math.random()*3),
        block:Math.floor(Math.random()*3),
        receive:Math.floor(Math.random()*6),
        toss:Math.floor(Math.random()*3),
        attack:Math.floor(Math.random()*4),
        skill:[]
    });
}

// ==== デッキシャッフル ====
function shuffle(deck){ for(let i=deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; } }

// ==== 初期デッキ ====
gameState.playerDeck=[...characters];
gameState.cpuDeck=[...characters.map(c=>({...c}))];
shuffle(gameState.playerDeck);
shuffle(gameState.cpuDeck);

// ==== UI更新 ====
function updateDeckUI(){
    document.getElementById('playerDeck').innerText='デッキ: '+gameState.playerDeck.length;
    document.getElementById('cpuDeck').innerText='デッキ: '+gameState.cpuDeck.length;
}

function createCardElement(card,owner,visible=true){
    const div = document.createElement('div');
    div.classList.add('card');
    div.innerText = visible?card.name:'裏';
    div.dataset.owner=owner;
    if(visible){
        div.onmouseover=()=>{ showCardDetail(div,card); };
        div.onmouseout=()=>{ hideCardDetail(div); };
        div.onclick=()=>{ gameState.selectedCard=card; };
    }
    if(owner==='player') document.getElementById('hand').appendChild(div);
    return div;
}

function showCardDetail(div,card){
    let detail = div.querySelector('.card-detail');
    if(!detail){
        detail = document.createElement('div');
        detail.classList.add('card-detail');
        detail.innerHTML = `Serve:${card.serve} Block:${card.block} Receive:${card.receive} Toss:${card.toss} Attack:${card.attack}`;
        div.appendChild(detail);
    }
    detail.style.display='block';
}
function hideCardDetail(div){ const detail = div.querySelector('.card-detail'); if(detail) detail.style.display='none'; }

// ==== ドロー ====
function drawCard(owner){
    if(gameState[owner+'Deck'].length>0){
        const c = gameState[owner+'Deck'].shift();
        gameState.hand[owner].push(c);
        if(owner==='player') createCardElement(c,'player',true);
    }
    updateDeckUI();
}

// ==== サイコロ先攻決定 ====
function startDiceRoll(){
    const ui = document.getElementById('setUpUI');
    ui.innerHTML='サイコロを振って先攻決定';
    const rollBtn = document.createElement('button');
    rollBtn.innerText='振る';
    rollBtn.onclick=()=>{
        const playerRoll=Math.floor(Math.random()*6)+1;
        const cpuRoll=Math.floor(Math.random()*6)+1;
        if(playerRoll===cpuRoll){ alert('同じ出目です。再度振ります'); return; }
        alert('あなた: '+playerRoll+' CPU: '+cpuRoll);
        gameState.turnPlayer=(playerRoll>cpuRoll)?'player':'cpu';
        ui.innerHTML='先攻: '+gameState.turnPlayer+' が選択してください（サーブかレシーブ）';
        const serveBtn=document.createElement('button');
        serveBtn.innerText='サーブ';
        serveBtn.onclick=()=>{ ui.innerHTML=''; gameStart(); };
        const receiveBtn=document.createElement('button');
        receiveBtn.innerText='レシーブ';
        receiveBtn.onclick=()=>{ ui.innerHTML=''; gameStart(); };
        ui.appendChild(serveBtn);
        ui.appendChild(receiveBtn);
    };
    ui.appendChild(rollBtn);
}

// ==== マリガン ====
function showMulligan(){
    const ui = document.getElementById('setUpUI');
    ui.innerHTML='マリガン: 手札をクリックして戻すカードを選択、確定で次へ';
    gameState.hand.player.slice(0,6).forEach(c=>createCardElement(c,'player',true));
    const btn = document.createElement('button');
    btn.innerText='確定';
    btn.onclick=()=>{
        ui.innerHTML='';
        // CPUはAIで最適マリガン
        const cpuHand=gameState.hand.cpu.slice(0,6);
        cpuHand.sort((a,b)=>a.serve+a.attack - (b.serve+b.attack)); //簡易最適
        const returnCount=Math.floor(cpuHand.length/2);
        for(let i=0;i<returnCount;i++){
            gameState.cpuDeck.push(cpuHand[i]);
            gameState.hand.cpu.splice(gameState.hand.cpu.indexOf(cpuHand[i]),1);
        }
        shuffle(gameState.cpuDeck);
        updateDeckUI();
        startPhase();
    };
    ui.appendChild(btn);
}

// ==== フェイズ開始 ====
function startPhase(){
    document.getElementById('phaseDisplay').innerText='フェイズ: サーブフェイズ';
    gameState.phase='serve';
    drawCard('player');
    drawCard('cpu');
    drawCard('player');
    drawCard('cpu');
    drawCard('player');
    drawCard('cpu');
    drawCard('player');
    drawCard('cpu');
    drawCard('player');
    drawCard('cpu');
    drawCard('player');
    drawCard('cpu');
    showMulligan();
}

// ==== ゲーム開始 ====
function gameStart(){
    document.getElementById('phaseDisplay').innerText='フェイズ: ゲーム進行中';
    for(let i=0;i<6;i++) drawCard('player');
    for(let i=0;i<6;i++) drawCard('cpu');
    showMulligan();
}

// ==== 初期化 ====
startDiceRoll();
updateDeckUI();

</script>
</body>
</html>
