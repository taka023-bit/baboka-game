<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baboca Field</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #f5f5f5;
    font-family: sans-serif;
    overflow: hidden;
  }

  #game {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== フィールド（3段×5列） ===== */
  .field {
    flex: 1;
    display: grid;

    /* SET / DECK / DROP を少し太く（1fr） */
    /* コート部分は現状維持（1.2fr） */
    grid-template-columns: 1fr 1.2fr 1.2fr 1.2fr 1fr;

    grid-template-rows: repeat(3, 1fr);
    gap: 4px;
    padding: 4px;
  }

  /* 上のフィールドを180度回転（上下左右反転） */
  .opponent {
    transform: rotate(180deg);
  }

  /* ===== エリア共通 ===== */
  .area {
    background: #ffffff;
    border: 2px solid #333;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 14px;
  }

  /* ===== 色指定 ===== */
  .center {
    background: #555; /* ダークグレー */
    color: white;
  }

  .side {
    background: #777; /* 明るめグレー */
    color: white;
  }

  .receive {
    background: #4da3ff; /* 青 */
    color: white;
  }

  .toss {
    background: #6cd96c; /* 緑 */
    color: white;
  }

  .attack {
    background: #ff6b6b; /* 赤 */
    color: white;
  }

  .serve {
    background: #ffe066; /* 黄色 */
  }

  .event {
    background: #ffffff; /* 白のまま */
  }

  .drop {
    background: #555; /* ダークグレー */
    color: white;
  }

  /* 空白マス */
  .empty {
    background: transparent;
    border: none;
  }

  /* ===== 手札エリア ===== */
  #hand {
    height: 100px;
    background: #ddd;
    border-top: 3px solid #333;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
  }
</style>
</head>

<body>

<div id="game">

  <!-- ▼ 相手フィールド（180度回転） -->
  <div class="field opponent">

    <!-- 1段目 -->
    <div class="area">セット</div>
    <div class="area side">サイド</div>
    <div class="area center">センター</div>
    <div class="area side">サイド</div>
    <div class="area">デッキ</div>

    <!-- 2段目 -->
    <div class="empty"></div>
    <div class="area receive">レシーブ</div>
    <div class="area toss">トス</div>
    <div class="area attack">アタック</div>
    <div class="area drop">ドロップ</div>

    <!-- 3段目 -->
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="area serve">サーブ</div>
    <div class="area event">イベント</div>
    <div class="empty"></div>

  </div>

  <!-- ▼ 自分フィールド -->
  <div class="field player">

    <!-- 1段目 -->
    <div class="area">セット</div>
    <div class="area side">サイド</div>
    <div class="area center">センター</div>
    <div class="area side">サイド</div>
    <div class="area">デッキ</div>

    <!-- 2段目 -->
    <div class="empty"></div>
    <div class="area receive">レシーブ</div>
    <div class="area toss">トス</div>
    <div class="area attack">アタック</div>
    <div class="area drop">ドロップ</div>

    <!-- 3段目 -->
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="area serve">サーブ</div>
    <div class="area event">イベント</div>
    <div class="empty"></div>

  </div>

  <!-- ▼ 手札 -->
  <div id="hand">
