<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#0f172a;
color:white;
font-family:sans-serif;
}

.field{
display:grid;
grid-template-columns:repeat(5,1fr);
grid-template-rows:repeat(3,80px);
gap:8px;
padding:10px;
}

/* 配置（←これが重要） */
.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black;}
.center { grid-column:3; grid-row:1; background:#666;}
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black;}
.deck { grid-column:5; grid-row:1; background:orange; color:black;}

.receive { grid-column:2; grid-row:2; background:blue;}
.toss { grid-column:3; grid-row:2; background:green;}
.attack { grid-column:4; grid-row:2; background:red;}
.drop { grid-column:5; grid-row:2; background:orange; color:black;}

.set-bottom { grid-column:1; grid-row:3; background:purple;}

.serve { grid-column:2 / span 2; grid-row:3; background:yellow; color:black;}
.event { grid-column:4 / span 2; grid-row:3; background:white; color:black;}



#hand{
display:flex;
justify-content:center;
padding:10px;
}

#choice{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
}
</style>
</head>

<body>

<!-- 相手 -->
<div class="field" id="enemy">
<div class="area receive"><div class="label">レシーブ</div></div>
<div class="area toss"><div class="label">トス</div></div>
<div class="area attack"><div class="label">アタック</div></div>
</div>

<!-- 自分 -->
<div class="field" id="player">
<div class="area receive"><div class="label">レシーブ</div></div>
<div class="area toss"><div class="label">トス</div></div>
<div class="area attack"><div class="label">アタック</div></div>

<!-- 👇ここだけ復活（位置はそのまま） -->
<div class="area block"><div class="label">ブロック</div></div>

<div></div>
<div class="area serve"><div class="label">サーブ</div></div>
<div class="area event"><div class="label">イベント</div></div>
</div>

<div id="hand"></div>
<div id="choice"></div>

<script>
let selected=null;
let phase="serve";

/* カード生成 */
function createCard(){
const c=document.createElement("div");
c.className="card";

const atk=Math.floor(Math.random()*5)+1;
const def=Math.floor(Math.random()*5)+1;

c.dataset.atk=atk;
c.dataset.def=def;
c.innerHTML=`A${atk}/D${def}`;

c.onclick=()=>selected=c;

hand.appendChild(c);
}

for(let i=0;i<5;i++) createCard();

/* CPU攻撃 */
function cpuAttack(){
["receive","toss","attack"].forEach(p=>{
const area=document.querySelector("#enemy ."+p);
area.innerHTML='<div class="label">'+p+'</div>';

const c=document.createElement("div");
c.className="card";

const atk=Math.floor(Math.random()*5)+1;
const def=Math.floor(Math.random()*5)+1;

c.dataset.atk=atk;
c.dataset.def=def;
c.innerHTML=`A${atk}/D${def}`;

area.appendChild(c);
});

showChoice();
}

/* 選択 */
function showChoice(){
choice.innerHTML=`
<button onclick="setReceive()">レシーブ</button>
<button onclick="setBlock()">ブロック</button>
`;
}

function setReceive(){
phase="receive";
choice.innerText="レシーブ選択";
}

function setBlock(){
phase="block";
choice.innerText="ブロック選択";
}

/* 判定 */
function judge(){
const atk=document.querySelector("#enemy .attack .card");

let total=0;

const recv=document.querySelector("#player .receive .card");
if(recv) total+=Number(recv.dataset.def);

const block=document.querySelector("#player .block .card");
if(block) total+=Number(block.dataset.def);

if(atk.dataset.atk > total){
alert("失点");
}else{
alert("防いだ🔥");
}

reset();
}

/* リセット */
function reset(){
document.querySelectorAll(".area").forEach(a=>{
const name=a.classList[1];
a.innerHTML='<div class="label">'+name+'</div>';
});

choice.innerHTML="";
phase="serve";
}

/* クリック */
document.querySelectorAll("#player .area").forEach(area=>{
area.onclick=()=>{
if(!selected) return;

/* サーブ */
if(phase==="serve" && area.classList.contains("serve")){
area.appendChild(selected);
selected=null;

phase="enemy";
cpuAttack();
}

/* レシーブ */
else if(phase==="receive" && area.classList.contains("receive")){
area.appendChild(selected);
selected=null;
judge();
}

/* ブロック */
else if(phase==="block" && area.classList.contains("block")){
area.appendChild(selected);
selected=null;
judge();
}
};
});
</script>

</body>
</html>
