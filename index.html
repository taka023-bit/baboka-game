<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#0f172a;
color:white;
font-family:sans-serif;
}

/* フィールド */
.field{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:10px;
}

/* エリア */
.area{
border:2px solid white;
border-radius:8px;
min-height:70px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:3px;
position:relative;
}

.label{
position:absolute;
top:2px;
left:4px;
font-size:10px;
opacity:0.7;
pointer-events:none;
}

/* 色 */
.receive{background:#2563eb;}
.toss{background:#16a34a;}
.attack{background:#dc2626;}
.serve{background:#facc15;color:black;}
.event{background:#e5e7eb;color:black;}

/* カード */
.card{
background:white;
color:black;
width:40px;
height:55px;
margin-top:14px;
font-size:9px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* 手札 */
#hand{
display:flex;
justify-content:center;
padding:10px;
}

/* ボタン */
#choice{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
}
</style>
</head>

<body>

<!-- 相手 -->
<div class="field" id="enemy">
<div class="area receive"><div class="label">レシーブ</div></div>
<div class="area toss"><div class="label">トス</div></div>
<div class="area attack"><div class="label">アタック</div></div>
</div>

<!-- 自分 -->
<div class="field" id="player">
<div class="area receive"><div class="label">レシーブ</div></div>
<div class="area toss"><div class="label">トス</div></div>
<div class="area attack"><div class="label">アタック</div></div>

<div></div>
<div class="area serve"><div class="label">サーブ</div></div>
<div class="area event"><div class="label">イベント</div></div>
</div>

<div id="hand"></div>
<div id="choice"></div>

<script>
let selected=null;
let phase="serve";

/* カード生成 */
function createCard(){
const c=document.createElement("div");
c.className="card";

const atk=Math.floor(Math.random()*5)+1;
const def=Math.floor(Math.random()*5)+1;

c.dataset.atk=atk;
c.dataset.def=def;
c.innerHTML=`A${atk}/D${def}`;

c.onclick=()=>selected=c;

hand.appendChild(c);
}

for(let i=0;i<5;i++) createCard();

/* CPU攻撃 */
function cpuAttack(){
["receive","toss","attack"].forEach(p=>{
const area=document.querySelector("#enemy ."+p);
area.innerHTML='<div class="label">'+p+'</div>';

const c=document.createElement("div");
c.className="card";

const atk=Math.floor(Math.random()*5)+1;
const def=Math.floor(Math.random()*5)+1;

c.dataset.atk=atk;
c.dataset.def=def;
c.innerHTML=`A${atk}/D${def}`;

area.appendChild(c);
});

showChoice();
}

/* 選択 */
function showChoice(){
choice.innerHTML=`
<button onclick="setReceive()">レシーブ</button>
`;
}

function setReceive(){
phase="receive";
choice.innerText="レシーブ選択";
}

/* 判定 */
function judge(){
const atk=document.querySelector("#enemy .attack .card");

let total=0;

const recv=document.querySelector("#player .receive .card");
if(recv) total+=Number(recv.dataset.def);

if(atk.dataset.atk > total){
alert("失点");
}else{
alert("防いだ🔥");
}

reset();
}

/* リセット */
function reset(){
document.querySelectorAll(".area").forEach(a=>{
const name=a.classList[1];
a.innerHTML='<div class="label">'+name+'</div>';
});

choice.innerHTML="";
phase="serve";
}

/* クリック処理 */
document.querySelectorAll("#player .area").forEach(area=>{
area.onclick=()=>{
if(!selected) return;

/* サーブ */
if(phase==="serve" && area.classList.contains("serve")){
area.appendChild(selected);
selected=null;

phase="enemy";
cpuAttack();
}

/* レシーブ */
else if(phase==="receive" && area.classList.contains("receive")){
area.appendChild(selected);
selected=null;
judge();
}
};
});
</script>

</body>
</html>
