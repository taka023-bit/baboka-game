<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK</title>

<style>
body {
    background: #1a1a1a;
    color: white;
    font-family: sans-serif;
    text-align: center;
}

/* フィールド全体 */
.field {
    display: flex;
    flex-direction: column;
    gap: 15px;
    padding: 10px;
}

/* 共通エリア */
.area {
    border: 2px solid #fff;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    font-size: 12px;
}

/* カード */
.card {
    width: 60px;
    height: 90px;
    background: white;
    color: black;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 2px;
    cursor: pointer;
}

/* 上段 */
.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}

/* セット（小さめ） */
.set {
    width: 70px;
    height: 100px;
    background: purple;
}

/* ブロック */
.block-area {
    display: flex;
    gap: 10px;
}

.side {
    width: 80px;
    height: 100px;
    background: #ccc;
    color: black;
}

.center {
    width: 80px;
    height: 100px;
    background: #666;
}

/* デッキ＆ドロップ */
.deck-area {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.deck, .drop {
    width: 60px;
    height: 80px;
    background: orange;
    color: black;
}

/* 中段 */
.middle {
    display: flex;
    justify-content: space-around;
}

.receive {
    width: 100px;
    height: 80px;
    background: blue;
}

.toss {
    width: 100px;
    height: 80px;
    background: green;
}

.attack {
    width: 100px;
    height: 80px;
    background: red;
}

/* 下段 */
.bottom {
    display: flex;
    justify-content: center;
    gap: 20px;
}

/* サーブ */
.serve {
    width: 80px;
    height: 100px;
    background: yellow;
    color: black;
}

/* イベント */
.event {
    width: 100px;
    height: 80px;
    background: white;
    color: black;
}
</style>
</head>

<body>

<h1>バボカBREAK v3</h1>

<button onclick="createCard()">カード出す</button>

<div class="field">

    <!-- 上段 -->
    <div class="top">

        <div class="area set">セット</div>

        <div class="block-area">
            <div class="area side">サイド</div>
            <div class="area center">センター</div>
            <div class="area side">サイド</div>
        </div>

        <div class="deck-area">
            <div class="area deck">デッキ</div>
            <div class="area drop">ドロップ</div>
        </div>

    </div>

    <!-- 中段 -->
    <div class="middle">
        <div class="area receive">レシーブ</div>
        <div class="area toss">トス</div>
        <div class="area attack">アタック</div>
    </div>

    <!-- 下段 -->
    <div class="bottom">
        <div class="area serve">サーブ</div>
        <div class="area event">イベント</div>
    </div>

</div>

<script>
let selectedCard = null;

function createCard() {
    const card = document.createElement("div");
    card.innerText = "カード";
    card.classList.add("card");

    card.onclick = () => {
        selectedCard = card;
    };

    document.body.appendChild(card);
}

document.querySelectorAll(".area").forEach(area => {
    area.onclick = () => {
        if (selectedCard) {
            area.appendChild(selectedCard);
            selectedCard = null;
        }
    };
});
</script>

</body>
</html>
