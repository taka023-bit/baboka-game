<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>バボカBREAK</title>

<style>
body{background:black;color:white;text-align:center;}

.field{
 display:grid;
 grid-template-columns:repeat(5,70px);
 grid-template-rows:repeat(7,70px);
 gap:6px;
 justify-content:center;
}

.area{
 border:2px solid white;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:10px;
 flex-wrap:wrap;
}

.cpu-serve{grid-column:3;grid-row:1;background:yellow;color:black;}
.ui-row{grid-column:1/6;grid-row:4;background:#333;}

.pl-serve{grid-column:3;grid-row:7;background:yellow;color:black;}
.pl-receive{grid-column:2;grid-row:6;background:blue;}
.pl-toss{grid-column:3;grid-row:6;background:green;}
.pl-attack{grid-column:4;grid-row:6;background:red;}

.card{
 width:40px;height:60px;
 background:white;color:black;
 margin:2px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:9px;
 cursor:pointer;
}

.selected{outline:2px solid yellow;}
#hand{display:flex;justify-content:center;margin-top:10px;}
</style>
</head>

<body>

<h3 id="phase">サイコロ</h3>

<div class="field">

<div class="area cpu-serve" id="cpuServe">CPUサーブ</div>

<div class="area ui-row" id="ui"></div>

<div class="area pl-receive" id="receiveArea">レシーブ</div>
<div class="area pl-toss" id="tossArea">トス</div>
<div class="area pl-attack" id="attackArea">アタック</div>
<div class="area pl-serve" id="serveArea">サーブ</div>

</div>

<div id="hand"></div>

<script>
let game={
 deck:[],
 hand:[],
 selected:null,
 phase:"dice",
 placed:false
};

// デッキ
for(let i=0;i<40;i++){
 game.deck.push({name:"カード"+i});
}
game.deck.sort(()=>Math.random()-0.5);

// 手札
function renderHand(){
 let h=document.getElementById("hand");
 h.innerHTML="";
 game.hand.forEach((c,i)=>{
  let d=document.createElement("div");
  d.className="card"+(game.selected===i?" selected":"");
  d.innerText=c.name;
  d.onclick=()=>{
   game.selected=(game.selected===i?null:i);
   renderHand();
  };
  h.appendChild(d);
 });
}

function draw(n){
 for(let i=0;i<n;i++){
  if(game.deck.length) game.hand.push(game.deck.shift());
 }
 renderHand();
}

// 配置制御
function place(areaId){
 if(game.selected===null) return;
 if(game.placed) return;

 // フェイズごとの制限
 if(game.phase==="serve" && areaId!=="serveArea") return;
 if(game.phase==="receive" && areaId!=="receiveArea") return;
 if(game.phase==="toss" && areaId!=="tossArea") return;
 if(game.phase==="attack" && areaId!=="attackArea") return;

 let area=document.getElementById(areaId);
 let card=game.hand[game.selected];

 let d=document.createElement("div");
 d.className="card";
 d.innerText=card.name;

 area.appendChild(d);

 game.hand.splice(game.selected,1);
 game.selected=null;
 game.placed=true;

 renderHand();
 nextPhase();
}

// フェイズ進行
function nextPhase(){
 if(game.phase==="serve"){
  game.phase="receive";
 }else if(game.phase==="receive"){
  game.phase="toss";
 }else if(game.phase==="toss"){
  game.phase="attack";
 }else if(game.phase==="attack"){
  game.phase="receive"; // ループ
 }

 game.placed=false;
 updatePhaseUI();
}

// UI更新
function updatePhaseUI(){
 let text={
  serve:"サーブフェイズ",
  receive:"レシーブフェイズ",
  toss:"トスフェイズ",
  attack:"アタックフェイズ"
 };
 document.getElementById("phase").innerText=text[game.phase];
}

// サイコロ
function rollDice(){
 let p=Math.ceil(Math.random()*6);
 let c=Math.ceil(Math.random()*6);

 document.getElementById("phase").innerText =
  "あなた:"+p+" / CPU:"+c;

 document.getElementById("ui").innerHTML =
  '<button onclick="startGame()">スタート</button>';
}

// 開始
function startGame(){
 draw(6);
 game.phase="serve";
 updatePhaseUI();
 document.getElementById("ui").innerHTML="";
}

// 起動
window.onload=()=>{
 document.getElementById("ui").innerHTML=
 '<button onclick="rollDice()">サイコロ</button>';

 document.querySelectorAll(".area").forEach(area=>{
  area.onclick=()=>place(area.id);
 });
};
</script>

</body>
</html>
