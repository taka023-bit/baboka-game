<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baboca Field</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #f5f5f5;
    font-family: sans-serif;
  }

  /* 全体をスマホ幅にフィット */
  #game {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
  }

  /* フィールド1枚（3段×5列） */
  .field {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(3, 60px);
    gap: 4px;
    width: 100%;
  }

  .area {
    background: #ffffff;
    border: 2px solid #333;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 12px;
  }

  /* 空白マス */
  .empty {
    background: transparent;
    border: none;
  }

  /* ブロックエリア（色を変える） */
  .side, .center {
    background: #ffe8a3;
  }

  /* 上下フィールドの間の隙間をゼロに */
  #divider {
    height: 0;
    margin: 0;
    padding: 0;
  }

  /* 手札 */
  #hand {
    width: 100%;
    height: 80px;
    background: #ddd;
    border-top: 3px solid #333;
    display: flex;
    justify-content: center;
    align-items: center;
  }
</style>
</head>

<body>

<div id="game">

  <!-- ▼ 相手フィールド（上） -->
  <div class="field opponent">

    <!-- 1段目 -->
    <div class="area">SET</div>
    <div class="area side">SIDE</div>
    <div class="area center">CENTER</div>
    <div class="area side">SIDE</div>
    <div class="area">DECK</div>

    <!-- 2段目 -->
    <div class="empty"></div>
    <div class="area">RECEIVE</div>
    <div class="area">TOSS</div>
    <div class="area">ATTACK</div>
    <div class="area">DROP</div>

    <!-- 3段目 -->
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="area">SERVE</div>
    <div class="area">EVENT</div>
    <div class="empty"></div>

  </div>

  <!-- ▼ フィールド同士をくっつける（隙間ゼロ） -->
  <div id="divider"></div>

  <!-- ▼ 自分フィールド（下） -->
  <div class="field player">

    <!-- 1段目 -->
    <div class="area">SET</div>
    <div class="area side">SIDE</div>
    <div class="area center">CENTER</div>
    <div class="area side">SIDE</div>
    <div class="area">DECK</div>

    <!-- 2段目 -->
    <div class="empty"></div>
    <div class="area">RECEIVE</div>
    <div class="area">TOSS</div>
    <div class="area">ATTACK</div>
    <div class="area">DROP</div>

    <!-- 3段目 -->
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="area">SERVE</div>
    <div class="area">EVENT</div>
    <div class="empty"></div>

  </div>

  <!-- ▼ 手札 -->
  <div id="hand">HAND</div>

</div>

</body>
</html>
