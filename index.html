<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK</title>

<style>
body {
    background: #1a1a1a;
    color: white;
    font-family: sans-serif;
    text-align: center;
}

/* グリッド全体 */
.field {
    display: grid;
    grid-template-columns: repeat(5, 80px);
    grid-template-rows: repeat(3, 110px);
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
}

/* 共通エリア */
.area {
    border: 2px solid #fff;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 12px;
}

/* カード */
.card {
    width: 60px;
    height: 90px;
    background: white;
    color: black;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 2px;
    cursor: pointer;
}

/* 配置（ここが神ポイント🔥） */

/* 上段 */
.set-top { grid-column: 1; grid-row: 1; background: purple; }

.side-left { grid-column: 2; grid-row: 1; background: #ccc; color:black; }
.center { grid-column: 3; grid-row: 1; background: #666; }
.side-right { grid-column: 4; grid-row: 1; background: #ccc; color:black; }

.deck { grid-column: 5; grid-row: 1; background: orange; color:black; }
.drop { grid-column: 5; grid-row: 2; background: orange; color:black; }

/* 中段 */
.receive { grid-column: 2; grid-row: 2; background: blue; }
.toss { grid-column: 3; grid-row: 2; background: green; }
.attack { grid-column: 4; grid-row: 2; background: red; }

/* 下段 */
.set-bottom { grid-column: 1; grid-row: 3; background: purple; }

.serve { grid-column: 3; grid-row: 3; background: yellow; color:black; }

.event { grid-column: 5; grid-row: 3; background: white; color:black; }

</style>
</head>

<body>

<h1>バボカBREAK（グリッド完成版）</h1>

<button onclick="createCard()">カード出す</button>

<div class="field">

    <div class="area set-top">セット</div>
    <div class="area side-left">サイド</div>
    <div class="area center">センター</div>
    <div class="area side-right">サイド</div>
    <div class="area deck">デッキ</div>

    <div class="area receive">レシーブ</div>
    <div class="area toss">トス</div>
    <div class="area attack">アタック</div>
    <div class="area drop">ドロップ</div>

    <div class="area set-bottom">セット</div>
    <div class="area serve">サーブ</div>
    <div class="area event">イベント</div>

</div>

<script>
let selectedCard = null;

function createCard() {
    const card = document.createElement("div");
    card.innerText = "カード";
    card.classList.add("card");

    card.onclick = () => {
        selectedCard = card;
    };

    document.body.appendChild(card);
}

document.querySelectorAll(".area").forEach(area => {
    area.onclick = () => {
        if (selectedCard) {
            area.appendChild(selectedCard);
            selectedCard = null;
        }
    };
});
</script>

</body>
</html>
