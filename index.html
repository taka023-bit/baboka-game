<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テスト</title>

<style>
body{background:black;color:white;text-align:center;}
.field{
 display:grid;
 grid-template-columns:repeat(5,70px);
 grid-template-rows:repeat(7,70px);
 gap:6px;
 justify-content:center;
}
.area{
 border:2px solid white;
 display:flex;
 align-items:center;
 justify-content:center;
}
.cpu-serve{grid-column:3;grid-row:1;background:yellow;color:black;}
.pl-serve{grid-column:3;grid-row:7;background:yellow;color:black;}
.ui-row{grid-column:1/6;grid-row:4;background:#333;}
</style>
</head>

<body>

<h1>表示テスト</h1>

<div class="field">
<div class="area cpu-serve">CPUサーブ</div>
<div class="area ui-row">UI</div>
<div class="area pl-serve">自分サーブ</div>
</div>

</body>
</html>
