<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦 - フィールド間隔調整</title><style>
html, body {
    margin:0;
    padding:0;
    overflow:hidden;
    background:#1a1a1a;
    color:white;
    font-family:sans-serif;
}

.container {
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    height:100dvh;
    padding:10px 0;
}

.field-wrapper {
    display:flex;
    justify-content:center;
    align-items:center;
    flex:0 0 auto;
    margin:5px 0;
}

.field {
    display:grid;
    grid-template-columns:50px 70px 70px 70px 50px;
    grid-template-rows:70px 70px 70px;
    gap:6px;
}

.enemy {
    transform:rotate(180deg);
}

.area {
    border:2px solid #fff;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    font-size:9px;
    position:relative;
    text-align:center;
}

/* ===== 配置（絶対変更不可） ===== */
.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black; }
.center { grid-column:3; grid-row:1; background:#666; }
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black; }
.deck { grid-column:5; grid-row:1; background:orange; color:black; }

.receive { grid-column:2; grid-row:2; background:blue; }
.toss { grid-column:3; grid-row:2; background:green; }
.attack { grid-column:4; grid-row:2; background:red; }
.drop { grid-column:5; grid-row:2; background:orange; color:black; }

.set-bottom { grid-column:1; grid-row:3; background:purple; }
.serve { grid-column:3; grid-row:3; background:yellow; color:black; }
.event { grid-column:4; grid-row:3; background:white; color:black; }

</style></head>
<body><div class="container"><!-- CPUフィールド（逆さま） --><div class="field-wrapper" style="margin-top:20px;">
    <div class="field enemy" id="cpuField"></div>
</div><!-- プレイヤーフィールド（正常向き） --><div class="field-wrapper" style="margin-bottom:20px;">
    <div class="field" id="playerField"></div>
</div><script>
function renderField(id){
    const field=document.getElementById(id);
    field.innerHTML='';

    const names=[
        'セット上','サイド左','センター','サイド右','デッキ',
        'レシーブ','トス','アタック','ドロップ',
        'セット下','サーブ','イベント'
    ];

    const areas=[
        'set-top','side-l','center','side-r','deck',
        'receive','toss','attack','drop',
        'set-bottom','serve','event'
    ];

    areas.forEach((a,i)=>{
        const div=document.createElement('div');
        div.className='area '+a;
        div.innerText=names[i];
        field.appendChild(div);
    });
}

renderField('playerField');
renderField('cpuField');
</script></body>
</html>
