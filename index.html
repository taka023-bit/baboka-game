<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baboca Court Layout</title>

<style>
body {
    margin: 0;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
}

.court-wrapper {
    width: 95vw;
    max-width: 480px;
    margin: 10px auto;
}

/* ===== 共通エリア ===== */
.area {
    border: 2px solid #000;
    color: #fff;
    font-weight: bold;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
}

/* ===== 色設定 ===== */
.attack { background: #d64545; }
.toss { background: #4caf50; }
.receive { background: #3f51b5; }
.serve { background: #f4d03f; color:#000; }
.event { background: #bdbdbd; color:#000; }
.drop { background: #212121; }
.set { background: #8e44ad; }
.deck { background: #1e88e5; }

/* ===== 行の高さを完全固定 ===== */
.row3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    height: 60px;
    gap: 6px;
    margin-bottom: 6px;
}

.row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 60px;
    gap: 6px;
    margin-bottom: 6px;
}
</style>
</head>

<body>
<div class="court-wrapper">

    <!-- ===== 上フィールド（下フィールドの180度反転） ===== -->
    <div class="row3">
        <div class="area attack">ATTACK</div>
        <div class="area toss">TOSS</div>
        <div class="area receive">RECEIVE</div>
    </div>

    <div class="row3">
        <div class="area drop">DROP</div>
        <div class="area serve">SERVE</div>
        <div class="area event">EVENT</div>
    </div>

    <!-- ===== 下フィールド ===== -->
    <div class="row3">
        <div class="area receive">RECEIVE</div>
        <div class="area toss">TOSS</div>
        <div class="area attack">ATTACK</div>
    </div>

    <div class="row3">
        <div class="area event">EVENT</div>
        <div class="area serve">SERVE</div>
        <div class="area drop">DROP</div>
    </div>

</div>
</body>
</html>
