<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#1a1a1a;
color:white;
font-family:sans-serif;
}

.container{
display:flex;
flex-direction:column;
height:100dvh;
}

.field-wrap{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* フィールド */
.field{
display:grid;
grid-template-columns:50px 70px 70px 70px 50px;
grid-template-rows:70px 70px 70px;
gap:6px;
}

/* 相手 */
.enemy{
transform:rotate(180deg);
pointer-events:none;
}
.enemy .area{
transform:rotate(180deg);
}

/* マス */
.area{
border:2px solid #fff;
border-radius:8px;
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
font-size:9px;
}

/* カード */
.card{
width:40px;
height:60px;
background:white;
color:black;
border-radius:6px;
font-size:9px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
margin:2px;
}

/* 手札 */
#hand{
display:flex;
justify-content:center;
gap:5px;
height:80px;
}

/* 選択 */
#choice{
display:flex;
justify-content:center;
gap:10px;
height:50px;
}

/* ===== 配置（元の見やすい配置） ===== */

.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black;}
.center { grid-column:3; grid-row:1; background:#666;}
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black;}
.deck { grid-column:5; grid-row:1; background:orange; color:black;}

.receive { grid-column:2; grid-row:2; background:blue;}
.toss { grid-column:3; grid-row:2; background:green;}
.attack { grid-column:4; grid-row:2; background:red;}
.drop { grid-column:5; grid-row:2; background:orange; color:black;}

.set-bottom { grid-column:1; grid-row:3; background:purple;}

/* 修正済み */
.block { grid-column:2; grid-row:3; background:purple;}
.serve { grid-column:3; grid-row:3; background:yellow; color:black;}
.event { grid-column:4; grid-row:3; background:white; color:black;}

</style>
</head>

<body>

<div class="container">

<!-- 相手 -->
<div class="field-wrap">
<div class="field enemy" id="enemyField">

<div class="area set-top">セット</div>
<div class="area side-l">サイド</div>
<div class="area center">センター</div>
<div class="area side-r">サイド</div>
<div class="area deck">デッキ</div>

<div class="area receive">レシーブ</div>
<div class="area toss">トス</div>
<div class="area attack">アタック</div>
<div class="area drop">ドロップ</div>

<div class="area set-bottom">セット</div>
<div class="area block">ブロック</div>
<div class="area event">イベント</div>

</div>
</div>

<!-- 自分 -->
<div class="field-wrap">
<div class="field" id="playerField">

<div class="area set-top">セット</div>
<div class="area side-l">サイド</div>
<div class="area center">センター</div>
<div class="area side-r">サイド</div>
<div class="area deck">デッキ</div>

<div class="area receive">レシーブ</div>
<div class="area toss">トス</div>
<div class="area attack">アタック</div>
<div class="area drop">ドロップ</div>

<div class="area set-bottom">セット</div>
<div class="area block">ブロック</div>
<div class="area serve">サーブ</div>
<div class="area event">イベント</div>

</div>
</div>

<div id="hand"></div>
<div id="choice"></div>

</div>

<script>
let selected=null;
let phase="serve";

/* カード生成 */
function createCard(){
const c=document.createElement("div");
c.className="card";

const atk=Math.floor(Math.random()*5)+1;
const def=Math.floor(Math.random()*5)+1;

c.dataset.atk=atk;
c.dataset.def=def;
c.innerHTML=`A:${atk}<br>D:${def}`;

c.onclick=()=>selected=c;

hand.appendChild(c);
}

for(let i=0;i<5;i++) createCard();

/* CPU攻撃 */
function cpuAttack(){
["receive","toss","attack"].forEach(p=>{
const area=document.querySelector("#enemyField ."+p);
area.innerHTML="";

const c=document.createElement("div");
c.className="card";

const atk=Math.floor(Math.random()*5)+1;
const def=Math.floor(Math.random()*5)+1;

c.dataset.atk=atk;
c.dataset.def=def;
c.innerHTML=`A:${atk}<br>D:${def}`;

area.appendChild(c);
});

showChoice();
}

/* 選択 */
function showChoice(){
choice.innerHTML=`
<button onclick="setBlock()">ブロック</button>
<button onclick="setReceive()">レシーブ</button>
`;
}

function setBlock(){
phase="block";
choice.innerText="ブロック（最大3枚）";
}

function setReceive(){
phase="receive";
choice.innerText="レシーブ（1枚）";
}

/* 判定 */
function judge(){
const atk=document.querySelector("#enemyField .attack .card");

let total=0;

document.querySelectorAll("#playerField .block .card")
.forEach(c=> total+=Number(c.dataset.def));

const recv=document.querySelector("#playerField .receive .card");
if(recv){
total+=Number(recv.dataset.def);
}

if(atk.dataset.atk > total){
alert("失点…");
}else{
alert("防いだ🔥");
}

reset();
}

/* リセット */
function reset(){
document.querySelectorAll("#playerField .area").forEach(a=>a.innerHTML=a.innerText);
document.querySelectorAll("#enemyField .area").forEach(a=>a.innerHTML=a.innerText);

phase="serve";
choice.innerHTML="";
}

/* クリック */
document.querySelectorAll("#playerField .area").forEach(area=>{
area.onclick=()=>{
if(!selected) return;

/* サーブ */
if(phase==="serve" && area.classList.contains("serve")){
area.appendChild(selected);
selected=null;
cpuAttack();
}

/* ブロック */
else if(phase==="block" && area.classList.contains("block")){
if(area.children.length>=3){
alert("3枚まで！");
return;
}
area.appendChild(selected);
selected=null;
}

/* レシーブ */
else if(phase==="receive" && area.classList.contains("receive")){
area.appendChild(selected);
selected=null;
judge();
}
};
});
</script>

</body>
</html>
