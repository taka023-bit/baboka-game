<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦</title>
<style>
html, body { margin:0; padding:0; overflow:hidden; background:#1a1a1a; color:white; font-family:sans-serif;}
.container { display:flex; flex-direction:column; height:100dvh; }
.field-wrapper { display:flex; justify-content:center; align-items:center; }
.field { display: grid; grid-template-columns: repeat(5,70px); grid-template-rows: repeat(7,70px); gap:6px; justify-content:center; }
.area { border:2px solid white; border-radius:8px; display:flex; justify-content:center; align-items:center; font-size:10px; position:relative; }
.card { width:40px; height:60px; background:white; color:black; border-radius:6px; font-size:9px; display:flex; justify-content:center; align-items:center; margin:2px; cursor:pointer; }
.selected { outline:2px solid yellow; }
.card-detail { position:absolute; top:-90px; left:0; width:100px; background:#333; border:1px solid #fff; border-radius:6px; padding:4px; display:none; font-size:10px; z-index:10; }
#hand { display:flex; justify-content:center; gap:5px; position:absolute; left:50%; transform:translateX(-50%); }
#setUpUI { text-align:center; position:absolute; width:100%; top:50%; transform:translateY(-50%); }
button { padding:4px 8px; margin:2px; }
#deckCount { position:absolute; top:20px; left:0; width:100%; text-align:center; font-size:12px;}
/* フィールド色 */
.set-top, .set-bottom { background:purple; }
.side-l, .side-l-top, .side-r, .side-r-top { background:#ccc; color:black; }
.center, .center-top { background:#666; }
.deck, .deck-top { background:orange; color:black; }
.receive, .receive-top { background:blue; }
.toss, .toss-top { background:green; }
.attack, .attack-top { background:red; }
.drop, .drop-top { background:darkorange; color:black; }
.serve { background:yellow; color:black; }
</style>
</head>
<body>
<div class="container">
<div id="phaseDisplay">フェイズ:開始前</div>
<div id="deckCount"></div>
<div id="setUpUI"></div><div class="field-wrapper">
<div class="field" id="cpuField">
<!-- CPU後衛 -->
<div class="area"></div><div class="area"></div><div class="area serve"></div><div class="area"></div><div class="area"></div>
<!-- CPU前衛 -->
<div class="area drop-top">ドロップ</div><div class="area receive-top">レシーブ</div><div class="area toss-top">トス</div><div class="area attack-top">アタック</div><div class="area set-top">セット</div>
<!-- ブロックエリア -->
<div class="area deck-top">デッキ</div><div class="area side-l-top">サイド</div><div class="area center-top">センター</div><div class="area side-r-top">サイド</div><div class="area set-top">セット</div>
</div>
</div><div class="field-wrapper">
<div class="field" id="playerField">
<!-- プレイヤーブロックエリア -->
<div class="area set-bottom">セット</div><div class="area side-l">サイド</div><div class="area center">センター</div><div class="area side-r">サイド</div><div class="area deck">デッキ</div>
<!-- プレイヤー前衛 -->
<div class="area set-bottom">セット</div><div class="area side-l">サイド</div><div class="area center">センター</div><div class="area side-r">サイド</div><div class="area set-bottom">セット</div>
<!-- プレイヤー後衛 -->
<div class="area"></div><div class="area"></div><div class="area serve"></div><div class="area"></div><div class="area"></div>
</div>
</div><div id="hand"></div>
</div>
<script>
let game = { hand:[], deck:[], selected:null, started:false, phase:0, placed:false, cpuHand:[], cpuDeck:[], turn:'player' };
const phases=['serve','draw','toss','attack'];for(let i=0;i<32;i++){ game.deck.push({name:'キャラ'+(i+1)}); game.cpuDeck.push({name:'CPU'+(i+1)}); } function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}} shuffle(game.deck); shuffle(game.cpuDeck);

function draw(n=1){for(let i=0;i<n;i++){if(game.deck.length===0) return; game.hand.push(game.deck.shift());}} function cpuDraw(n=1){for(let i=0;i<n;i++){if(game.cpuDeck.length===0) return; game.cpuHand.push(game.cpuDeck.shift());}}

function renderHand(){ let h=document.getElementById('hand'); h.innerHTML=''; game.hand.forEach(c=>{ let d=document.createElement('div'); d.className='card'+(c.sel?' selected':''); d.innerText=c.name; d.onclick=()=>{ c.sel=!c.sel; renderHand(); showDetail(d,c); }; h.appendChild(d); }); }

function showDetail(div,card){ let detail=div.querySelector('.card-detail'); if(!detail){ detail=document.createElement('div'); detail.className='card-detail'; detail.innerText='詳細情報\n'+card.name; div.appendChild(detail); } detail.style.display='block'; setTimeout(()=>{detail.style.display='none';},2000); }

function placeCard(area){ if(game.turn!=='player') return; let idx=game.hand.findIndex(c=>c.sel); if(idx<0) return; let a=document.querySelector('.'+area); let card=game.hand[idx]; let d=document.createElement('div'); d.className='card'; d.innerText=card.name; a.appendChild(d); game.hand.splice(idx,1); game.placed=true; renderHand(); } function cpuPlace(area){ if(game.cpuHand.length===0) return; let a=document.querySelector('.'+area); let idx=Math.floor(Math.random()*game.cpuHand.length); let card=game.cpuHand.splice(idx,1)[0]; let d=document.createElement('div'); d.className='card'; d.innerText=card.name; a.appendChild(d); }

function setPhase(i){ game.phase=i; game.placed=false; let p=phases[i]; document.getElementById('phaseDisplay').innerText='フェイズ: '+p; handlePhase(p); } function nextPhase(){ game.phase++; if(game.phase>=phases.length) game.phase=0; setPhase(game.phase); }

function handlePhase(p){ let ui=document.getElementById('setUpUI'); ui.innerHTML=''; if(game.turn==='player'){ if(p==='serve') document.querySelector('.serve').onclick=()=>placeCard('serve'); if(p==='toss') document.querySelector('.toss').onclick=()=>placeCard('toss'); if(p==='attack') document.querySelector('.attack').onclick=()=>placeCard('attack'); } else { if(p==='serve') cpuPlace('serve'); if(p==='toss') cpuPlace('toss'); if(p==='attack') cpuPlace('attack'); setTimeout(()=>{ game.turn='player'; renderHand(); },500); } let btn=document.createElement('button'); btn.innerText='次へ'; btn.onclick=nextPhase; ui.appendChild(btn); }

window.onload=()=>{ draw(6); cpuDraw(6); renderHand(); setPhase(0); }; </script>

</body>
</html>
