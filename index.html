<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baboca Field</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #111; /* 真っ黒より優しい黒 */
    font-family: sans-serif;
    overflow: hidden;
  }

  #game {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== フィールド（3段×5列） ===== */
  .field {
    flex: 1;
    display: grid;

    grid-template-columns: 1fr 1.2fr 1.2fr 1.2fr 1fr;

    /* 縦幅をさらに削る（0.65fr） */
    grid-template-rows: repeat(3, 0.65fr);

    gap: 4px;
    padding: 4px;
  }

  /* 上のフィールドを180度回転（上下左右反転） */
  .opponent {
    transform: rotate(180deg);
  }

  /* ===== エリア共通 ===== */
  .area {
    background: #222;
    border: 2px solid #ddd; /* 白より優しい枠線 */
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 14px;
    color: white;
  }

  /* ===== 色指定（公式色＋目に優しい調整） ===== */
  .center { background: #444; }
  .side   { background: #666; }
  .receive{ background: #0094ff; }
  .toss   { background: #00c853; }
  .attack { background: #ff1744; }
  .serve  { background: #ffea00; color: #000; }
  .drop   { background: #444; }
  .event  { background: #222; }

  /* 空白マス */
  .empty {
    background: transparent;
    border: none;
  }

  /* ===== 手札エリア（さらに広げる） ===== */
  #hand {
    height: 170px; /* ← 150 → 170 に拡大 */
    background: #222;
    border-top: 3px solid #ddd;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    color: white;
  }
</style>
</head>

<body>

<div id="game">

  <!-- ▼ 相手フィールド（180度回転） -->
  <div class="field opponent">

    <!-- 1段目 -->
    <div class="area">セット</div>
    <div class="area side">サイド</div>
    <div class="area center">センター</div>
    <div class="area side">サイド</div>
    <div class="area">デッキ</div>

    <!-- 2段目 -->
    <div class="empty"></div>
    <div class="area receive">レシーブ</div>
    <div class="area toss">トス</div>
    <div class="area attack">アタック</div>
    <div class="area drop">ドロップ</div>

    <!-- 3段目 -->
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="area serve">サーブ</div>
    <div class="area event">イベント</div>
    <div class="empty"></div>

  </div>

  <!-- ▼ 自分フィールド -->
  <div class="field player">

    <!-- 1段目 -->
    <div class="area">セット</div>
    <div class="area side">サイド</div>
    <div class="area center">センター</div>
    <div class="area side">サイド</div>
    <div class="area">デッキ</div>

    <!-- 2段目 -->
    <div class="empty"></div>
    <div class="area receive">レシーブ</div>
    <div class="area toss">トス</div>
    <div class="area attack">アタック</div>
    <div class="area drop">ドロップ</div>

    <!-- 3段目 -->
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="area serve">サーブ</div>
    <div class="area event">イベント</div>
    <div class="empty"></div>

  </div>

  <!-- ▼ 手札 -->
  <div id="hand">手札</div>

</div>

</body>
</html>
