<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#1a1a1a;
color:white;
}

.container{
display:flex;
flex-direction:column;
height:100dvh;
}

.field-wrap{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.field{
display:grid;
grid-template-columns:60px 70px 70px 70px 60px;
grid-template-rows:70px 70px 70px;
gap:6px;
}

/* 相手 */
.enemy{
transform:rotate(180deg);
pointer-events:none;
}
.enemy .area{
transform:rotate(180deg);
}

/* マス */
.area{
border:2px solid white;
border-radius:6px;
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
font-size:10px;
}

/* カード */
.card{
width:40px;
height:60px;
background:white;
color:black;
font-size:9px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
margin:2px;
}

/* 手札 */
#hand{
display:flex;
justify-content:center;
height:80px;
}

/* 選択 */
#choice{
display:flex;
justify-content:center;
gap:10px;
height:50px;
}

/* 配置 */
.receive{grid-column:2;grid-row:2;background:blue;}
.toss{grid-column:3;grid-row:2;background:green;}
.attack{grid-column:4;grid-row:2;background:red;}

.block{grid-column:2;grid-row:3;background:purple;}
.serve{grid-column:3;grid-row:3;background:yellow;color:black;}
.event{grid-column:4;grid-row:3;background:white;color:black;}
</style>
</head>

<body>

<div class="container">

<!-- 相手 -->
<div class="field-wrap">
<div class="field enemy" id="enemy">
<div class="area receive"></div>
<div class="area toss"></div>
<div class="area attack"></div>
</div>
</div>

<!-- 自分 -->
<div class="field-wrap">
<div class="field" id="player">
<div class="area receive"></div>
<div class="area toss"></div>
<div class="area attack"></div>

<div class="area block"></div>
<div class="area serve"></div>
<div class="area event"></div>
</div>
</div>

<div id="hand"></div>
<div id="choice"></div>

</div>

<script>
let selected=null;
let phase="serve";

/* カード生成 */
function createCard(){
const c=document.createElement("div");
c.className="card";

const atk=Math.floor(Math.random()*5)+1;
const def=Math.floor(Math.random()*5)+1;

c.dataset.atk=atk;
c.dataset.def=def;
c.innerHTML=`A:${atk}<br>D:${def}`;

c.onclick=()=>selected=c;

hand.appendChild(c);
}

for(let i=0;i<5;i++) createCard();

/* CPU攻撃 */
function cpuAttack(){
["receive","toss","attack"].forEach(p=>{
const area=document.querySelector("#enemy ."+p);
area.innerHTML="";

const c=document.createElement("div");
c.className="card";

const atk=Math.floor(Math.random()*5)+1;
const def=Math.floor(Math.random()*5)+1;

c.dataset.atk=atk;
c.dataset.def=def;
c.innerHTML=`A:${atk}<br>D:${def}`;

area.appendChild(c);
});

showChoice();
}

/* 選択UI */
function showChoice(){
choice.innerHTML=`
<button onclick="setBlock()">ブロック</button>
<button onclick="setReceive()">レシーブ</button>
`;
}

/* モード切替 */
function setBlock(){
phase="block";
choice.innerText="ブロック中（最大3枚）";
}

function setReceive(){
phase="receive";
choice.innerText="レシーブ選択";
}

/* 判定 */
function judge(){
const atk=document.querySelector("#enemy .attack .card");
let total=0;

document.querySelectorAll("#player .block .card")
.forEach(c=> total+=Number(c.dataset.def));

const recv=document.querySelector("#player .receive .card");

if(recv){
total+=Number(recv.dataset.def);
}

if(atk.dataset.atk > total){
alert("失点…");
}else{
alert("防いだ🔥");
}

resetField();
}

/* リセット */
function resetField(){
document.querySelectorAll(".area").forEach(a=>a.innerHTML="");
phase="serve";
choice.innerHTML="";
}

/* クリック処理 */
document.querySelectorAll("#player .area").forEach(area=>{
area.onclick=()=>{
if(!selected) return;

/* サーブ */
if(phase==="serve" && area.classList.contains("serve")){
area.appendChild(selected);
selected=null;

phase="enemy";
cpuAttack();
}

/* ブロック */
else if(phase==="block" && area.classList.contains("block")){
if(area.children.length>=3){
alert("3枚まで！");
return;
}
area.appendChild(selected);
selected=null;
}

/* レシーブ */
else if(phase==="receive" && area.classList.contains("receive")){
area.appendChild(selected);
selected=null;
judge();
}
};
});
</script>

</body>
</html>
