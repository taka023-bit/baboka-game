<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baboca Court Layout</title>

<style>
body {
    margin: 0;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
}

.court-wrapper {
    width: 95vw;
    max-width: 480px;
    margin: 10px auto;
}

/* ===== 共通エリア ===== */
.area {
    border: 2px solid #000;
    padding: 10px;
    color: #fff;
    font-weight: bold;
    text-align: center;
    box-sizing: border-box;
}

/* ===== 色設定（画像に合わせた近似色） ===== */
.block { background: #4a4a4a; }
.attack { background: #d64545; }
.toss { background: #4caf50; }
.receive { background: #3f51b5; }
.serve { background: #f4d03f; color:#000; }
.event { background: #bdbdbd; color:#000; }
.drop { background: #212121; }
.set { background: #8e44ad; }
.deck { background: #1e88e5; }

/* ===== レイアウト ===== */
.field {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 12px;
}

/* ブロックエリアは中央で上下がくっつく */
.block-area {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
}

/* サイドの SET / DECK */
.side-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
}

.side-row .area {
    width: 48%;
}
</style>
</head>

<body>
<div class="court-wrapper">

    <!-- ===== 相手フィールド ===== -->
    <div class="side-row">
        <div class="area set">SET</div>
        <div class="area deck">DECK</div>
    </div>

    <div class="field">
        <div class="area attack">ATTACK</div>
        <div class="area toss">TOSS</div>
        <div class="area receive">RECEIVE</div>
    </div>

    <div class="block-area">
        <div class="area block">CENTER BLOCKER</div>
        <div class="area block">SIDE BLOCKER</div>
    </div>

    <div class="side-row">
        <div class="area event">EVENT</div>
        <div class="area drop">DROP</div>
    </div>

    <!-- ===== プレイヤーフィールド ===== -->
    <div class="side-row">
        <div class="area set">SET</div>
        <div class="area deck">DECK</div>
    </div>

    <div class="field">
        <div class="area attack">ATTACK</div>
        <div class="area toss">TOSS</div>
        <div class="area receive">RECEIVE</div>
    </div>

    <!-- ★ここが相手とプレイヤーのブロックがくっつく中央ライン -->
    <div class="block-area">
        <div class="area block">CENTER BLOCKER</div>
        <div class="area block">SIDE BLOCKER</div>
    </div>

    <div class="side-row">
        <div class="area serve">SERVE</div>
        <div class="area event">EVENT</div>
    </div>

</div>
</body>
</html>
