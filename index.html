<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baboca Field</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #f5f5f5;
    font-family: sans-serif;
    overflow: hidden; /* 余白を消す */
  }

  #game {
    width: 100%;
    height: 100vh; /* 画面全体にフィット */
    display: flex;
    flex-direction: column;
  }

  /* ===== フィールド（3段×5列） ===== */
  .field {
    flex: 1; /* 上下フィールドを均等に */
    display: grid;
    grid-template-columns: 0.6fr 1fr 1fr 1fr 0.6fr; /* SET/DECK/ DROP を細く */
    grid-template-rows: 1fr 1fr 1fr; /* 3段 */
    gap: 4px;
    padding: 4px;
  }

  /* 上のフィールドを180度回転（上下左右反転） */
  .opponent {
    transform: rotate(180deg);
  }

  /* ===== エリア共通 ===== */
  .area {
    background: #ffffff;
    border: 2px solid #333;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 14px;
  }

  /* ===== コート部分を大きく見せる色 ===== */
  .side, .center, .receive, .toss, .attack, .serve, .event {
    background: #ffe8a3;
    font-weight: bold;
  }

  /* 空白マス */
  .empty {
    background: transparent;
    border: none;
  }

  /* 手札 */
  #hand {
    height: 80px;
    background: #ddd;
    border-top: 3px solid #333;
    display: flex;
    justify-content: center;
    align-items: center;
  }
</style>
</head>

<body>

<div id="game">

  <!-- ▼ 相手フィールド（180度回転） -->
  <div class="field opponent">

    <!-- 1段目 -->
    <div class="area">SET</div>
    <div class="area side">SIDE</div>
    <div class="area center">CENTER</div>
    <div class="area side">SIDE</div>
    <div class="area">DECK</div>

    <!-- 2段目 -->
    <div class="empty"></div>
    <div class="area receive">RECEIVE</div>
    <div class="area toss">TOSS</div>
    <div class="area attack">ATTACK</div>
    <div class="area">DROP</div>

    <!-- 3段目 -->
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="area serve">SERVE</div>
    <div class="area event">EVENT</div>
    <div class="empty"></div>

  </div>

  <!-- ▼ 自分フィールド（下） -->
  <div class="field player">

    <!-- 1段目 -->
    <div class="area">SET</div>
    <div class="area side">SIDE</div>
    <div class="area center">CENTER</div>
    <div class="area side">SIDE</div>
    <div class="area">DECK</div>

    <!-- 2段目 -->
    <div class="empty"></div>
    <div class="area receive">RECEIVE</div>
    <div class="area toss">TOSS</div>
    <div class="area attack">ATTACK</div>
    <div class="area">DROP</div>

    <!-- 3段目 -->
    <div class="empty"></div>
    <div class="empty"></div>
    <div class="area serve">SERVE</div>
    <div class="area event">EVENT</div>
    <div class="empty"></div>

  </div>

  <!-- ▼ 手札 -->
  <div id="hand">HAND</div>

</div>

</body>
</html>
