<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦</title>
<style>
html, body { margin:0; padding:0; overflow:hidden; background:#1a1a1a; color:white; font-family:sans-serif;}
.container { display:flex; flex-direction:column; height:100dvh;}
.field-wrapper { display:flex; justify-content:center; align-items:center; flex: 1;}
.field { display:grid; grid-template-columns:50px 70px 70px 70px 50px; grid-template-rows:70px 70px 70px; gap:6px;}
.enemy { transform:rotate(180deg);}
.enemy .area { transform:rotate(180deg);}
.area { border:2px solid #fff; border-radius:8px; display:flex; justify-content:center; align-items:center; flex-wrap:wrap; font-size:9px; position: relative; text-align:center;}
/* ===== 配置（絶対変更不可） ===== */
.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black;}
.center { grid-column:3; grid-row:1; background:#666;}
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black;}
.deck { grid-column:5; grid-row:1; background:orange; color:black;}
.receive { grid-column:2; grid-row:2; background:blue;}
.toss { grid-column:3; grid-row:2; background:green;}
.attack { grid-column:4; grid-row:2; background:red;}
.drop { grid-column:5; grid-row:2; background:orange; color:black;}
.set-bottom { grid-column:1; grid-row:3; background:purple;}
.serve { grid-column:3; grid-row:3; background:yellow; color:black;}
.event { grid-column:4; grid-row:3; background:white; color:black;}
.card { width:40px; height:60px; background:white; color:black; border-radius:6px; font-size:9px; display:flex; justify-content:center; align-items:center; margin:2px; cursor:pointer;}
#hand { display:flex; justify-content:center; gap:5px; height:80px; flex-shrink:0; margin-top:5px;}
#setUpUI { text-align:center; margin:5px;}
button { padding:4px 8px; margin:2px; font-size:12px;}
.card-detail { position:absolute; top:-150px; left:0; width:150px; background:#333; border:1px solid #fff; border-radius:6px; padding:4px; display:none; font-size:10px; z-index:10;}
#deckCount { text-align:center; margin:5px; }
</style>
</head>
<body>
<div class="container">
<div id="phaseDisplay" style="text-align:center; margin:5px;">フェイズ: ゲーム進行前</div>
<div id="deckCount"></div>
<div id="setUpUI"></div>
<!-- CPUフィールド -->
<div class="field-wrapper">
<div class="field enemy" id="cpuField"></div>
</div>
<!-- プレイヤーフィールド -->
<div class="field-wrapper">
<div class="field" id="playerField"></div>
</div><div id="hand"></div>
</div>
<script>
// ----- ゲーム状態 -----
let gameState = {
    phase: 'gameBefore',
    turnPlayer: null,
    turnCount: 1,
    deck: {player: [], cpu: []},
    hand: {player: [], cpu: []},
    selectedCard: null,
    mulliganSelected: [],
    field: {player: {}, cpu: {}},
    diceRolls: {player:0, cpu:0}
<script>
// キャラクター作成（初期40キャラ）
const characters = [];
for (let i = 1; i <= 40; i++) {
    characters.push({
        name: "キャラ" + i,
        serve: Math.floor(Math.random() * 3),
        block: Math.floor(Math.random() * 3),
        receive: Math.floor(Math.random() * 6),
        toss: Math.floor(Math.random() * 3),
        attack: Math.floor(Math.random() * 4),
        skill: []
    });
}

// ゲーム状態初期化
let gameState = {
    turnPlayer: null,
    phase: null,
    turnCount: 1,
    deck: [...characters], // プレイヤー用デッキ
    hand: {
        player: [],
        enemy: []
    },
    usedNames: [],
    selectedCard: null,
    startChoice: null
};

// デッキシャッフル関数
function shuffleDeck() {
    for (let i = gameState.deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [gameState.deck[i], gameState.deck[j]] = [gameState.deck[j], gameState.deck[i]];
    }
}

// 初期シャッフル
shuffleDeck();

// カードを引く関数
function drawCard(owner) {
    if (gameState.deck.length > 0) {
        const c = gameState.deck.shift();
        gameState.hand[owner].push(c);
        if (owner === 'player') {
            createCardElement(c, owner);
        }
    }
}

// 手札にカードを作成
function createCardElement(card, owner) {
    const div = document.createElement('div');
    div.classList.add('card');
    div.innerText = card.name;
    div.dataset.name = card.name;
    div.dataset.owner = owner;

    div.onmouseover = () => showCardDetail(div, card);
    div.onmouseout = () => hideCardDetail(div);
    div.onclick = () => {
        gameState.selectedCard = card;
    };

    if (owner === 'player') {
        document.getElementById('hand').appendChild(div);
    }
    return div;
}

// カード詳細表示
function showCardDetail(div, card) {
    let detail = div.querySelector('.card-detail');
    if (!detail) {
        detail = document.createElement('div');
        detail.classList.add('card-detail');
        detail.innerHTML =
            `Serve: ${card.serve}<br>` +
            `Block: ${card.block}<br>` +
            `Receive: ${card.receive}<br>` +
            `Toss: ${card.toss}<br>` +
            `Attack: ${card.attack}`;
        div.appendChild(detail);
    }
    detail.style.display = 'block';
}

// カード詳細非表示
function hideCardDetail(div) {
    const detail = div.querySelector('.card-detail');
    if (detail) detail.style.display = 'none';
}

// マリガンUI表示
function showMulligan() {
    const ui = document.getElementById("setUpUI");
    ui.innerHTML = 'マリガンで戻すカードをクリック、確定で次へ';
    const btn = document.createElement('button');
    btn.innerText = '確定';
    btn.onclick = () => {
        ui.innerHTML = '';
        startDiceRoll();
    };
    ui.appendChild(btn);
}

// サイコロで先攻決定
function startDiceRoll() {
    const ui = document.getElementById('setUpUI');
    ui.innerHTML = 'サイコロを振って先攻決定';
    const rollBtn = document.createElement('button');
    rollBtn.innerText = '振る';
    rollBtn.onclick = () => {
        let playerRoll = Math.floor(Math.random() * 6) + 1;
        let enemyRoll = Math.floor(Math.random() * 6) + 1;

        while (playerRoll === enemyRoll) {
            playerRoll = Math.floor(Math.random() * 6) + 1;
            enemyRoll = Math.floor(Math.random() * 6) + 1;
        }

        alert('あなた: ' + playerRoll + ' CPU: ' + enemyRoll);
        gameState.turnPlayer = (playerRoll >= enemyRoll) ? 'player' : 'enemy';
        ui.innerHTML = '';
        alert(gameState.turnPlayer + 'が先攻');

        gameState.phase = 'serve';
        document.getElementById('phaseDisplay').innerText = 'フェイズ: ' + gameState.phase;
    };
    ui.appendChild(rollBtn);
}

// ゲーム開始
function startGame() {
    for (let i = 0; i < 6; i++) drawCard('player');
    for (let i = 0; i < 6; i++) drawCard('enemy');
    showMulligan();
}

startGame();
</script>

</body>
</html>
