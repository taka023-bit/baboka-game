<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK</title>

<style>
body {
    background: #1a1a1a;
    color: white;
    font-family: sans-serif;
    text-align: center;
}

.field {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    gap: 10px;
    padding: 10px;
}

.row {
    display: contents;
}

.area {
    border: 2px solid #fff;
    border-radius: 10px;
    padding: 15px;
    min-height: 60px;
    font-size: 14px;
}

/* 上段 */
.top-left { grid-column: 1; }
.top-center { grid-column: 2; display: flex; justify-content: space-around; }
.top-right { grid-column: 3; }

/* 中段 */
.middle {
    grid-column: 1 / span 3;
    display: flex;
    justify-content: space-around;
}

/* 下段 */
.bottom {
    grid-column: 1 / span 3;
    display: flex;
    justify-content: center;
    gap: 20px;
}

/* ブロック3枠 */
.block {
    width: 30%;
}

/* デッキ＆ドロップ縦 */
.deck-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

</style>
</head>

<body>

<h1>バボカBREAK</h1>

<div class="field">

    <!-- 上段 -->
    <div class="area top-left">セット</div>

    <div class="top-center">
        <div class="area block">サイド</div>
        <div class="area block">センター</div>
        <div class="area block">サイド</div>
    </div>

    <div class="deck-area top-right">
        <div class="area">デッキ</div>
        <div class="area">ドロップ</div>
    </div>

    <!-- 中段 -->
    <div class="middle">
        <div class="area">レシーブ</div>
        <div class="area">トス</div>
        <div class="area">アタック</div>
    </div>

    <!-- 下段 -->
    <div class="bottom">
        <div class="area">サーブ</div>
        <div class="area">イベント</div>
    </div>

</div>

</body>
</html>
