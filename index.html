<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦</title>
<style>
html, body { margin:0; padding:0; overflow:hidden; background:#1a1a1a; color:white; font-family:sans-serif;}
.container { display:flex; flex-direction:column; height:100dvh;}
.field-wrapper {display:flex;justify-content:center;align-items:center;flex:1;}
.field {display:grid;grid-template-columns:50px 70px 70px 70px 50px;grid-template-rows:70px 70px 70px;gap:6px;}
.enemy {transform:rotate(180deg);} .enemy .area {transform:rotate(180deg);}
.area {border:2px solid #fff;border-radius:8px;display:flex;justify-content:center;align-items:center;flex-wrap:wrap;font-size:9px;}
.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black;}
.center { grid-column:3; grid-row:1; background:#666;}
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black;}
.deck { grid-column:5; grid-row:1; background:orange; color:black;}
.receive { grid-column:2; grid-row:2; background:blue;}
.toss { grid-column:3; grid-row:2; background:green;}
.attack { grid-column:4; grid-row:2; background:red;}
.drop { grid-column:5; grid-row:2; background:orange; color:black;}
.set-bottom { grid-column:1; grid-row:3; background:purple;}
.serve { grid-column:3; grid-row:3; background:yellow; color:black;}
.event { grid-column:4; grid-row:3; background:white; color:black;}
.card { width:40px;height:60px;background:white;color:black;border-radius:6px;font-size:9px;display:flex;justify-content:center;align-items:center;margin:2px;cursor:pointer;}
#hand { display:flex;justify-content:center;gap:5px;height:80px;margin-top:5px;}
#setUpUI { text-align:center;margin:5px;}
button { padding:4px 8px;margin:2px;}
.selected { outline:2px solid yellow;}
</style>
</head>
<body>
<div class="container">
<div id="phaseDisplay">準備中</div>
<div id="setUpUI"></div><div class="field-wrapper"><div class="field enemy">
<div class="area set-top">セット</div><div class="area side-l">サイド</div><div class="area center">センター</div><div class="area side-r">サイド</div><div class="area deck">デッキ</div>
<div class="area receive">レシーブ</div><div class="area toss">トス</div><div class="area attack">アタック</div><div class="area drop">ドロップ</div>
<div class="area set-bottom">セット</div><div class="area serve">サーブ</div><div class="area event">イベント</div>
</div></div><div class="field-wrapper"><div class="field">
<div class="area set-top">セット</div><div class="area side-l">サイド</div><div class="area center">センター</div><div class="area side-r">サイド</div><div class="area deck" id="deckArea">デッキ</div>
<div class="area receive" id="receiveArea">レシーブ</div><div class="area toss" id="tossArea">トス</div><div class="area attack" id="attackArea">アタック</div><div class="area drop">ドロップ</div>
<div class="area set-bottom">セット</div><div class="area serve" id="serveArea">サーブ</div><div class="area event">イベント</div>
</div></div><div id="hand"></div>
</div><script>
let game={hand:[],deck:[],selected:null};

for(let i=1;i<=40;i++){game.deck.push({name:"C"+i});}

function shuffle(){for(let i=game.deck.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[game.deck[i],game.deck[j]]=[game.deck[j],game.deck[i]];}}
shuffle();

function draw(n=1){for(let i=0;i<n;i++){if(game.deck.length===0)return;game.hand.push(game.deck.shift());}}

function renderHand(){
 let h=document.getElementById('hand');h.innerHTML="";
 game.hand.forEach((c,i)=>{
  let d=document.createElement('div');
  d.className='card'+(c.sel?' selected':'');
  d.innerText=c.name;
  d.onclick=()=>{c.sel=!c.sel;renderHand();};
  h.appendChild(d);
 });
}

// ===== サイコロ先 =====
function startDice(){
 let ui=document.getElementById('setUpUI');
 ui.innerHTML="サイコロを振る";
 let btn=document.createElement('button');btn.innerText="振る";
 btn.onclick=()=>{
  let p=Math.floor(Math.random()*6)+1;
  let e=Math.floor(Math.random()*6)+1;

  if(p===e){
    ui.innerHTML=`あなた:${p} CPU:${e}<br>引き分け！もう一度`;
    setTimeout(startDice,1000);
    return;
  }

  ui.innerHTML=`あなた:${p} CPU:${e}`;

  let choose=document.createElement('div');
  choose.innerHTML="サーブかレシーブ選択";

  let s=document.createElement('button');s.innerText="サーブ";
  let r=document.createElement('button');r.innerText="レシーブ";

  s.onclick=()=>startMulligan();
  r.onclick=()=>startMulligan();

  ui.appendChild(document.createElement('br'));
  ui.appendChild(choose);
  ui.appendChild(s);
  ui.appendChild(r);
 };
 ui.appendChild(document.createElement('br'));
 ui.appendChild(btn);
}

// ===== 選択マリガン =====
function startMulligan(){
 let ui=document.getElementById('setUpUI');
 ui.innerHTML="交換したいカードを選択";

 renderHand();

 let btn=document.createElement('button');
 btn.innerText="交換";
 btn.onclick=()=>{
   let keep=[];
   let back=[];

   game.hand.forEach(c=>{
     if(c.sel) back.push(c);
     else keep.push(c);
   });

   game.deck=game.deck.concat(back);
   shuffle();

   game.hand=keep;
   draw(back.length);

   renderHand();
   ui.innerHTML="マリガン完了";
 };

 ui.appendChild(document.createElement('br'));
 ui.appendChild(btn);
}

window.onload=()=>{
 draw(6);
 renderHand();
 startDice();
};
</script></body>
</html>
