<style>
.field {
  display: grid;
  grid-template-columns: repeat(5, 70px);
  grid-template-rows: repeat(6, 70px);
  gap: 6px;
  justify-content: center;
}

/* 上（相手） */
.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l-top { grid-column:2; grid-row:1; background:#ccc; color:black;}
.center-top { grid-column:3; grid-row:1; background:#666;}
.side-r-top { grid-column:4; grid-row:1; background:#ccc; color:black;}
.deck-top { grid-column:5; grid-row:1; background:orange; color:black;}

.receive-top { grid-column:2; grid-row:2; background:blue;}
.toss-top { grid-column:3; grid-row:2; background:green;}
.attack-top { grid-column:4; grid-row:2; background:red;}
.drop-top { grid-column:5; grid-row:2; background:darkorange; color:black;}

/* 下（自分） */
.set-bottom { grid-column:1; grid-row:6; background:purple; }
.side-l { grid-column:2; grid-row:6; background:#ccc; color:black;}
.center { grid-column:3; grid-row:6; background:#666;}
.side-r { grid-column:4; grid-row:6; background:#ccc; color:black;}
.deck { grid-column:5; grid-row:6; background:orange; color:black;}

.receive { grid-column:2; grid-row:5; background:blue;}
.toss { grid-column:3; grid-row:5; background:green;}
.attack { grid-column:4; grid-row:5; background:red;}
.drop { grid-column:5; grid-row:5; background:darkorange; color:black;}

.serve { grid-column:3; grid-row:4; background:yellow; color:black;}

.area {
  border:2px solid white;
  border-radius:8px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:10px;
}
</style>

<div class="field">

<!-- 相手 -->
<div class="area set-top">セット</div>
<div class="area side-l-top">サイド</div>
<div class="area center-top">センター</div>
<div class="area side-r-top">サイド</div>
<div class="area deck-top">デッキ</div>

<div class="area receive-top">レシーブ</div>
<div class="area toss-top">トス</div>
<div class="area attack-top">アタック</div>
<div class="area drop-top">ドロップ</div>

<!-- 中央 -->
<div class="area serve">サーブ</div>

<!-- 自分 -->
<div class="area receive">レシーブ</div>
<div class="area toss">トス</div>
<div class="area attack">アタック</div>
<div class="area drop">ドロップ</div>

<div class="area set-bottom">セット</div>
<div class="area side-l">サイド</div>
<div class="area center">センター</div>
<div class="area side-r">サイド</div>
<div class="area deck">デッキ</div>

</div>
