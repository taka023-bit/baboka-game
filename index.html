<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦</title>
<style>
html, body { margin:0; padding:0; overflow:hidden; background:#1a1a1a; color:white; font-family:sans-serif; height:100vh;}
.container { display:flex; flex-direction:column; height:100vh; justify-content:space-between; align-items:center; }
.field-wrapper { display:grid; grid-template-columns:repeat(5,70px); grid-template-rows:repeat(3,70px); gap:6px; justify-content:center; align-items:center; }
.area { border:2px solid white; border-radius:8px; display:flex; justify-content:center; align-items:center; font-size:10px; position:relative; min-width:70px; min-height:70px; }
.card { width:40px; height:60px; background:white; color:black; border-radius:6px; font-size:9px; display:flex; justify-content:center; align-items:center; margin:2px; cursor:pointer; }
.selected { outline:2px solid yellow; }
.card-detail { position:absolute; top:-90px; left:0; width:100px; background:#333; border:1px solid #fff; border-radius:6px; padding:4px; display:none; font-size:10px; z-index:10; }

#hand { display:flex; justify-content:center; gap:5px; position:relative; margin-top:10px; }
#setUpUI { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); text-align:center; background:#222; padding:10px; border-radius:6px; }
#phaseDisplay { text-align:center; font-weight:bold; margin:5px; }
button { padding:4px 8px; margin:2px; }

/* フィールド色 */
.set-top, .set-bottom { background:purple; }
.side-l, .side-l-top, .side-r, .side-r-top { background:#ccc; color:black; }
.center, .center-top { background:#666; }
.deck, .deck-top { background:orange; color:black; }
.receive, .receive-top { background:blue; }
.toss, .toss-top { background:green; }
.attack, .attack-top { background:red; }
.drop, .drop-top { background:darkorange; color:black; }
.serve { background:yellow; color:black; }

</style>
</head>
<body>
<div class="container">
    <div id="phaseDisplay">フェイズ:開始前</div>

    <!-- CPU フィールド -->
    <div class="field-wrapper" id="cpuField">
        <!-- 後衛 -->
        <div class="area"></div><div class="area"></div><div class="area serve"></div><div class="area"></div><div class="area"></div>
        <!-- 前衛 -->
        <div class="area drop-top">ドロップ</div><div class="area receive-top">レシーブ</div><div class="area toss-top">トス</div><div class="area attack-top">アタック</div><div class="area set-top">セット</div>
        <!-- ブロックエリア -->
        <div class="area deck-top">デッキ</div><div class="area side-l-top">サイド</div><div class="area center-top">センター</div><div class="area side-r-top">サイド</div><div class="area set-top">セット</div>
    </div>

    <!-- プレイヤーフィールド -->
    <div class="field-wrapper" id="playerField">
        <!-- ブロックエリア -->
        <div class="area set-bottom">セット</div><div class="area side-l">サイド</div><div class="area center">センター</div><div class="area side-r">サイド</div><div class="area deck">デッキ</div>
        <!-- 前衛 -->
        <div class="area set-bottom">セット</div><div class="area receive">レシーブ</div><div class="area toss">トス</div><div class="area attack">アタック</div><div class="area drop">ドロップ</div>
        <!-- 後衛 -->
        <div class="area"></div><div class="area"></div><div class="area serve"></div><div class="area"></div><div class="area"></div>
    </div>

    <!-- 手札 -->
    <div id="hand"></div>

    <!-- サイコロ / UI -->
    <div id="setUpUI"></div>

</div>

<script>
// --- ここにゲームロジック ---
let game = {
    hand:[], cpuHand:[], deck:[], cpuDeck:[],
    selected:null, phase:0, placed:false, turn:'player', started:false
};

// デッキ初期化
for(let i=0;i<32;i++){
    game.deck.push({name:'キャラ'+(i+1)});
    game.cpuDeck.push({name:'CPU'+(i+1)});
}

// シャッフル
function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];}}
shuffle(game.deck); shuffle(game.cpuDeck);

// ドロー
function draw(n=1){for(let i=0;i<n;i++){if(game.deck.length===0) return; game.hand.push(game.deck.shift());}}
function cpuDraw(n=1){for(let i=0;i<n;i++){if(game.cpuDeck.length===0) return; game.cpuHand.push(game.cpuDeck.shift());}}

// 手札描画
function renderHand(){
    let h=document.getElementById('hand'); h.innerHTML='';
    game.hand.forEach(c=>{
        let d=document.createElement('div'); d.className='card'+(c.sel?' selected':''); d.innerText=c.name;
        d.onclick=()=>{ c.sel=!c.sel; renderHand(); showDetail(d,c); };
        h.appendChild(d);
    });
}

// カード詳細表示
function showDetail(div,card){
    let detail=div.querySelector('.card-detail');
    if(!detail){ detail=document.createElement('div'); detail.className='card-detail'; detail.innerText='詳細情報\n'+card.name; div.appendChild(detail);}
    detail.style.display='block';
    setTimeout(()=>{detail.style.display='none';},2000);
}

// 配置
function placeCard(areaId){
    if(game.turn!=='player') return;
    let idx=game.hand.findIndex(c=>c.sel); if(idx<0) return;
    let area=document.getElementById(areaId); 
    let card=game.hand[idx];
    let d=document.createElement('div'); d.className='card'; d.innerText=card.name;
    area.appendChild(d);
    game.hand.splice(idx,1);
    game.placed=true;
    renderHand();
}

// CPU配置
function cpuPlace(areaId){
    if(game.cpuHand.length===0) return;
    let area=document.getElementById(areaId);
    let idx=Math.floor(Math.random()*game.cpuHand.length);
    let card=game.cpuHand.splice(idx,1)[0];
    let d=document.createElement('div'); d.className='card'; d.innerText=card.name;
    area.appendChild(d);
}

// --- 初期化 ---
window.onload=()=>{
    draw(6); cpuDraw(6); renderHand();
};
</script>
</body>
</html>
