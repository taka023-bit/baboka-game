<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baboca Field</title>

<style>
body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
}

.wrapper {
    width: 95vw;
    max-width: 480px;
    margin: 10px auto;
}

/* 共通エリア */
.area {
    border: 2px solid #000;
    color: #fff;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
}

/* 色 */
.set { background:#8e44ad; }
.side { background:#d0d0d0; color:#000; }
.center { background:#555; }
.deck { background:#e67e22; }
.receive { background:#2980b9; }
.toss { background:#27ae60; }
.attack { background:#c0392b; }
.drop { background:#2c3e50; }
.serve { background:#f1c40f; color:#000; }
.event { background:#ecf0f1; color:#000; }

/* グリッド：5列固定 */
.row5 {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    height: 60px;
    gap: 6px;
    margin-bottom: 6px;
}

/* 空白セル */
.empty {
    background: transparent;
    border: none;
}
</style>
</head>

<body>
<div class="wrapper">

    <!-- ===== CPUフィールド（自分側の180度回転） ===== -->
    <div class="row5">
        <div class="area deck">DECK</div>
        <div class="area side">SIDE</div>
        <div class="area center">CENTER</div>
        <div class="area side">SIDE</div>
        <div class="area set">SET</div>
    </div>

    <div class="row5">
        <div class="area drop">DROP</div>
        <div class="area attack">ATTACK</div>
        <div class="area toss">TOSS</div>
        <div class="area receive">RECEIVE</div>
        <div class="empty"></div>
    </div>

    <div class="row5">
        <div class="empty"></div>
        <div class="area event">EVENT</div>
        <div class="area serve">SERVE</div>
        <div class="area set">SET</div>
        <div class="empty"></div>
    </div>

    <!-- ===== 自分フィールド ===== -->
    <div class="row5">
        <div class="area set">SET</div>
        <div class="area side">SIDE</div>
        <div class="area center">CENTER</div>
        <div class="area side">SIDE</div>
        <div class="area deck">DECK</div>
    </div>

    <div class="row5">
        <div class="area receive">RECEIVE</div>
        <div class="area toss">TOSS</div>
        <div class="area attack">ATTACK</div>
        <div class="area drop">DROP</div>
        <div class="empty"></div>
    </div>

    <div class="row5">
        <div class="area set">SET</div>
        <div class="area serve">SERVE</div>
        <div class="area event">EVENT</div>
        <div class="empty"></div>
        <div class="empty"></div>
    </div>

</div>
</body>
