<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>バボカBREAK Web</title>
    <style>
        :root {
            --court-color: #f39c12;
            --card-width: 75px;
            --card-height: 110px;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            font-family: sans-serif;
            overflow: hidden; /* スマホのスクロールを固定 */
            color: white;
        }
        /* 全体コンテナ */
        #game-screen {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        /* 相手エリア */
        .opponent-side {
            height: 20%;
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px dashed white;
        }
        /* メインコート */
        .court {
            flex: 1;
            background-color: var(--court-color);
            position: relative;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 5px;
            padding: 10px;
        }
        /* 各エリアの枠 */
        .area-slot {
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
        }
        /* カードの重なり（スタック）を表現 */
        .card-stack {
            position: relative;
            width: var(--card-width);
            height: var(--card-height);
        }
        .card {
            width: 100%;
            height: 100%;
            background: white;
            color: black;
            border-radius: 5px;
            position: absolute;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            padding: 4px;
            box-sizing: border-box;
            transition: transform 0.2s;
        }
        /* ガッツ（下のカード）のズレ演出 */
        .card.guts { transform: translateY(8px); filter: brightness(0.8); }
        .card.guts-deep { transform: translateY(16px); filter: brightness(0.6); }

        /* 自分側の操作UI */
        .player-ui {
            height: 35%;
            background: #34495e;
            padding: 10px;
        }
        .hand-container {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 10px;
        }
        .controls {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            background: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>

<div id="game-screen">
    <div class="opponent-side">
        <div>相手セット: 🎴🎴 山札: 34</div>
    </div>

    <div class="court">
        <div class="area-slot">RECEIVE
            <div class="card-stack" id="receive-stack">
                <div class="card guts-deep"></div>
                <div class="card guts"></div>
                <div class="card">澤村</div>
            </div>
        </div>
        <div class="area-slot">TOSS / ATTACK
            <div class="card-stack" id="attack-stack">
                <div class="card">影山</div>
            </div>
        </div>
        <div class="area-slot" style="grid-column: span 2;">BLOCK (Center / Side)
            <div id="block-display" style="display: flex; gap: 5px;">
                <div class="card-stack" style="transform: scale(0.8);">
                    <div class="card">月島</div>
                </div>
            </div>
        </div>
    </div>

    <div class="player-ui">
        <div class="hand-container" id="hand">
            <div class="card" style="position:relative;">日向</div>
            <div class="card" style="position:relative;">及川</div>
            <div class="card" style="position:relative;">岩泉</div>
        </div>
        <div class="controls">
            <button onclick="alert('ロスト宣言！')">ロスト宣言</button>
            <button style="background:#2ecc71;">スキル発動</button>
        </div>
    </div>
</div>

</body>
</html>
