<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>バボカBREAK - Visual FX</title>
    <style>
        :root {
            --court-color: #e67e22;
            --card-width: 58px;
            --card-height: 82px;
            /* ポジションカラー */
            --color-ws: #e74c3c; /* アタッカー */
            --color-s:  #3498db; /* セッター */
            --color-li: #2ecc71; /* リベロ */
            --color-mb: #f1c40f; /* ブロッカー */
        }
        body {
            margin: 0; padding: 0; background: #1a1a1a;
            font-family: 'Helvetica Neue', Arial, sans-serif; color: white; overflow: hidden;
        }
        
        /* カットイン演出用 */
        #cut-in {
            position: fixed; top: 50%; left: -100%; width: 200%; height: 60px;
            background: rgba(241, 196, 15, 0.9); color: #000; font-style: italic;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 24px; z-index: 2000; transform: skewX(-20deg) translateY(-50%);
            transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1); pointer-events: none;
        }
        #cut-in.active { left: -50%; }

        #game-screen { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: 12%; background: linear-gradient(to bottom, #000, #222);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-bottom: 3px solid #f1c40f;
        }
        .phase-name { font-size: 12px; letter-spacing: 2px; color: #aaa; }
        .battle-info { font-size: 20px; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 #e74c3c; }

        .court-grid {
            flex: 1; background: var(--court-color);
            display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(3, 1fr);
            gap: 4px; padding: 6px; border: 4px solid #fff; margin: 4px; border-radius: 12px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
        }
        .area-slot {
            border: 2px solid rgba(255,255,255,0.3); border-radius: 6px;
            background: rgba(0,0,0,0.1); position: relative;
            display: flex; justify-content: center; align-items: flex-start; padding-top: 15px;
        }
        .area-slot.empty { border: none; background: none; }
        .label {
            position: absolute; top: 0; left: 0; right: 0; background: #333;
            font-size: 8px; text-align: center; padding: 2px 0; border-radius: 4px 4px 0 0;
        }

        /* カードの装飾 */
        .card {
            width: var(--card-width); height: var(--card-height);
            background: #fff; color: #333; border-radius: 5px;
            position: absolute; display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; padding: 5px; box-sizing: border-box;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }
        .card.character { z-index: 20; border-top: 6px solid #ccc; animation: card-in 0.3s ease-out; }
        @keyframes card-in { from { transform: scale(1.2) translateY(-20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        
        .card-name { font-size: 9px; font-weight: bold; overflow: hidden; width: 100%; text-align: center; }
        .card-type-icon { width: 10px; height: 10px; border-radius: 50%; margin-bottom: 2px; }

        /* UIエリア */
        .ui-panel { height: 35%; background: #2c3e50; padding: 10px; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .hand-scroll { flex: 1; display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; align-items: center; }
        
        button { 
            padding: 12px; border: none; border-radius: 8px; font-weight: 900; color: white; 
            box-shadow: 0 4px 0 rgba(0,0,0,0.2); transition: 0.1s;
        }
        button:active { transform: translateY(2px); box-shadow: none; }
        .btn-main { background: #27ae60; grid-column: span 2; }
        .btn-choice { background: #8e44ad; }
        .btn-end { background: #d35400; grid-column: span 2; font-size: 14px; }
        
        .point-badge {
            position: absolute; bottom: -5px; right: -5px; background: #f1c40f; color: #000;
            width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 12px; border: 2px solid #000; z-index: 70;
        }
    </style>
</head>
<body>

<div id="cut-in">PHASE UP</div>

<div id="game-screen">
    <div class="header">
        <div id="phase-label" class="phase-name">READY</div>
        <div id="battle-display" class="battle-info">Bannou-Bokaka!</div>
    </div>

    <div class="court-grid">
        <div class="area-slot"><div class="label">SET</div><div class="stack" id="stk-set"></div></div>
        <div class="area-slot"><div class="label">SIDE(L)</div><div class="stack" id="stk-blockL"></div><div class="point-badge" id="val-blockL">0</div></div>
        <div class="area-slot"><div class="label">CENTER</div><div class="stack" id="stk-blockC"></div><div class="point-badge" id="val-blockC">0</div></div>
        <div class="area-slot"><div class="label">SIDE(R)</div><div class="stack" id="stk-blockR"></div><div class="point-badge" id="val-blockR">0</div></div>
        <div class="area-slot"><div class="label">DECK</div><div class="stack" id="stk-deck"></div></div>

        <div class="area-slot empty"></div>
        <div class="area-slot"><div class="label">RECEIVE</div><div class="stack" id="stk-receive"></div><div class="point-badge" id="val-receive">0</div></div>
        <div class="area-slot"><div class="label">TOSS</div><div class="stack" id="stk-toss"></div><div class="point-badge" id="val-toss">0</div></div>
        <div class="area-slot"><div class="label">ATTACK</div><div class="stack" id="stk-attack"></div><div class="point-badge" id="val-attack">0</div></div>
        <div class="area-slot"><div class="label">DROP</div><div class="stack" id="stk-drop"></div></div>

        <div class="area-slot empty"></div>
        <div class="area-slot empty"></div>
        <div class="area-slot"><div class="label">SERVE</div><div class="stack" id="stk-serve"></div><div class="point-badge" id="val-serve">0</div></div>
        <div class="area-slot"><div class="label">EVENT</div><div class="stack" id="stk-event"></div></div>
        <div class="area-slot empty"></div>
    </div>

    <div class="ui-panel">
        <div class="hand-scroll" id="hand-list"></div>
        <div id="ui-btns" class="action-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;"></div>
    </div>
</div>

<div id="modal">
    <h3 style="margin-bottom:20px; color:#fff;">SELECT AREA</h3>
    <div id="modal-btns"></div>
</div>

<script>
    const CHAR_DATABASE = {
        "WS": { S:1, R:2, T:1, A:5, B:2, color: "var(--color-ws)" },
        "S":  { S:2, R:2, T:5, A:1, B:1, color: "var(--color-s)" },
        "Li": { S:1, R:6, T:1, A:1, B:1, color: "var(--color-li)" },
        "MB": { S:1, R:2, T:1, A:2, B:5, color: "var(--color-mb)" }
    };

    let state = {
        deck: [], hand: [], set: [], drop: [],
        areas: { serve:[], receive:[], toss:[], attack:[], blockL:[], blockC:[], blockR:[], event:[] },
        phase: "WAITING", opPower: 0
    };

    function showCutIn(text) {
        const el = document.getElementById('cut-in');
        el.innerText = text;
        el.classList.add('active');
        setTimeout(() => el.classList.remove('active'), 1000);
    }

    function init() {
        const keys = Object.keys(CHAR_DATABASE);
        state.deck = Array.from({length:40}, (_, i) => {
            const k = keys[i % keys.length];
            return { id: i, name: k + (Math.floor(i/4)+1), role: k, ...CHAR_DATABASE[k] };
        }).sort(()=>Math.random()-0.5);
        state.hand = []; state.set = []; state.drop = [];
        Object.keys(state.areas).forEach(k => state.areas[k] = []);
        for(let i=0; i<6; i++) state.hand.push(state.deck.pop());
        for(let i=0; i<2; i++) state.set.push(state.deck.pop());
        movePhase("SERVE");
    }

    function movePhase(p) {
        state.phase = p;
        showCutIn(p + " PHASE");
        if(p === "RECEIVE") {
            state.opPower = Math.floor(Math.random() * 5) + 3;
            if(state.deck.length > 0) state.hand.push(state.deck.pop());
        }
        render();
    }

    function render() {
        document.getElementById('phase-label').innerText = state.phase;
        const bDisp = document.getElementById('battle-display');
        
        // バトル表示のロジック
        if(state.phase === "RECEIVE") {
            const rp = state.areas.receive[0]?.R || 0;
            bDisp.innerText = `ENEMY: ${state.opPower} vs R: ${rp}`;
            bDisp.style.color = rp >= state.opPower ? "#2ecc71" : "#e74c3c";
        } else if(state.phase === "ATTACK") {
            const tp = state.areas.toss[0]?.T || 0;
            const ap = state.areas.attack[0]?.A || 0;
            bDisp.innerText = `OFFENSE: ${tp + ap}`;
            bDisp.style.color = "#f1c40f";
        } else {
            bDisp.innerText = "VOBOCA!!";
            bDisp.style.color = "#fff";
        }

        const handEl = document.getElementById('hand-list');
        handEl.innerHTML = '';
        state.hand.forEach((c, i) => {
            const d = document.createElement('div');
            d.className = 'card';
            d.style.borderTop = `6px solid ${c.color}`;
            d.innerHTML = `<div class="card-name">${c.name}</div><div style="font-size:7px">A:${c.A} R:${c.R}</div>`;
            d.onclick = () => openSelect(i);
            handEl.appendChild(d);
        });

        Object.keys(state.areas).forEach(k => {
            const el = document.getElementById('stk-' + k); el.innerHTML = '';
            state.areas[k].forEach((c, i) => {
                const div = document.createElement('div');
                div.className = 'card ' + (i===0?'character':'guts');
                if(i===0) div.style.borderTop = `6px solid ${c.color}`;
                div.style.zIndex = 100 - i;
                if(i > 0) div.style.transform = `translateY(${i*3}px)`;
                div.innerHTML = i===0 ? `<div class="card-name">${c.name}</div>` : "";
                el.appendChild(div);
            });
            const badge = document.getElementById('val-' + k);
            if(badge) {
                const char = state.areas[k][0];
                let v = 0;
                if(char) {
                    if(k==='serve') v=char.S; else if(k==='receive') v=char.R;
                    else if(k==='toss') v=char.T; else if(k==='attack') v=char.A;
                    else v=char.B;
                }
                badge.innerText = v;
            }
        });

        // 山札・セット・ドロップ
        const drawMini = (id, arr, label) => {
            const el = document.getElementById(id); el.innerHTML = '';
            if(arr.length > 0) {
                const c = document.createElement('div');
                c.className = 'card guts'; c.innerText = label + arr.length;
                el.appendChild(c);
            }
        };
        drawMini('stk-deck', state.deck, "D:");
        drawMini('stk-set', state.set, "S:");
        drawMini('stk-drop', state.drop, "Drop:");

        const btnEl = document.getElementById('ui-btns');
        btnEl.innerHTML = '';
        if(state.phase === "WAITING") btnEl.innerHTML = '<button class="btn-main" onclick="init()">START GAME</button>';
        else if(state.phase === "SERVE") btnEl.innerHTML = '<button class="btn-end" onclick="movePhase(\'END\')">SERVE OK</button>';
        else if(state.phase === "START") btnEl.innerHTML = '<button class="btn-choice" onclick="movePhase(\'RECEIVE\')">RECEIVE</button><button class="btn-choice" onclick="movePhase(\'BLOCK\')">BLOCK</button>';
        else if(state.phase === "RECEIVE") btnEl.innerHTML = '<button class="btn-end" onclick="movePhase(\'TOSS\')">TO TOSS</button>';
        else if(state.phase === "TOSS") btnEl.innerHTML = '<button class="btn-end" onclick="movePhase(\'ATTACK\')">TO ATTACK</button>';
        else if(p === "ATTACK") btnEl.innerHTML = '<button class="btn-end" onclick="movePhase(\'END\')">ATTACK!!</button>';
        else if(state.phase === "END") btnEl.innerHTML = '<button class="btn-main" onclick="executeEnd()">NEXT RALLY</button>';
        
        if(state.phase !== "WAITING") btnEl.innerHTML += '<button class="btn-lost" style="background:#c0392b; grid-column:span 2;" onclick="lost()">LOST POINT</button>';
    }

    function openSelect(idx) {
        const modal = document.getElementById('modal');
        const btns = document.getElementById('modal-btns');
        let ts = [{n:'EVENT', k:'event'}];
        const p = state.phase;
        if(p==="SERVE") ts.push({n:'SERVE', k:'serve'});
        else if(p==="RECEIVE") ts.push({n:'RECEIVE', k:'receive'});
        else if(p==="TOSS") ts.push({n:'TOSS', k:'toss'});
        else if(p==="ATTACK") ts.push({n:'ATTACK', k:'attack'});
        else if(p==="BLOCK") ts.push({n:'L',k:'blockL'},{n:'C',k:'blockC'},{n:'R',k:'blockR'});
        
        modal.style.display = 'flex'; btns.innerHTML = '';
        ts.forEach(t => {
            const b = document.createElement('button');
            b.innerText = t.n; b.style.background = "#2980b9";
            b.onclick = () => {
                state.areas[t.k].unshift(state.hand.splice(idx,1)[0]);
                modal.style.display = 'none'; render();
            };
            btns.appendChild(b);
        });
    }

    function executeEnd() {
        Object.keys(state.areas).forEach(k => {
            if(k === 'blockL' || k === 'blockR') {
                while(state.areas[k].length > 0) state.drop.push(state.areas[k].shift());
            } else {
                if(state.areas[k].length > 0) state.areas[k].push(state.areas[k].shift());
            }
        });
        movePhase("START");
    }

    function lost() {
        if(state.set.length === 0) return alert("Game Over");
        state.hand.push(state.set.pop());
        Object.keys(state.areas).forEach(k => {
            while(state.areas[k].length > 0) state.drop.push(state.areas[k].shift());
        });
        movePhase("SERVE");
    }

    render();
</script>
</body>
</html>
