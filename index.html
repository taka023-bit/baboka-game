<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Baboca 完全復元版</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: sans-serif;
    user-select: none;
}

/* 画面切り替え */
.screen {
    display: none;
    padding: 20px;
}
.active {
    display: block;
}

/* タイトル画面 */
.title-button {
    width: 80%;
    margin: 20px auto;
    padding: 20px;
    background: #444;
    text-align: center;
    border-radius: 10px;
    font-size: 22px;
}

/* デッキ編成 */
.tab-buttons {
    display: flex;
    gap: 10px;
}
.tab-button {
    flex: 1;
    padding: 10px;
    background: #555;
    text-align: center;
    border-radius: 6px;
}
.tab-button.active {
    background: #ff9800;
}

.card-list, .deck-list {
    background: #333;
    padding: 10px;
    border-radius: 6px;
    min-height: 200px;
}

.card-item, .deck-item {
    padding: 8px;
    margin: 5px 0;
    background: #444;
    border-radius: 4px;
}

/* デッキ保存ボタン */
.save-button {
    padding: 15px;
    background: #008cff;
    text-align: center;
    border-radius: 8px;
    margin-top: 10px;
}

/* ======== フィールドCSS ======== */
<!-- ▼ 自分フィールド -->
.field {
  width: 95vw;
  max-width: 520px;
  margin: 10px auto;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-auto-rows: 60px;
  gap: 4px;
}

.field.opponent {
  transform: rotate(180deg);
}

.area, .empty {
  background: #222;
  border: 1px solid #555;
  border-radius: 6px;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #ddd;
  font-size: 14px;
}

.empty {
  background: transparent;
  border: none;
}

</style>
</head>

<!-- タイトル画面 -->

    <div class="title-button" onclick="openDeckBuilder()">デッキ編成</div>
    <div class="title-button" onclick="openSavedDecks()">保存デッキ一覧</div>

    /* ============================================================
   デッキ編成ロジック
   ============================================================ */

let currentTab = "Karasuno";
let selectedDeck = [];

function switchTab(team) {
  currentTab = team;
  document.getElementById("tabKarasuno").classList.remove("active");
  document.getElementById("tabNekoma").classList.remove("active");
  if (team === "Karasuno") {
    document.getElementById("tabKarasuno").classList.add("active");
  } else {
    document.getElementById("tabNekoma").classList.add("active");
  }
  renderCardList();
}

function renderCardList() {
  const list = document.getElementById("cardList");
  list.innerHTML = "";
  allCards
    .filter(c => c.team === currentTab)
    .forEach(card => {
      const count = selectedDeck.filter(x => x.id === card.id).length;
      const div = document.createElement("div");
      div.className = "card-item";
      div.textContent = `${card.id} ${card.name}（${count}枚）`;
      div.onclick = () => addToDeck(card);
      list.appendChild(div);
    });
}

function addToDeck(card) {
  if (selectedDeck.length >= 40) {
    alert("デッキは40枚までです");
    return;
  }
  selectedDeck.push(card);
  selectedDeck.sort((a, b) => a.id.localeCompare(b.id));
  renderDeckList();
  renderCardList();
}

function renderDeckList() {
  const list = document.getElementById("deckList");
  list.innerHTML = "";
  selectedDeck.forEach((card, index) => {
    const div = document.createElement("div");
    div.className = "deck-item";
    div.textContent = `${card.id} ${card.name}`;
    div.onclick = () => removeFromDeck(index);
    list.appendChild(div);
  });
  document.getElementById("deckCount").textContent = selectedDeck.length;
}

function removeFromDeck(index) {
  selectedDeck.splice(index, 1);
  renderDeckList();
  renderCardList();
}

function saveDeck() {
  if (selectedDeck.length !== 40) {
    alert("デッキは40枚ちょうどにしてください");
    return;
  }
  const name = prompt("デッキ名を入力してください");
  if (!name) return;

  const decks = JSON.parse(localStorage.getItem("babocaDecks") || "[]");
  decks.push({ name, cards: selectedDeck });
  localStorage.setItem("babocaDecks", JSON.stringify(decks));
  alert("保存しました");
}

/* ============================================================
   保存デッキ一覧
   ============================================================ */

function loadSavedDecks() {
  const decks = JSON.parse(localStorage.getItem("babocaDecks") || "[]");
  const list = document.getElementById("savedDeckList");
  list.innerHTML = "";
  decks.forEach((deck, index) => {
    const div = document.createElement("div");
    div.className = "deck-item";
    div.textContent = `${deck.name}（${deck.cards.length}枚）`;

    const btn = document.createElement("button");
    btn.textContent = "削除";
    btn.style.marginLeft = "10px";
    btn.onclick = () => {
      const d = JSON.parse(localStorage.getItem("babocaDecks") || "[]");
      d.splice(index, 1);
      localStorage.setItem("babocaDecks", JSON.stringify(d));
      loadSavedDecks();
    };

    div.appendChild(btn);
    list.appendChild(div);
  });
}

/* ============================================================
   画面切り替え
   ============================================================ */

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function returnTitle() {
  showScreen("titleScreen");
}

function openDeckBuilder() {
  showScreen("deckBuilderScreen");
  renderCardList();
  renderDeckList();
}

function openSavedDecks() {
  showScreen("savedDeckScreen");
  loadSavedDecks();
}

function goDeckSelect() {
  loadDeckSelectOptions();
  showScreen("deckSelectScreen");
}

function loadDeckSelectOptions() {
  const decks = JSON.parse(localStorage.getItem("babocaDecks") || "[]");

  decks.forEach((deck, i) => {
    const op1 = document.createElement("option");

    pSel.appendChild(op1);

    const op2 = document.createElement("option");
    op2.value = i;
    op2.textContent = deck.name;
    cSel.appendChild(op2);
  });
}

  }

  renderHand();
  clearField();
  initBattleState();
  showScreen("battleScreen");
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function drawCardToHand() {
  if (playerDeckStack.length === 0) return;
  const card = playerDeckStack.shift();
  playerHand.push(card);
}

function renderHand() {
  const handDiv = document.getElementById("playerHand");
  handDiv.innerHTML = "";
  playerHand.forEach((card, index) => {
    const div = document.createElement("div");
    div.className = "card-item";
    div.textContent = `${card.id} ${card.name}`;

    // ▼ 左タップ：プレイ
    div.onclick = () => playCardFromHand(index);

    // ▼ 長押し：カード詳細
    div.oncontextmenu = (e) => {
      e.preventDefault();
      openCardPopup(card.id);
    };

    handDiv.appendChild(div);
  });
}

/* ============================================================
   フィールド初期化
   ============================================================ */

function clearField() {
  const ids = [
    "cpuSet","cpuSideL","cpuCenter","cpuSideR","cpuDeck",
    "cpuBack","cpuReceive","cpuToss","cpuAttack","cpuDrop",
    "playerBackL","playerBackR","playerServe","playerEvent","playerDrop"
  ];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.textContent = el.id.toUpperCase().replace("PLAYER","").replace("CPU","");
      delete el.dataset.cardId;
    }
  });
}

/* ============================================================
   バトルステート
   ============================================================ */

let battleState = {
  turnPlayer: "PLAYER",
  phase: "START",
  serveOwner: "PLAYER",
  lostPlayer: 0,
  lostCpu: 0
};

function initBattleState() {
  battleState = {
    turnPlayer: "PLAYER",
    phase: "START",
    serveOwner: "PLAYER",
    lostPlayer: 0,
    lostCpu: 0
  };
  updateBattleInfo("ゲーム準備完了 → あなたのスタートフェイズ");
  updateStatePanel();
}

function updateStatePanel() {
  document.getElementById("turnPlayerLabel").textContent =
    battleState.turnPlayer === "PLAYER" ? "あなた" : "CPU";

  document.getElementById("phaseLabel").textContent = battleState.phase;
  document.getElementById("serveOwnerLabel").textContent =
    battleState.serveOwner === "PLAYER" ? "あなた" : "CPU";

  document.getElementById("lostPlayer").textContent = battleState.lostPlayer;
  document.getElementById("lostCpu").textContent = battleState.lostCpu;
}

function updateBattleInfo(text) {
  const info = document.getElementById("battleInfo");
  info.textContent = text;
}

/* ============================================================
   手札からカードを出す
   ============================================================ */

function playCardFromHand(index) {
  const card = playerHand[index];
  const serveSlot = document.getElementById("playerServe");

  if (serveSlot.dataset.cardId) {
    alert("SERVE にはすでにカードがあります");
    return;
  }

  serveSlot.textContent = card.name;
  serveSlot.dataset.cardId = card.id;

  playerHand.splice(index, 1);
  renderHand();

  updateBattleInfo(`${card.name} を SERVE に登場！`);

  // ▼ START → SERVE へ進む
  if (battleState.phase === "START") {
    battleState.phase = "SERVE";
    updateBattleInfo(`${card.name} をサーブ → サーブフェイズへ`);
    updateStatePanel();
  }
}

/* ============================================================
   ロスト宣言
   ============================================================ */

function playerDeclareLost() {
  battleState.lostPlayer++;
  updateBattleInfo("あなたがロストを宣言！");
  updateStatePanel();
}

/* ============================================================
   状態確認（デバッグ）
   ============================================================ */

function showStateDebug() {
  alert(JSON.stringify(battleState, null, 2));
}
    /* ============================================================
   カード詳細ポップアップ
   ============================================================ */

function openCardPopup(cardId) {
  const card = allCards.find(c => c.id === cardId);
  if (!card) return;

  document.getElementById("popupName").textContent = `${card.id} ${card.name}`;

  if (card.type === "CHARACTER") {
    document.getElementById("popupStats").innerHTML = `
      <div>Serve: ${card.serve}</div>
      <div>Block: ${card.block}</div>
      <div>Receive: ${card.receive}</div>
      <div>Toss: ${card.toss}</div>
      <div>Attack: ${card.attack}</div>
    `;
  } else {
    document.getElementById("popupStats").innerHTML = `<div>イベントカード</div>`;
  }

  document.getElementById("popupSkill").textContent =
    card.skillText ? card.skillText : "（効果なし）";

  document.getElementById("cardPopup").style.display = "flex";
}

function closeCardPopup() {
  document.getElementById("cardPopup").style.display = "none";
}

/* ============================================================
   初期化
   ============================================================ */

window.addEventListener("load", () => {
  showScreen("titleScreen");
});
    </script>
