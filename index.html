<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #1a1a1a;
    color: white;
    font-family: sans-serif;
}

.container {
    display: flex;
    flex-direction: column;
    height: 100dvh;
}

.field-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    flex: 1;
}

.field {
    display: grid;
    grid-template-columns: 50px 70px 70px 70px 50px;
    grid-template-rows: 70px 70px 70px;
    gap: 6px;
}

.enemy {
    transform: rotate(180deg);
    pointer-events: none;
}
.enemy .area {
    transform: rotate(180deg);
}

.area {
    border: 2px solid #fff;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    font-size: 9px;
}

.active {
    border: 3px solid yellow;
}

.card {
    width: 40px;
    height: 60px;
    background: white;
    color: black;
    border-radius: 6px;
    font-size: 8px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin: 2px;
}

#hand {
    display: flex;
    justify-content: center;
    gap: 5px;
    height: 80px;
}

/* 配置 */
.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black;}
.center { grid-column:3; grid-row:1; background:#666;}
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black;}
.deck { grid-column:5; grid-row:1; background:orange; color:black;}

.receive { grid-column:2; grid-row:2; background:blue;}
.toss { grid-column:3; grid-row:2; background:green;}
.attack { grid-column:4; grid-row:2; background:red;}
.drop { grid-column:5; grid-row:2; background:orange; color:black;}

.set-bottom { grid-column:1; grid-row:3; background:purple;}

.serve { grid-column:2 / span 2; grid-row:3; background:yellow; color:black;}
.event { grid-column:4 / span 2; grid-row:3; background:white; color:black;}

</style>
</head>

<body>

<div class="container">

    <!-- 相手 -->
    <div class="field-wrapper">
        <div class="field enemy" id="enemyField">
            <div class="area receive"></div>
            <div class="area toss"></div>
            <div class="area attack"></div>
        </div>
    </div>

    <!-- 自分 -->
    <div class="field-wrapper">
        <div class="field" id="playerField">
            <div class="area receive"></div>
            <div class="area toss"></div>
            <div class="area attack"></div>
        </div>
    </div>

    <div id="hand"></div>

</div>

<script>
let selectedCard = null;

const phases = ["serve","receive","toss","attack"];
let currentPhase = 0;

/* カード生成（能力付き） */
function createCard(){
    const card = document.createElement("div");
    card.classList.add("card");

    const atk = Math.floor(Math.random()*5)+1;
    const def = Math.floor(Math.random()*5)+1;

    card.dataset.atk = atk;
    card.dataset.def = def;

    card.innerHTML = `
        <div>A:${atk}</div>
        <div>D:${def}</div>
    `;

    card.onclick = () => selectedCard = card;

    document.getElementById("hand").appendChild(card);
}

for(let i=0;i<3;i++) createCard();

/* CPU行動 */
function cpuPlay(phase){
    const area = document.querySelector(`#enemyField .${phase}`);
    if(!area) return;

    const card = document.createElement("div");
    card.classList.add("card");

    const atk = Math.floor(Math.random()*5)+1;
    const def = Math.floor(Math.random()*5)+1;

    card.dataset.atk = atk;
    card.dataset.def = def;

    card.innerHTML = `
        <div>A:${atk}</div>
        <div>D:${def}</div>
    `;

    area.appendChild(card);
}

/* 勝敗 */
function battle(){
    const pAtk = document.querySelector("#playerField .attack .card");
    const eDef = document.querySelector("#enemyField .receive .card");

    if(!pAtk || !eDef) return;

    const atk = Number(pAtk.dataset.atk);
    const def = Number(eDef.dataset.def);

    if(atk > def){
        alert("得点！！🔥");
    } else {
        alert("ブロックされた…");
    }
}

/* 配置 */
document.querySelectorAll("#playerField .area").forEach(area=>{
    area.onclick = ()=>{
        if(!selectedCard) return;

        const phase = phases[currentPhase];

        if(!area.classList.contains(phase)){
            alert("今はここに出せない");
            return;
        }

        area.appendChild(selectedCard);
        selectedCard = null;

        /* CPU動く */
        cpuPlay(phase);

        /* 最後ならバトル */
        if(phase === "attack"){
            battle();
        }

        currentPhase++;
        if(currentPhase >= phases.length){
            currentPhase = 0;
        }
    };
});
</script>

</body>
</html>
