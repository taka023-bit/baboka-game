<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バボカBREAK CPU対戦</title>
<style>
html, body { margin:0; padding:0; overflow:hidden; background:#1a1a1a; color:white; font-family:sans-serif;}
.container { display:flex; flex-direction:column; height:100dvh;}
.field-wrapper { display:flex; justify-content:center; align-items:center; flex:1;}
.field { display:grid; grid-template-columns:50px 70px 70px 70px 50px; grid-template-rows:70px 70px 70px; gap:6px;}
.enemy { transform:rotate(180deg);}
.enemy .area { transform:rotate(180deg);}
.area {
    border:2px solid #fff;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    font-size:9px;
    position: relative;
    text-align:center;
}
.card { width:40px; height:60px; background:white; color:black; border-radius:6px; font-size:9px; display:flex; justify-content:center; align-items:center; margin:2px;}
#hand { display:flex; justify-content:center; gap:5px; height:80px; flex-shrink:0; margin-top:5px;}
.set-top { grid-column:1; grid-row:1; background:purple; }
.side-l { grid-column:2; grid-row:1; background:#ccc; color:black;}
.center { grid-column:3; grid-row:1; background:#666;}
.side-r { grid-column:4; grid-row:1; background:#ccc; color:black;}
.deck { grid-column:5; grid-row:1; background:orange; color:black;}
.receive { grid-column:2; grid-row:2; background:blue;}
.toss { grid-column:3; grid-row:2; background:green;}
.attack { grid-column:4; grid-row:2; background:red;}
.drop { grid-column:5; grid-row:2; background:orange; color:black;}
.set-bottom { grid-column:1; grid-row:3; background:purple;}
.serve { grid-column:3; grid-row:3; background:yellow; color:black;}
.event { grid-column:4; grid-row:3; background:white; color:black;}
button { padding:4px 8px; margin:2px; font-size:12px;}
</style>
</head>
<body>

<div class="container">
    <div id="phaseDisplay" style="text-align:center; margin:5px;">フェイズ: serve</div>

    <!-- 相手 -->
    <div class="field-wrapper">
        <div class="field enemy">
            <div class="area set-top">セット</div>
            <div class="area side-l">サイド</div>
            <div class="area center">センター</div>
            <div class="area side-r">サイド</div>
            <div class="area deck">デッキ</div>
            <div class="area receive">レシーブ</div>
            <div class="area toss">トス</div>
            <div class="area attack">アタック</div>
            <div class="area drop">ドロップ</div>
            <div class="area set-bottom">セット</div>
            <div class="area serve">サーブ</div>
            <div class="area event">イベント</div>
        </div>
    </div>

    <!-- 自分 -->
    <div class="field-wrapper">
        <div class="field">
            <div class="area set-top">セット</div>
            <div class="area side-l">サイド</div>
            <div class="area center">センター</div>
            <div class="area side-r">サイド</div>
            <div class="area deck">デッキ</div>
            <div class="area receive">レシーブ</div>
            <div class="area toss">トス</div>
            <div class="area attack">アタック</div>
            <div class="area drop">ドロップ</div>
            <div class="area set-bottom">セット</div>
            <div class="area serve">サーブ</div>
            <div class="area event">イベント</div>
        </div>
    </div>

    <!-- 手札 -->
    <div id="hand"></div>
</div>

<script>
// フェイズ順
const phases = ["serve","block","draw","receive","toss","attack"];
let gameState = {
    turnPlayer:"player",
    phase:"serve",
    usedNames:[],
    hand:{player:[],enemy:[]},
    dropArea:{player:[],enemy:[]},
    gutsArea:{player:{},enemy:{}}
};

// サンプルカードデッキ
const deck = [
    {name:"田中",serve:5,block:3,receive:4,toss:2,attack:6},
    {name:"佐藤",serve:4,block:5,receive:3,toss:6,attack:3},
    {name:"鈴木",serve:6,block:2,receive:5,toss:3,attack:4},
    {name:"高橋",serve:3,block:6,receive:2,toss:5,attack:4},
];

// カード作成
function createCard(cardData,owner="player"){
    const card = document.createElement("div");
    card.innerText = cardData.name;
    card.classList.add("card");
    card.dataset.name = cardData.name;
    card.dataset.owner = owner;
    card.dataset.serve = cardData.serve;
    card.dataset.block = cardData.block;
    card.dataset.receive = cardData.receive;
    card.dataset.toss = cardData.toss;
    card.dataset.attack = cardData.attack;
    card.onclick = ()=>{ selectedCard = card; };
    if(owner==="player") document.getElementById("hand").appendChild(card);
    return card;
}

// 初期手札3枚
["田中","佐藤","鈴木"].forEach(n=>{
    const c = deck.find(d=>d.name===n);
    gameState.hand.player.push(createCard(c,"player"));
});

// 選択カード
let selectedCard = null;

// フィールドクリック
document.querySelectorAll(".area").forEach(area=>{
    area.onclick = ()=>{
        if(selectedCard && gameState.turnPlayer==="player"){
            const name = selectedCard.dataset.name;
            if(gameState.usedNames.includes(name)){
                alert("同名カードはこのターン中に連続で出せません");
                return;
            }
            // フェイズ制限チェック
            if(!selectedCard.dataset[gameState.phase] || selectedCard.dataset[gameState.phase] <=0){
                alert("このカードはこのフェイズでは使用できません");
                return;
            }
            area.appendChild(selectedCard);
            gameState.usedNames.push(name);
            selectedCard=null;
            nextPhase();
        }
    }
});

// CPU行動（最適カード選択＋フェイズ制限）
function cpuAction(){
    const phase = gameState.phase;
    const hand = ["田中","佐藤","鈴木","高橋"];
    const areas = {serve:"serve", block:"attack", receive:"receive", toss:"toss", attack:"attack"};
    
    // 出せるカードを抽出
    let candidates = hand
        .filter(name => !gameState.usedNames.includes(name))
        .map(name => deck.find(d => d.name===name))
        .filter(card => card[phase] !== undefined && card[phase] > 0);
    
    if(candidates.length === 0){
        nextPhase(); // 出せるカードなし
        return;
    }
    
    // 最大パラメータカードを選択
    candidates.sort((a,b)=>b[phase]-a[phase]);
    const chosenCard = candidates[0];
    
    // 配置エリア
    const areaName = areas[phase] || "attack";
    const area = document.querySelector(`.enemy .${areaName}`);
    const card = createCard(chosenCard,"enemy");
    area.appendChild(card);
    
    gameState.usedNames.push(chosenCard.name);
    nextPhase();
}

// フェイズ進行
function nextPhase(){
    const i = phases.indexOf(gameState.phase);
    if(i+1>=phases.length){
        endTurn();
    } else {
        gameState.phase = phases[i+1];
        document.getElementById("phaseDisplay").innerText = "フェイズ: "+gameState.phase;
        if(gameState.turnPlayer==="enemy") setTimeout(cpuAction,500);
    }
}

// ターン終了
function endTurn(){
    gameState.turnPlayer = (gameState.turnPlayer==="player")?"enemy":"player";
    gameState.phase="serve";
    gameState.usedNames=[];
    document.getElementById("phaseDisplay").innerText = "フェイズ: "+gameState.phase;
    if(gameState.turnPlayer==="enemy") setTimeout(cpuAction,500);
}
</script>

</body>
</html>
