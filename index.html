<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>バボカBREAK Web - Dev</title>
    <style>
        :root {
            --court-color: #f39c12;
            --card-width: 70px;
            --card-height: 100px;
            --accent-color: #e74c3c;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            color: white;
            user-select: none;
        }
        #game-screen {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* 相手エリア */
        .opponent-side {
            height: 15%;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            border-bottom: 2px dashed rgba(255,255,255,0.5);
        }

        /* メインコート */
        .court {
            flex: 1;
            background-color: var(--court-color);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 10px;
            position: relative;
        }

        /* 各エリアの枠 */
        .area-slot {
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 5px;
            position: relative;
            background: rgba(255,255,255,0.1);
        }
        .area-label {
            font-size: 10px;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 5px;
            pointer-events: none;
        }

        /* カードスタックの見た目 */
        .card-stack {
            position: relative;
            width: var(--card-width);
            height: var(--card-height);
        }
        .card {
            width: var(--card-width);
            height: var(--card-height);
            background: #fff;
            color: #333;
            border-radius: 6px;
            position: absolute;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #ccc;
            box-sizing: border-box;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ガッツの重なり演出 */
        .card.guts { transform: translateY(10px); filter: brightness(0.85); z-index: 10; }
        .card.guts-deep { transform: translateY(20px); filter: brightness(0.7); z-index: 5; }
        .card.top { z-index: 20; border: 2px solid #2980b9; }

        /* 自分側の操作UI */
        .player-ui {
            height: 40%;
            background: #34495e;
            display: flex;
            flex-direction: column;
            padding: 10px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        .hand-container {
            flex: 1;
            display: flex;
            overflow-x: auto;
            gap: 12px;
            align-items: center;
            padding: 0 10px;
        }
        .controls {
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            color: white;
            font-size: 14px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .btn-lost { background: #e74c3c; }
        .btn-action { background: #2ecc71; }

        /* モーダル（エリア選択） */
        #selection-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .selection-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .select-btn {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-screen">
    <div class="opponent-side">
        <div>相手 SET: 🎴🎴 DECK: 34</div>
    </div>

    <div class="court">
        <div class="area-slot">
            <span class="area-label">RECEIVE</span>
            <div class="card-stack" id="receive-stack"></div>
        </div>
        <div class="area-slot">
            <span class="area-label">TOSS</span>
            <div class="card-stack" id="toss-stack"></div>
        </div>
        <div class="area-slot">
            <span class="area-label">ATTACK</span>
            <div class="card-stack" id="attack-stack"></div>
        </div>
        <div class="area-slot">
            <span class="area-label">BLOCK</span>
            <div class="card-stack" id="block-stack"></div>
        </div>
    </div>

    <div class="player-ui">
        <div class="hand-container" id="hand-display"></div>
        <div class="controls">
            <button class="btn btn-lost" onclick="declareLost()">ロスト宣言</button>
            <button class="btn btn-action">イベント使用</button>
        </div>
    </div>
</div>

<div id="selection-overlay">
    <h3 id="select-card-name">どのエリアに出しますか？</h3>
    <div class="selection-grid">
        <div class="select-btn" onclick="selectArea('receive')">レシーブ</div>
        <div class="select-btn" onclick="selectArea('toss')">トス</div>
        <div class="select-btn" onclick="selectArea('attack')">アタック</div>
        <div class="select-btn" onclick="selectArea('block')">ブロック</div>
    </div>
    <p style="margin-top: 20px;" onclick="cancelSelection()">[キャンセル]</p>
</div>

<script>
    // --- データ管理 ---
    const gameState = {
        hand: ["日向", "影山", "月島", "田中", "西谷", "及川"],
        areas: {
            receive: [],
            toss: [],
            attack: [],
            block: []
        },
        pendingCardIndex: null
    };

    // --- メインロジック ---

    // 画面更新
    function render() {
        // 手札表示
        const handEl = document.getElementById('hand-display');
        handEl.innerHTML = '';
        gameState.hand.forEach((name, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.position = 'relative';
            card.innerText = name;
            card.onclick = () => openSelection(i);
            handEl.appendChild(card);
        });

        // 各エリアのスタック表示
        renderStack('receive-stack', gameState.areas.receive);
        renderStack('toss-stack', gameState.areas.toss);
        renderStack('attack-stack', gameState.areas.attack);
        renderStack('block-stack', gameState.areas.block);
    }

    function renderStack(id, cards) {
        const el = document.getElementById(id);
        el.innerHTML = '';
        cards.forEach((name, i) => {
            const card = document.createElement('div');
            // 0番目が一番上
            if (i === 0) card.className = 'card top';
            else if (i === 1) card.className = 'card guts';
            else card.className = 'card guts-deep';
            
            card.style.zIndex = 100 - i;
            card.innerText = name;
            el.appendChild(card);
        });
    }

    // エリア選択モーダル
    function openSelection(index) {
        gameState.pendingCardIndex = index;
        document.getElementById('select-card-name').innerText = `${gameState.hand[index]} をどこに出す？`;
        document.getElementById('selection-overlay').style.display = 'flex';
    }

    function cancelSelection() {
        document.getElementById('selection-overlay').style.display = 'none';
    }

    function selectArea(areaKey) {
        if (gameState.pendingCardIndex === null) return;
        
        // 手札から抜いてエリアの先頭へ
        const name = gameState.hand.splice(gameState.pendingCardIndex, 1)[0];
        gameState.areas[areaKey].unshift(name);
        
        gameState.pendingCardIndex = null;
        document.getElementById('selection-overlay').style.display = 'none';
        
        if (window.navigator.vibrate) window.navigator.vibrate(40);
        render();
    }

    function declareLost() {
        alert("ロスト！インターバルに移行します。");
        // ここにガッツ補充やセット回収のロジックを今後追加します
    }

    // 初回実行
    render();
</script>

</body>
</html>
